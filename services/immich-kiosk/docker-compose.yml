# Immich Kiosk — digital photo frame on top of Immich (slideshow on TV/tablet).
# http://<pi>:3001. Requires a running Immich and its API key (Immich →
# Account Settings → API Keys). Secrets and personal lists — in .env.
name: immich-kiosk

services:
  immich-kiosk:
    image: ghcr.io/damongolding/immich-kiosk:0.41.0
    container_name: immich-kiosk
    environment:
      TZ: ${TZ:-Europe/Madrid}
      # -- connection to Immich (set in .env) --
      KIOSK_IMMICH_URL: ${KIOSK_IMMICH_URL}
      KIOSK_IMMICH_API_KEY: ${KIOSK_IMMICH_API_KEY}
      # external address for links/QR codes on photos (empty = don't show)
      KIOSK_IMMICH_EXTERNAL_URL: ${KIOSK_IMMICH_EXTERNAL_URL:-}
      # -- what to show --
      KIOSK_ALBUMS: ${KIOSK_ALBUMS:-}            # comma-separated album ids (empty = all)
      KIOSK_EXCLUDED_ALBUMS: ${KIOSK_EXCLUDED_ALBUMS:-}
      KIOSK_PEOPLE: ${KIOSK_PEOPLE:-}            # comma-separated people ids
      KIOSK_DATES: ${KIOSK_DATES:-}              # e.g. "last-7-days, last-30-days"
      KIOSK_MEMORIES: ${KIOSK_MEMORIES:-true}
      KIOSK_SHOW_ARCHIVED: "false"
      KIOSK_ALBUM_ORDER: random
      # -- clock and labels --
      KIOSK_SHOW_TIME: "true"
      KIOSK_TIME_FORMAT: 24
      KIOSK_SHOW_DATE: "true"
      KIOSK_DATE_FORMAT: DD/MM/YYYY
      KIOSK_SHOW_PERSON_NAME: "true"
      KIOSK_SHOW_PERSON_AGE: "true"
      KIOSK_SHOW_IMAGE_DATE: "true"
      KIOSK_IMAGE_DATE_FORMAT: DD-MM-YYYY
      KIOSK_SHOW_IMAGE_DESCRIPTION: "true"
      KIOSK_SHOW_IMAGE_LOCATION: "true"
      KIOSK_SHOW_MORE_INFO: "true"
      KIOSK_SHOW_MORE_INFO_IMAGE_LINK: "true"
      KIOSK_SHOW_MORE_INFO_QR_CODE: "true"
      # -- behavior and appearance --
      KIOSK_DURATION: ${KIOSK_DURATION:-15}      # seconds per slide
      KIOSK_DISABLE_SCREENSAVER: "true"
      KIOSK_OPTIMIZE_IMAGES: "true"
      KIOSK_USE_GPU: "true"
      KIOSK_HIDE_CURSOR: "true"
      KIOSK_BACKGROUND_BLUR: "true"
      KIOSK_THEME: ${KIOSK_THEME:-bubble}
      KIOSK_LAYOUT: ${KIOSK_LAYOUT:-splitview}
      KIOSK_TRANSITION: none
      KIOSK_SHOW_PROGRESS_BAR: "true"
      KIOSK_FONT_SIZE: ${KIOSK_FONT_SIZE:-200}
      # -- internal --
      KIOSK_PORT: 3001
      KIOSK_PREFETCH: "true"
      KIOSK_FETCHED_ASSETS_SIZE: 500
      KIOSK_HTTP_TIMEOUT: 20
      KIOSK_ASSET_WEIGHTING: "true"
      KIOSK_PASSWORD: ${KIOSK_PASSWORD:-}
    env_file:
      - .env
    ports:
      - "3001:3001"
    labels:
      - "web-desktop.name=Immich Kiosk"
      - "web-desktop.url=http://localhost:3001"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/immich-kiosk.png"
    restart: unless-stopped
