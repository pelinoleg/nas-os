# What's Up Docker (WUD) — watches for Docker image updates. http://<pi>:3005
# The panel polls the REST API (/api/containers) and shows an "updates available" badge.
# The panel finds WUD by container name and actual port — the port can be changed.
services:
  wud:
    image: ghcr.io/getwud/wud:8    # rolling major: fixes arrive, breaking 9.x doesn't
    container_name: wud
    restart: unless-stopped
    labels:
      - "web-desktop.name=What's Up Docker"
      - "web-desktop.url=http://localhost:3005"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/whats-up-docker.svg"
    environment:
      # the local docker watcher comes up on its own via the mounted socket;
      # we poll registries every 6 hours, images are NOT touched — only reported.
      - WUD_WATCHER_LOCAL_CRON=0 0 */6 * * *
    ports:
      - "3005:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/docker/wud/store:/store
