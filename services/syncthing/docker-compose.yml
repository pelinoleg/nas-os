# Syncthing — file sync between devices. http://<pi>:8384
services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: syncthing
    restart: unless-stopped
    labels:
      - "web-desktop.name=Syncthing"
      - "web-desktop.url=http://localhost:8384"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/syncthing.svg"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - /opt/docker/syncthing/config:/config
      - ${STORAGE:-/mnt/storage}:/data      # shared folder (pool by default)
    ports:
      - "8384:8384"          # web UI
      - "22000:22000/tcp"    # sync
      - "22000:22000/udp"
      - "21027:21027/udp"    # discovery

  # Light Vellum theme for the Syncthing web UI: one-time copy of the theme files
  # into the config (/config/gui/vellum-light). Shows up in Actions → Settings → GUI →
  # Theme = vellum-light (pick it once). Doesn't affect Syncthing's operation:
  # no hard-depends — if the clone fails, Syncthing still comes up.
  syncthing-vellum:
    image: alpine/git:latest
    container_name: syncthing-vellum
    restart: "no"
    entrypoint: /bin/sh
    command: -c "test -d /config/gui/vellum-light && exit 0; git clone --depth 1 https://github.com/pelinoleg/syncthing-vellum /tmp/v && mkdir -p /config/gui && cp -r /tmp/v/vellum-light /config/gui/ && chown -R 1000:1000 /config/gui/vellum-light && echo 'vellum-light installed'"
    volumes:
      - /opt/docker/syncthing/config:/config
