# Homepage — стартовая страница со всеми сервисами. http://<pi>:3001
# ВАЖНО: HOMEPAGE_ALLOWED_HOSTS должен содержать адрес:порт из адресной строки браузера,
# иначе Homepage вернёт "Bad Request". Добавьте IP вашего Pi (host:3001).
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - /opt/docker/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro   # авто-обнаружение контейнеров
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "pi5.local:3001,localhost:3001"   # + добавьте "192.168.x.x:3001"
    labels:
      - "diun.enable=true"
      - "web-desktop.name=Homepage"
      - "web-desktop.url=http://pi5.local:3001"
