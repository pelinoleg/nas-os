# Diun — уведомления о новых версиях образов (без авто-обновления). Шлёт в Pushover.
# Ключи Pushover — в файле .env рядом (те же, что в мастере уведомлений).
services:
  diun:
    image: crazymax/diun:4.33.0        # теги без префикса v
    container_name: diun
    restart: unless-stopped
    command: serve
    volumes:
      - /opt/docker/diun/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: "Europe/Madrid"
      LOG_LEVEL: "info"
      DIUN_WATCH_SCHEDULE: "0 */6 * * *"                # раз в 6 часов
      DIUN_WATCH_JITTER: "30s"
      DIUN_PROVIDERS_DOCKER: "true"
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "true"      # следить за всеми контейнерами
      DIUN_NOTIF_PUSHOVER_TOKEN: "${PUSHOVER_TOKEN}"
      DIUN_NOTIF_PUSHOVER_RECIPIENT: "${PUSHOVER_USER_KEY}"
    labels:
      - "diun.enable=true"
