# NextExplorer — web file manager (https://github.com/nxzai/NextExplorer). http://<pi>:3000
# MUST replace SESSION_SECRET with a random string >=32 characters:
#   openssl rand -hex 32
services:
  nextexplorer:
    image: nxzai/explorer:v2.2.4
    container_name: nextexplorer
    restart: unless-stopped
    labels:
      - "web-desktop.name=NextExplorer"
      - "web-desktop.url=http://pi5.local:3000"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/nextexplorer.svg"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUID=1000
      - PGID=1000
      - PUBLIC_URL=http://raspberrypi.local:3000   # set the real address/host of the Pi, no trailing slash
      - SESSION_SECRET=CHANGE-ME-openssl-rand-hex-32
    volumes:
      - /opt/docker/nextexplorer/config:/config     # DB/settings (persistent)
      - /opt/docker/nextexplorer/cache:/cache       # thumbnails/indexes
      - /mnt/storage:/mnt/Storage                    # each /mnt/<Label> = a volume in the UI
