# NextExplorer — web file manager (https://github.com/nxzai/NextExplorer). http://<pi>:3000
# SESSION_SECRET / PUBLIC_URL / STORAGE come from the install dialog (.env):
# a random secret is generated per install, PUBLIC_URL defaults to this NAS's LAN address.
services:
  nextexplorer:
    image: nxzai/explorer:v2.2.4
    container_name: nextexplorer
    restart: unless-stopped
    labels:
      - "web-desktop.name=NextExplorer"
      - "web-desktop.url=http://localhost:3000"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/nextexplorer.svg"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUID=1000
      - PGID=1000
      - PUBLIC_URL=${PUBLIC_URL}           # this NAS's real address (share links); set in the install dialog
      - SESSION_SECRET=${SESSION_SECRET}   # random per install (do NOT commit a fixed secret)
    volumes:
      - /opt/docker/nextexplorer/config:/config     # DB/settings (persistent)
      - /opt/docker/nextexplorer/cache:/cache       # thumbnails/indexes
      - ${STORAGE:-/mnt/storage}:/mnt/Storage        # each /mnt/<Label> = a volume in the UI
