# qBittorrent — torrent client with a web UI. http://<pi>:8080
# On first start, the admin user's password is written to the container log
# (docker logs qbittorrent) — change it in Settings → Web UI.
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.3
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      - "web-desktop.name=qBittorrent"
      - "web-desktop.url=http://pi5.local:8080"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/qbittorrent.svg"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /opt/docker/qbittorrent/config:/config
      - /mnt/storage/downloads:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
