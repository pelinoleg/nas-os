# Scrutiny — SMART disk health monitoring (omnibus: web+InfluxDB). http://<pi>:8084
# IMPORTANT: list your disks under devices. NVMe needs the SYS_ADMIN cap.
# The panel finds Scrutiny by container name and actual port — so
# the web port can be changed here freely, no need to touch the panel.
services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:v0.9.2-omnibus
    container_name: scrutiny
    restart: unless-stopped
    labels:
      - "web-desktop.name=Scrutiny"
      - "web-desktop.url=http://localhost:8084"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/scrutiny.svg"
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN            # needed for NVMe disks
    ports:
      - "8084:8080"          # web (8080 is taken by Dozzle -> moved to 8084)
      # InfluxDB (8086) is not published: in omnibus it's only needed inside
      # the container, and on 0.0.0.0 it would be an open database on the LAN.
    volumes:
      - /run/udev:/run/udev:ro
      - /opt/docker/scrutiny/config:/opt/scrutiny/config
      - /opt/docker/scrutiny/influxdb:/opt/scrutiny/influxdb
    # We pass through char CONTROLLERS (/dev/nvmeN), not the namespace (/dev/nvmeNn1):
    # smartctl --scan finds exactly the controllers, so Scrutiny discovers disks
    # itself, without a manual collector.yaml.
    # IMPORTANT: Docker requires every listed device to EXIST at startup, or the
    # container won't come up — so nothing is listed by default. UNCOMMENT the
    # lines that match THIS box's disks (check `ls /dev/nvme* /dev/sd?`).
    # devices:
    #   - "/dev/nvme0"       # first NVMe controller
    #   - "/dev/nvme1"
    #   - "/dev/nvme2"
    #   - "/dev/sda"         # a USB/SATA disk (char device = the disk itself)
    #   - "/dev/sdb"
