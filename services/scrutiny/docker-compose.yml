# Scrutiny — мониторинг SMART-состояния дисков (omnibus: web+InfluxDB). http://<pi>:8084
# ВАЖНО: перечислите свои диски в devices. Для NVMe нужен cap SYS_ADMIN.
services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:v0.9.2-omnibus
    container_name: scrutiny
    restart: unless-stopped
    labels:
      - "web-desktop.name=Scrutiny"
      - "web-desktop.url=http://pi5.local:8084"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/scrutiny.svg"
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN            # нужно для NVMe-дисков
    ports:
      - "8084:8080"          # web (8080 занят Dozzle -> вынесен на 8084)
      - "8086:8086"          # InfluxDB
    volumes:
      - /run/udev:/run/udev:ro
      - /opt/docker/scrutiny/config:/opt/scrutiny/config
      - /opt/docker/scrutiny/influxdb:/opt/scrutiny/influxdb
    devices:
      - "/dev/nvme0n1"       # системный NVMe (у вас — Samsung 970 EVO)
      # - "/dev/sda"         # раскомментируйте по мере добавления USB-дисков
      # - "/dev/sdb"
