# Zerobyte — backup automation (web GUI on top of Restic). http://<pi>:4096
# Needs /dev/fuse + SYS_ADMIN (restic-mount). SECURITY: do not expose port
# 4096 to the internet without a tunnel/auth — LAN only.
services:
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.40.0
    container_name: zerobyte
    restart: unless-stopped
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    labels:
      - "web-desktop.name=Zerobyte"
      - "web-desktop.url=http://localhost:4096"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/zerobyte.svg"
    environment:
      - APP_SECRET=${APP_SECRET}           # random per install (from the dialog)
      - BASE_URL=${BASE_URL}               # this NAS's real address
      - PORT=4096
    ports:
      - "4096:4096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /opt/docker/zerobyte/data:/var/lib/zerobyte
