# Dockge — docker-compose stack manager (web UI). http://<pi>:5001
services:
  dockge:
    image: louislam/dockge:1.5.0
    container_name: dockge
    restart: unless-stopped
    labels:
      - "web-desktop.name=Dockge"
      - "web-desktop.url=http://localhost:5001"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/dockge.svg"
    ports:
      - "5001:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/docker/dockge/data:/app/data
      - /opt/stacks:/opt/stacks           # stacks managed by Dockge
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
