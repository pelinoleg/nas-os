# Cronmaster — управление cron-задачами ХОСТА (веб-UI + REST API). http://<pi>:8123
# Открытый доступ в LAN: AUTH_PASSWORD и API_KEY НЕ заданы → без пароля (как договорено).
# Управляет кроном хоста напрямую → нужны privileged, pid:host и docker.sock (штатно для cronmaster).
# Данные/скрипты/сниппеты лежат рядом со стеком (./data ./scripts ./snippets в каталоге Dockge).
services:
  cronmaster:
    image: ghcr.io/fccview/cronmaster:latest   # проверьте/зафиксируйте тег после установки
    container_name: cronmaster
    user: "root"
    restart: unless-stopped
    ports:
      - "8123:3000"
    environment:
      - NODE_ENV=production
      - HOST_CRONTAB_USER=root
      - NEXT_PUBLIC_CLOCK_UPDATE_INTERVAL=30000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./snippets:/app/snippets
    pid: "host"
    privileged: true
    init: true
    labels:
      - "web-desktop.name=Cronmaster"
      - "web-desktop.url=http://pi5.local:8123"
