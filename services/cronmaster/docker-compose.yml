# Cronmaster — manages HOST cron jobs (web UI + REST API). http://<pi>:8123
# Open access on the LAN: AUTH_PASSWORD and API_KEY are NOT set → no password (as agreed).
# Manages the host's cron directly → needs privileged, pid:host and docker.sock (standard for cronmaster).
# Data/scripts/snippets live next to the stack (./data ./scripts ./snippets in the Dockge folder).
services:
  cronmaster:
    image: ghcr.io/fccview/cronmaster:1.5.1   # exact pin: upstream's rolling "1.5" tag has a broken manifest
    container_name: cronmaster
    user: "root"
    restart: unless-stopped
    ports:
      - "8123:3000"
    environment:
      - NODE_ENV=production
      - HOST_CRONTAB_USER=root
      - NEXT_PUBLIC_CLOCK_UPDATE_INTERVAL=30000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./snippets:/app/snippets
    pid: "host"
    privileged: true
    init: true
    labels:
      - "web-desktop.name=Cronmaster"
      - "web-desktop.url=http://localhost:8123"
