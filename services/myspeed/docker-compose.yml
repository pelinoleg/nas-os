# MySpeed — automatic internet speed measurements with history and graphs.
# http://<pi>:5216   Docs: https://myspeed.dev
#
# Replaced OpenSpeedTest: that one measures the LOCAL network speed between the
# browser and the Pi on button press, while MySpeed itself reaches out on a
# schedule and accumulates stats (speed, ping, loss). Schedule and alert
# threshold — in the web UI itself.
#
# Tag pinned per services/README.md convention. Stable 1.0.9 is built for
# arm64, while the `development` branch is amd64-only and won't run on a Pi 5.
# Data (sqlite) — bind-mount, so it lives alongside the other stacks.
services:
  myspeed:
    image: germannewsmaker/myspeed:1.0.9    # exact pin (no rolling tag upstream; see note above re arm64)
    container_name: myspeed
    restart: unless-stopped
    ports:
      - "5216:5216"
    environment:
      - TZ=${TZ:-Europe/Madrid}
    volumes:
      - /opt/docker/myspeed/data:/myspeed/data
    labels:
      - "web-desktop.name=MySpeed"
      - "web-desktop.url=http://localhost:5216"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/myspeed.png"
