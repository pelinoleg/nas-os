# Dozzle — real-time container log viewer. http://<pi>:8083
# Dozzle and Scrutiny both default to port 8080 — Dozzle moved to 8083.
services:
  dozzle:
    image: amir20/dozzle:v10    # rolling major: fixes arrive, breaking v11 doesn't
    container_name: dozzle
    restart: unless-stopped
    labels:
      - "web-desktop.name=Dozzle"
      - "web-desktop.url=http://localhost:8083"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/dozzle.svg"
    ports:
      - "8083:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
