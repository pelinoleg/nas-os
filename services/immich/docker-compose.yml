# Immich — photo/video library (a Google Photos analog). http://<pi>:2283
# ALIGNED with the release compose and the production instance on the main NAS:
# the /usr/src/app/upload mount and the same Postgres image line are IMPORTANT
# for the replica (in-container paths and DB version/extensions must match the source).
# Media (UPLOAD_LOCATION) — goes to the pool /mnt/storage; DB (DB_DATA_LOCATION) — on the SSD
# (Postgres must not be kept on mergerfs). Settings — in .env.
name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v3.0.1}
    volumes:
      # Do not edit: to move the media change UPLOAD_LOCATION in .env
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - "2283:2283"
    labels:
      - "web-desktop.name=Immich"
      - "web-desktop.url=http://pi5.local:2283"
      - "web-desktop.icon=https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/immich.svg"
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v3.0.1}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:2ba50e1ac3a0ea17b736ce9db2b0a9f6f8b85d4c27d5f5accc6a416d8f42c6d5
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  database:
    container_name: immich_postgres
    # same image line as the source NAS — the replica restores its dump 1:1
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit: to move the database change DB_DATA_LOCATION in .env
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      disable: false

volumes:
  model-cache:
