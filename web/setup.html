<style>
  /* ---- design tokens : airy consumer, light default + equal dark (mirrors desktop.html) ---- */
  :root{
    --bg:#EAEEF4; --surface:#FFFFFF;
    --glass:rgba(255,255,255,.74); --glass-2:rgba(255,255,255,.92);
    --ink:#1A2431; --text:#1A2431; --dim:#53637B; --mut:#8493AA;
    --line:rgba(24,42,70,.09); --line-2:rgba(24,42,70,.15);
    --accent:#12B0A6; --accent-2:#4C8DF6; --accent-ink:#FFFFFF; --accent-soft:rgba(18,176,166,.12); --accent-line:rgba(18,176,166,.5); --sel:rgba(255,255,255,.92);
    --good:#1FA971; --good-soft:rgba(31,169,113,.14); --warn:#CF881B; --warn-soft:rgba(207,136,27,.15);
    --danger:#DE4E48; --danger-soft:rgba(222,78,72,.13);
    --code-bg:#0F1620; --code-fg:#C9D6EA;
    --font:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sh-sm:0 1px 2px rgba(20,40,70,.05), 0 2px 6px -2px rgba(20,40,70,.08);
    --sh:0 1px 2px rgba(20,40,70,.05), 0 10px 26px -14px rgba(20,40,70,.20), 0 32px 60px -34px rgba(20,40,70,.22);
    --r-win:20px; --r-lg:16px; --r-md:12px; --r-sm:9px;
  }
  :root[data-theme="dark"], :root[data-theme="dark"] *{color-scheme:dark}
  @media (prefers-color-scheme:dark){:root{
    --bg:#0B111A; --surface:#161E2A;
    --glass:rgba(22,30,42,.70); --glass-2:rgba(26,36,50,.86);
    --ink:#E9EFF7; --text:#E9EFF7; --dim:#9EACC2; --mut:#6F7F97;
    --line:rgba(140,160,195,.13); --line-2:rgba(140,160,195,.22);
    --accent:#35C9C0; --accent-2:#5AA9FF; --accent-ink:#04181A; --accent-soft:rgba(53,201,192,.15); --accent-line:rgba(53,201,192,.5); --sel:rgba(255,255,255,.10);
    --good:#43C08A; --good-soft:rgba(67,192,138,.16); --warn:#E4A94A; --warn-soft:rgba(228,169,74,.16);
    --danger:#E86560; --danger-soft:rgba(232,101,96,.16);
    --code-bg:#0A0F17; --code-fg:#C7D3E6;
    --sh-sm:0 2px 6px rgba(0,0,0,.32); --sh:0 2px 10px rgba(0,0,0,.34), 0 30px 70px -30px rgba(0,0,0,.7);
  }}
  :root[data-theme="dark"]{
    --bg:#0B111A; --surface:#161E2A;
    --glass:rgba(22,30,42,.70); --glass-2:rgba(26,36,50,.86);
    --ink:#E9EFF7; --text:#E9EFF7; --dim:#9EACC2; --mut:#6F7F97;
    --line:rgba(140,160,195,.13); --line-2:rgba(140,160,195,.22);
    --accent:#35C9C0; --accent-2:#5AA9FF; --accent-ink:#04181A; --accent-soft:rgba(53,201,192,.15); --accent-line:rgba(53,201,192,.5); --sel:rgba(255,255,255,.10);
    --good:#43C08A; --good-soft:rgba(67,192,138,.16); --warn:#E4A94A; --warn-soft:rgba(228,169,74,.16);
    --danger:#E86560; --danger-soft:rgba(232,101,96,.16);
    --code-bg:#0A0F17; --code-fg:#C7D3E6;
    --sh-sm:0 2px 6px rgba(0,0,0,.32); --sh:0 2px 10px rgba(0,0,0,.34), 0 30px 70px -30px rgba(0,0,0,.7);
  }
  :root[data-theme="light"]{
    --bg:#EAEEF4; --surface:#FFFFFF;
    --glass:rgba(255,255,255,.74); --glass-2:rgba(255,255,255,.92);
    --ink:#1A2431; --text:#1A2431; --dim:#53637B; --mut:#8493AA;
    --line:rgba(24,42,70,.09); --line-2:rgba(24,42,70,.15);
    --accent:#12B0A6; --accent-2:#4C8DF6; --accent-ink:#FFFFFF; --accent-soft:rgba(18,176,166,.12); --accent-line:rgba(18,176,166,.5); --sel:rgba(255,255,255,.92);
    --good:#1FA971; --good-soft:rgba(31,169,113,.14); --warn:#CF881B; --warn-soft:rgba(207,136,27,.15);
    --danger:#DE4E48; --danger-soft:rgba(222,78,72,.13);
    --code-bg:#0F1620; --code-fg:#C9D6EA;
    --sh-sm:0 1px 2px rgba(20,40,70,.05), 0 2px 6px -2px rgba(20,40,70,.08);
    --sh:0 1px 2px rgba(20,40,70,.05), 0 10px 26px -14px rgba(20,40,70,.20), 0 32px 60px -34px rgba(20,40,70,.22);
  }
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;letter-spacing:-.006em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}button{font-family:inherit;cursor:pointer;color:inherit}
  ::selection{background:var(--accent-soft)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;border:3px solid transparent;background-clip:padding-box}
  .top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:13px 22px;background:var(--glass);backdrop-filter:blur(26px) saturate(1.6);-webkit-backdrop-filter:blur(26px) saturate(1.6);border-bottom:1px solid var(--line)}
  .top .brand{display:flex;align-items:center;gap:10px;font-weight:680;letter-spacing:-.01em}.top .brand svg{width:24px;height:24px;color:var(--accent)}
  .brand-ico{width:26px;height:26px;display:block;flex:none}
  .top .sub{font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em}
  .spacer{flex:1}
  .dry{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--dim)}
  .sw{width:38px;height:22px;border-radius:22px;background:rgba(128,140,158,.42);border:none;position:relative;flex:none;transition:.2s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:.2s}
  .sw[aria-checked="true"]{background:var(--accent)}.sw[aria-checked="true"]::after{transform:translateX(16px)}
  .back{font-size:13px;color:var(--dim);text-decoration:none;display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:var(--r-sm);border:1px solid transparent;transition:.14s}.back:hover{color:var(--text);background:var(--glass-2);border-color:var(--line)}
  .wrap{display:grid;grid-template-columns:250px 1fr;gap:0;max-width:1080px;margin:0 auto;min-height:calc(100vh - 57px)}
  .rail{border-right:1px solid var(--line);padding:18px 12px}
  .step{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-md);color:var(--dim);border:1px solid transparent;width:100%;background:none;text-align:left;margin-bottom:3px;transition:.14s}
  .step:hover{background:var(--glass-2)}.step.on{background:var(--sel);color:var(--text);border-color:var(--accent-line)}
  .step .ic{display:flex;color:var(--mut)}.step.on .ic{color:var(--accent)}.step .nm{font-size:13.5px;font-weight:550;flex:1}
  .step .dot{width:7px;height:7px;border-radius:50%;background:var(--line-2)}.step.done .dot{background:var(--good);box-shadow:0 0 0 3px var(--good-soft)}
  .panel{padding:32px clamp(20px,4vw,48px)}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--mut);margin-bottom:10px}
  h1{font-size:1.7rem;line-height:1.2;margin:0 0 10px;letter-spacing:-.02em;color:var(--ink)}
  .lead{color:var(--dim);margin:0 0 22px;max-width:62ch;line-height:1.55}
  .okban{display:flex;align-items:center;gap:9px;margin:0 0 18px;padding:11px 14px;border-radius:var(--r-md);background:var(--good-soft);color:var(--good);font-size:13px;line-height:1.45}
  .okban svg{flex:none}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:8px 20px;margin-bottom:14px;box-shadow:var(--sh-sm)}
  .card+.eyebrow{margin-top:24px}
  .opt{display:flex;align-items:center;gap:14px;padding:14px 0;border-top:1px solid var(--line)}.opt:first-child{border-top:none}
  .opt .ic{width:32px;height:32px;border-radius:var(--r-sm);background:var(--bg);display:grid;place-items:center;color:var(--dim);flex:none}
  .opt.on .ic{background:var(--accent-soft);color:var(--accent)}
  .opt .m{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}.opt .m .t{font-weight:600;font-size:13.5px;line-height:1.35}.opt .m .d{font-size:12px;color:var(--mut);line-height:1.45}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.field label{font-size:12.5px;font-weight:600}
  input,select{background:var(--bg);border:1px solid var(--line-2);border-radius:var(--r-sm);color:var(--text);padding:10px 12px;font-size:14px;width:100%;font-family:var(--font)}
  input.mono{font-family:var(--mono)}input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{border:1px solid var(--line-2);background:var(--surface);color:var(--text);padding:10px 18px;border-radius:var(--r-md);font-weight:600;font-size:14px;display:inline-flex;gap:8px;align-items:center;transition:.14s}
  .btn:hover{border-color:var(--accent-line);background:var(--accent-soft);color:var(--accent);transform:translateY(-1px)}
  .btn.pri{background:var(--accent);color:var(--accent-ink);border-color:transparent}.btn.pri:hover{filter:brightness(1.06);background:var(--accent);color:var(--accent-ink);transform:translateY(-1px)}
  .btn.dng{background:var(--danger);color:#fff;border-color:transparent}.btn.dng:hover{filter:brightness(1.06);background:var(--danger);color:#fff}
  .btn.dng:disabled{background:var(--bg);color:var(--mut);cursor:not-allowed;box-shadow:none;transform:none;filter:none;border-color:var(--line)}
  .btn.sm{padding:7px 12px;font-size:12.5px}
  .actions{display:flex;gap:10px;margin-top:18px}
  .disk{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r-md);margin-bottom:10px;background:var(--surface);box-shadow:var(--sh-sm)}
  .disk .ic{color:var(--dim);flex:none}.disk .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}.disk .p{font-family:var(--mono);font-weight:600;font-size:14px}.disk .mo{font-size:12px;color:var(--mut);line-height:1.4}
  .seg{display:inline-flex;background:var(--bg);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:3px;gap:3px}
  .seg button{border:none;background:none;color:var(--dim);padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;transition:.12s}
  .seg button.on{background:var(--sel);color:var(--accent)}
  .note{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:var(--r-md);font-size:13px;line-height:1.5;background:var(--accent-soft);border:1px solid var(--accent-line);color:var(--text)}
  .note svg{flex:none;margin-top:1px;color:var(--accent)}
  .note.dng{background:var(--danger-soft);border-color:var(--danger)}.note.dng svg{color:var(--danger)}
  .console{background:var(--code-bg);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 15px;font-family:var(--mono);font-size:12.5px;line-height:1.7;max-height:240px;overflow:auto;color:var(--code-fg);margin-top:14px;display:none}
  .console.show{display:block}.console .ok{color:var(--good)}.console .er{color:var(--danger)}.console .dim{color:var(--mut)}
  .scrim{position:fixed;inset:0;background:rgba(6,10,17,.55);backdrop-filter:blur(4px);display:none;place-items:center;z-index:50;padding:20px}
  .scrim.show{display:grid}.modal{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-win);max-width:420px;width:100%;padding:22px;box-shadow:var(--sh)}
  .modal h3{margin:0 0 8px;color:var(--ink)}.modal p{margin:0 0 16px;color:var(--dim);font-size:13.5px}.modal .r{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  @media(max-width:760px){.wrap{grid-template-columns:1fr}.rail{display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line)}.step{white-space:nowrap}.step .nm{display:none}}
</style></head><body>
<div class="top">
  <div class="brand"><img class="brand-ico" src="/icon-flat.svg" alt="Raspberry Pi" draggable="false">Setup Wizard</div>
  <span class="sub" id="hostlbl"></span>
  <span class="spacer"></span>
  <label class="dry">Preview<button class="sw" id="dry" role="switch" aria-checked="false"></button></label>
  <a class="back" href="/">← Desktop</a>
</div>
<div class="wrap">
  <nav class="rail" id="rail"></nav>
  <main class="panel" id="panel"></main>
</div>
<div class="scrim" id="scrim"></div>
<script>window.nasTr=function(s){return s};window.NAS_LANG="en";</script>
<script>
// wizard language toggle: localStorage mirror + reload
// the static wizard header doesn't go through innerHTML — translate its text nodes on startup
addEventListener("DOMContentLoaded",()=>{document.querySelectorAll(".brand,.dry,.back,.sub").forEach(n=>{
 n.childNodes.forEach(c=>{if(c.nodeType===3)c.textContent=nasTr(c.textContent);});
 if(n.title)n.title=nasTr(n.title);});});
</script>
<script>
"use strict";
const P={
 cpu:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M15 20v2M2 15h2M2 9h2M20 15h2M20 9h2M9 2v2M9 20v2"/>',
 disks:'<line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/>',
 layers:'<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m6.09 9.5-3.49 1.59a1 1 0 0 0 0 1.81l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9a1 1 0 0 0 0-1.83L17.9 9.5"/>',
 shield:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
 share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>',
 sliders:'<line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/>',
 bell:'<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
 save:'<path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7M7 3v4a1 1 0 0 0 1 1h7"/>',
 cube:'<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
 net:'<path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 20 0"/><line x1="12" x2="12.01" y1="20" y2="20"/>',
 plug:'<path d="M12 22v-5"/><path d="M9 8V2M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/>',
};
const svg=(n,s)=>`<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${P[n]||""}</svg>`;
const el=h=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
let DRY=false,LIVE=false,STATE={};
async function api(path,opts){try{const r=await fetch(path,Object.assign({headers:{"Content-Type":"application/json"}},opts));if(r.status===401){authGate();throw 0;}if(!r.ok)throw 0;LIVE=true;return await r.json();}catch(e){return null;}}

/* sign-in: the backend returns 401 without a session; on first run the password isn't set yet */
let AUTHUI=false;
async function authGate(){
 if(AUTHUI)return;AUTHUI=true;
 let st={configured:true};
 try{st=await (await fetch("/api/auth/state")).json();}catch(e){}
 const setup=!st.configured;
 const ov=el(`<div class="scrim show" style="z-index:90"><div class="modal">
  <h3>${setup?"Administrator password":"Sign in to NAS"}</h3>
  <p>${setup?"First run: create a password to sign in to the control panel.":"Enter the panel administrator password."}</p>
  <form id="authF" style="display:flex;flex-direction:column;gap:10px">
   <input type="password" id="authPw" placeholder="Password" autocomplete="${setup?"new-password":"current-password"}" required>
   ${setup?'<input type="password" id="authPw2" placeholder="Password again" autocomplete="new-password" required>':""}
   <div id="authErr" style="color:var(--danger);font-size:12.5px;min-height:16px"></div>
   <div class="r"><button class="btn pri" type="submit">${setup?"Save and sign in":"Sign in"}</button></div>
  </form></div></div>`);
 document.body.appendChild(ov);
 setTimeout(()=>ov.querySelector("#authPw").focus(),80);
 ov.querySelector("#authF").onsubmit=async e=>{
  e.preventDefault();
  const err=ov.querySelector("#authErr");err.textContent="";
  const pw=ov.querySelector("#authPw").value;
  if(setup&&pw!==ov.querySelector("#authPw2").value){err.textContent="Passwords do not match";return;}
  let r=null;
  try{r=await(await fetch(setup?"/api/auth/setup":"/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})})).json();}catch(ex){}
  if(r&&r.ok)location.reload();
  else err.textContent=(r&&r.log)||"Could not sign in";
 };
}

const STEPS=[
 {id:"system",nm:"System",ic:"cpu"},
 {id:"disks",nm:"Disks",ic:"disks"},
 {id:"mergerfs",nm:"Pool",ic:"layers"},
 {id:"snapraid",nm:"Parity",ic:"layers"},
 {id:"services",nm:"Services",ic:"cube"},
 {id:"shares",nm:"Access",ic:"share"},
 {id:"security",nm:"Security",ic:"shield"},
 {id:"tuning",nm:"Pi Tuning",ic:"sliders"},
 {id:"notify",nm:"Notifications",ic:"bell"},
 {id:"backup",nm:"Backups",ic:"save"},
 {id:"modules",nm:"Modules",ic:"plug"},
];
let cur="system";const DONE={};
function renderRail(){const r=document.getElementById("rail");r.innerHTML="";STEPS.forEach(s=>{
 const b=el(`<button class="step ${cur===s.id?"on":""} ${DONE[s.id]?"done":""}"><span class="ic">${svg(s.ic,17)}</span><span class="nm">${s.nm}</span><span class="dot"></span></button>`);
 b.onclick=()=>{cur=s.id;renderRail();renderPanel();};r.appendChild(b);});}

function head(eb,t,l){return `<div class="eyebrow">${eb}</div><h1>${t}</h1><p class="lead">${l}</p>`;}
async function run(action,params,after){
 const con=document.getElementById("con");con.classList.add("show");
 con.innerHTML=`<div class="dim">${DRY?"# plan preview":"$ running "+action} …</div>`;
 let resp;
 try{resp=await fetch("/api/setup/"+action,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dry:DRY,params:params||{}})});}
 catch(e){con.innerHTML=`<div class="er">No connection to the backend. Install the service: sudo ./nas-web-install.sh</div>`;return;}
 if(resp.status===401){authGate();con.innerHTML=`<div class="er">Sign-in required: enter the administrator password</div>`;return;}
 if(!resp.ok||!resp.body){con.innerHTML=`<div class="er">Error ${resp.status}</div>`;return;}
 con.innerHTML="";
 const reader=resp.body.getReader(),dec=new TextDecoder();let buf="",code=null;
 const push=line=>{if(line.startsWith("__EXIT__")){code=parseInt(line.slice(8),10);return;}
   const cls=/ERROR|ABORT|REJECT|FAIL/i.test(line)?"er":/✓|\bdone\b|complete|\bready\b|success/i.test(line)?"ok":"";
   con.appendChild(el(`<div class="${cls}">${line.replace(/</g,"&lt;")||"&nbsp;"}</div>`));con.scrollTop=con.scrollHeight;};
 for(;;){const {done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
   const parts=buf.split("\n");buf=parts.pop();parts.forEach(push);}
 if(buf)push(buf);
 const ok=code===0;con.appendChild(el(`<div class="${ok?"ok":"er"}">${DRY?"— end of plan —":ok?"✓ done":"⚠ code "+code}</div>`));
 if(ok&&!DRY){DONE[cur]=true;renderRail();after&&after();}
}
function chk(id,t,d,on,ic){return `<label class="opt ${on?"on":""}"><span class="ic">${svg(ic||"cube",16)}</span><span class="m"><span class="t">${t}</span><span class="d">${d}</span></span><input type="checkbox" data-k="${id}" ${on?"checked":""} style="width:20px;height:20px;accent-color:var(--accent)"></label>`;}
function keys(box){return [...box.querySelectorAll("[data-k]:checked")].map(x=>x.dataset.k).join(" ");}

const R={
 system(p){p.innerHTML=head("Step 1","System preparation","Updates and installation of Docker, mergerfs, SnapRAID and utilities. Anything already installed is skipped.")+
  `<div class="card"><div class="opt on"><span class="ic">${svg("cpu",16)}</span><span class="m"><span class="t">NAS stack + utilities + Pi packages</span><span class="d">docker · mergerfs · snapraid · smartmontools · nvme-cli · htop · git · …</span></span></div></div>
   <div class="actions"><button class="btn pri" id="go">Install</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("system");},
 disks(p){p.innerHTML=head("Step 2","Disks","Choose a free disk, its role and filesystem. Formatting requires typing the device path manually. The system disk is excluded.")+`<div id="dl"></div><div class="console" id="con"></div>`;
  api("/api/disks").then(d=>{const dl=p.querySelector("#dl");const all=(d&&d.disks)||[];
   const free=all.filter(x=>x.role==="free"&&x.size&&x.size!=="0B");
   // mounted external disks are also pool candidates, but must be unmounted first
   const busy=all.filter(x=>x.role==="removable"&&!x.no_media);
   if(!free.length&&!busy.length){
     dl.innerHTML=`<div class="note">${all.length?"All disks are already used by the system or the pool — connect a new disk.":"No connection to the backend or no disks detected."}</div>`;return;}
   dl.innerHTML="";
   busy.forEach(x=>{const row=el(`<div class="disk"><span class="ic">${svg("disks",26)}</span><div class="info"><div class="p">${x.path}</div><div class="mo">${(x.model||"").slice(0,34)} · ${x.size} · mounted as external: ${(x.mounts||[]).join(", ")}</div></div></div>`);
     const ub=el(`<button class="btn sm">Unmount</button>`);
     ub.title="Detaches the disk from /media — after that it can be formatted into the pool";
     ub.onclick=async()=>{ub.disabled=true;ub.textContent="unmounting…";
       for(const mp of (x.mounts||[]))await api("/api/disk/mount",{method:"POST",body:JSON.stringify({target:mp,unmount:true})});
       R.disks(p);};
     row.appendChild(ub);dl.appendChild(row);});
   if(!free.length){dl.appendChild(el(`<div class="note">No free disks — unmount an external disk above to use it in the pool (formatting will erase its data).</div>`));return;}
   free.forEach(x=>{const row=el(`<div class="disk"><span class="ic">${svg("disks",26)}</span><div class="info"><div class="p">${x.path}</div><div class="mo">${(x.model||"").slice(0,34)} · ${x.size} · ${x.tran||""}</div></div></div>`);
    const ctl=el(`<div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end"></div>`);
    let role="data",fs="ext4";
    const seg=el(`<div class="seg"><button class="on" data-r="data">Data</button><button data-r="parity">Parity</button></div>`);
    seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{role=b.dataset.r;seg.querySelectorAll("button").forEach(z=>z.classList.toggle("on",z===b));});
    const fmt=el(`<button class="btn dng sm">Format</button>`);fmt.onclick=()=>fmtModal(x.path,()=>run("format-disk",{dev:x.path,role,fs}));
    ctl.appendChild(seg);ctl.appendChild(fmt);row.appendChild(ctl);dl.appendChild(row);});});},
 mergerfs(p){p.innerHTML=head("Step 3","mergerfs pool","Combines data disks into /mnt/storage. Requires ≥2 disks — otherwise this step is skipped automatically.")+`<div class="actions"><button class="btn pri" id="go">Build pool</button></div><div class="console" id="con"></div>`;p.querySelector("#go").onclick=()=>run("mergerfs");},
 snapraid(p){p.innerHTML=head("Step 4","Parity · SnapRAID","Generates snapraid.conf, sets up mass-deletion protection and timers (sync 03:00, scrub Sun 05:00).")+
  `<div class="card">${chk("sync","Run the first sync now","May take a while on large disks",false,"layers")}</div>
   <div class="actions"><button class="btn pri" id="go">Configure SnapRAID</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("snapraid",{sync:p.querySelector("[data-k=sync]").checked?"1":"0"});},
 services(p){p.innerHTML=head("Step 5","Apps · Dockge","Installs Dockge — a web manager for docker stacks. Apps themselves are installed from the “App Store” in the panel: it copies the stack, asks for the required fields and brings it up itself.")+
  `<div class="card"><div class="opt on"><span class="ic">${svg("cube",16)}</span><span class="m"><span class="t">Dockge</span><span class="d">stack manager · port 5001 · directory /opt/stacks</span></span></div>
    <div class="actions" style="margin-top:12px"><button class="btn pri" id="godk">Install Dockge</button><a class="btn" href="http://${location.hostname}:5001" target="_blank">Open Dockge ↗</a></div></div>
   <div class="note">${svg("cube",18)}<span>Install apps (Scrutiny, Syncthing, Immich, etc.) from the <b>App Store</b> in the panel — a tab in the Docker window. It also has fields like passwords and ports. Dockge stays around for logs, editing compose files, and start/stop.</span></div>
   <div class="console" id="con"></div>`;
  p.querySelector("#godk").onclick=()=>run("dockge");},
 shares(p){p.innerHTML=head("Step 6","File access","Share /mnt/storage over the network and set up remote access.")+
  `<div class="card" id="box">${chk("samba","Samba (SMB)","Windows, Mac, phone",true,"share")}${chk("nfs","NFS","Linux clients",false,"share")}${chk("avahi","Avahi/mDNS","<host>.local",true,"net")}</div>
   <div class="actions"><button class="btn pri" id="go">Apply</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("shares",{keys:keys(p.querySelector("#box"))});},
 security(p){p.innerHTML=head("Step 7","Security","Sensible defaults. The firewall opens SSH before enabling; key-only login only if keys exist.")+
  `<div class="card" id="box">${chk("unattended","Automatic security updates","unattended-upgrades",true,"shield")}${chk("ufw","Firewall ufw","SSH, shares",false,"shield")}${chk("fail2ban","fail2ban","SSH protection",false,"shield")}${chk("journald","200M journal limit","less SD wear",true,"save")}${chk("log2ram","log2ram","logs in RAM",false,"save")}</div>
   <div class="actions"><button class="btn pri" id="go">Apply</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("security",{keys:keys(p.querySelector("#box"))});},
 tuning(p){p.innerHTML=head("Step 8","Raspberry Pi tuning","Hardware tweaks. config.txt changes take effect after a reboot.")+
  `<div class="card" id="box">${chk("usbpower","USB power","critical for USB SSDs on the Pi 5",true,"plug")}${chk("trim","fstrim (TRIM)","SSD/NVMe speed",true,"disks")}${chk("pcie3","PCIe Gen3 for NVMe","faster, out of spec",false,"cpu")}${chk("cgroup","Memory cgroup","container memory limits",false,"cpu")}${chk("sysctl","Sysctl tuning","swappiness, network",false,"sliders")}${chk("zram","zram swap","compressed swap in RAM",false,"cpu")}${chk("chrony","chrony instead of timesyncd","accurate time synchronization",false,"cpu")}${chk("governor","Adaptive CPU governor","lowers frequency when overheating",false,"sliders")}${chk("watchdog","Watchdog","auto-reboot on hang",false,"cpu")}</div>
   <div class="actions"><button class="btn pri" id="go">Apply</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("pi",{keys:keys(p.querySelector("#box"))});},
 notify(p){p.innerHTML=head("Step 9","Notifications · Pushover","SnapRAID status, SMART problems and overheating — delivered to the Pushover app on your phone.")+
  `<div class="card"><div class="field"><label>User Key</label><input class="mono" id="pu" placeholder="u xxxxxxxxxxxxxxxx"></div>
   <div class="field"><label>Application Token</label><input class="mono" id="pt" placeholder="a xxxxxxxxxxxxxxxx"></div></div>
   <div class="actions"><button class="btn pri" id="go">Save</button><button class="btn" id="test">Test</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("notify",{puser:p.querySelector("#pu").value,ptoken:p.querySelector("#pt").value});
  p.querySelector("#test").onclick=()=>run("notify",{puser:p.querySelector("#pu").value,ptoken:p.querySelector("#pt").value});},
 backup(p){p.innerHTML=head("Step 10","Backups and monitoring","Monitors disk health and space/temperature thresholds (alerts via Pushover).")+
  `<div class="card" id="box">${chk("smartd","SMART monitoring","continuous monitoring + alerts",true,"save")}${chk("spacetemp","Space and temperature","hourly check",true,"sliders")}</div>
   <div class="actions"><button class="btn pri" id="go">Apply</button></div><div class="console" id="con"></div>`;
  p.querySelector("#go").onclick=()=>run("backup",{keys:keys(p.querySelector("#box"))});},
 modules(p){p.innerHTML=head("Step 11","Additional modules","Networking and remote access. Installed individually.")+
  `<div class="card">
   <div class="opt"><span class="ic">${svg("net",16)}</span><span class="m"><span class="t">comitup</span><span class="d">Wi-Fi access point for entering network details on a fresh system</span></span><button class="btn sm" data-a="comitup">Install</button></div>
   <div class="opt"><span class="ic">${svg("shield",16)}</span><span class="m"><span class="t">Tailscale</span><span class="d">secure remote access without port forwarding</span></span><button class="btn sm" data-a="tailscale">Install</button></div>
   </div><div class="console" id="con"></div>`;
  p.querySelectorAll("[data-a]").forEach(b=>b.onclick=()=>run(b.dataset.a));},
};
function renderPanel(){const p=document.getElementById("panel");p.innerHTML="";(R[cur]||R.system)(p);
 // if the step is already configured — show a green "already installed" banner up top, so there's no guessing
 if(DONE[cur]){const b=document.createElement("div");b.className="okban";
  b.innerHTML=`${svg("shield",15)} This step is already configured on the system. Running it again updates/extends it — nothing existing breaks.`;
  p.insertBefore(b,p.firstChild.nextSibling||null);}}

function fmtModal(dev,ok){const s=document.getElementById("scrim");
 s.innerHTML=`<div class="modal"><h3>Format ${dev}?</h3><p>All data on the disk will be permanently erased. Type the device path to confirm.</p>
  <input class="mono" id="cf" placeholder="${dev}" autocomplete="off"><div class="r"><button class="btn" id="cx">Cancel</button><button class="btn dng" id="ok" disabled>Format</button></div></div>`;
 s.classList.add("show");const inp=s.querySelector("#cf"),b=s.querySelector("#ok");
 inp.oninput=()=>b.disabled=inp.value.trim()!==dev;inp.focus();
 s.querySelector("#cx").onclick=()=>s.classList.remove("show");
 b.onclick=()=>{s.classList.remove("show");ok();};}

document.getElementById("dry").onclick=function(){DRY=!DRY;this.setAttribute("aria-checked",DRY);};
/* keep the wizard's theme + accent in sync with the desktop (shared nasdesk / /api/settings) */
const ACCENTS={teal:["#14B8AC","#4C8DF6"],blue:["#4C8DF6","#8A7DFF"],violet:["#8A7DFF","#E05AB4"],
 green:["#1FA971","#14B8AC"],amber:["#E0913C","#F0876A"],coral:["#F0665E","#E05AB4"]};
const hexA=(h,a)=>{const n=parseInt(h.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;};
// contrasting text on a solid accent fill (white/dark per WCAG)
function inkOn(hex){const n=parseInt(hex.slice(1),16),f=c=>{c/=255;return c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);};
 const L=.2126*f(n>>16&255)+.7152*f(n>>8&255)+.0722*f(n&255);return 1.05/(L+.05)>=(L+.05)/.05?"#FFFFFF":"#04181A";}
function applyDeskTheme(S){const root=document.documentElement,t=(S&&S.theme)||"light";
 if(t==="auto")root.removeAttribute("data-theme");else root.setAttribute("data-theme",t);
 const isLight=t==="light"||(t==="auto"&&matchMedia("(prefers-color-scheme:light)").matches);
 const a=ACCENTS[S&&S.accent]||ACCENTS.teal;
 root.style.setProperty("--accent",a[0]);root.style.setProperty("--accent-2",a[1]);
 root.style.setProperty("--accent-soft",hexA(a[0],.16));root.style.setProperty("--accent-ink",inkOn(a[0]));}
try{applyDeskTheme(JSON.parse(localStorage.getItem("nasdesk")||"{}"));}catch(e){}
(async function(){
 try{const a=await(await fetch("/api/auth/state")).json();if(!a.authed)authGate();}catch(e){}
 const sv=await api("/api/settings");if(sv&&sv.settings&&Object.keys(sv.settings).length)applyDeskTheme(sv.settings);
 const raw=await api("/api/setup/state");let st=null;
 try{st=raw&&typeof raw.log==="string"?JSON.parse(raw.log):raw;}catch(e){st=null;}
 if(st&&st.host){STATE=st;document.getElementById("hostlbl").textContent=st.host+" · "+(st.iface||"");
   // show what's already installed/configured as done (checkmarks in the step list)
   DONE.system=!!STATE.docker;
   DONE.disks=(STATE.data_disks||0)>0;
   DONE.mergerfs=!!STATE.pool;
   DONE.snapraid=!!STATE.snapraid;
   DONE.services=!!STATE.docker;
   DONE.shares=!!(STATE.samba||STATE.nfs);
   DONE.security=!!(STATE.ufw||STATE.fail2ban);}
 else document.getElementById("hostlbl").textContent="demo (no backend)";renderRail();renderPanel();})();
