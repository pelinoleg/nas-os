const THR_HINT="Флаги пониженного напряжения/троттлинга Raspberry Pi. Если горит — блоку питания не хватает тока или CPU перегрелся и снизил частоту.";
function histChart(title,h,series,fmt,maxOverride){
 const W=560,H=104,pad=6,n=h.length;
 const vals=[];series.forEach(s=>h.forEach(p=>{if(p[s.key]!=null)vals.push(p[s.key]);}));
 const mx=maxOverride||Math.max(1,...vals)*1.15;
 const X=i=>pad+(n>1?i/(n-1):0)*(W-2*pad);
 const Y=v=>H-pad-(Math.min(Math.max(v||0,0),mx)/mx)*(H-2*pad);
 const grid=[0.5,1].map(f=>`<line x1="${pad}" y1="${(H-pad-f*(H-2*pad)).toFixed(1)}" x2="${W-pad}" y2="${(H-pad-f*(H-2*pad)).toFixed(1)}" stroke="var(--track,rgba(128,128,128,.15))" stroke-width="1"/>`).join("");
 const paths=series.map(s=>{let d="";h.forEach((p,i)=>{if(p[s.key]==null)return;d+=(d?"L":"M")+X(i).toFixed(1)+" "+Y(p[s.key]).toFixed(1);});
   if(!d)return"";const area=s.fill?`<path d="${d} L${X(n-1).toFixed(1)} ${H-pad} L${X(0).toFixed(1)} ${H-pad} Z" fill="${s.color}" opacity=".13"/>`:"";
   return area+`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round"/>`;}).join("");
 const cur=series.map(s=>{const last=[...h].reverse().find(p=>p[s.key]!=null);return `<b style="color:${s.color}">${last?fmt(last[s.key]):"—"}</b>`;}).join(" ");
 return `<div class="hist-card"><div class="hist-h"><span>${title}</span><span class="hist-cur">${cur}</span></div>
   <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">${grid}${paths}</svg></div>`;
}
const HIST_RANGES=[["1h","1 час"],["6h","6 часов"],["24h","24 часа"],["7d","7 дней"],["30d","30 дней"]];

async function runStream(action,params,con,onDone){
 con.style.display="block";con.innerHTML=`<div style="color:var(--mut)">$ ${action} …</div>`;
 let resp;try{resp=await fetch("/api/setup/"+action,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dry:false,params:params||{}})});}
 catch(e){con.innerHTML=`<div class="er">нет связи с бэкендом</div>`;return;}
 if(!resp.body){con.textContent=await resp.text();return;}
 const rd=resp.body.getReader(),dec=new TextDecoder();let buf="",code=null;con.innerHTML="";
 const push=l=>{if(l.startsWith("__EXIT__")){code=parseInt(l.slice(8),10);return;}
  const stick=con.scrollHeight-con.scrollTop-con.clientHeight<40;
  con.appendChild(el(`<div class="${/ОШИБКА|ОТКАЗ|ABORT/i.test(l)?"er":""}">${l.replace(/</g,"&lt;")||"&nbsp;"}</div>`));if(stick)con.scrollTop=con.scrollHeight;};
 for(;;){const {done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});const ps=buf.split("\n");buf=ps.pop();ps.forEach(push);}
 if(buf)push(buf);if(code===0&&onDone)onDone();
}
// стрим произвольного POST-эндпоинта в консоль (для установки обновлений)
async function streamPost(url,con,onDone,body){
 con.innerHTML=`<div style="color:var(--mut)">запуск…</div>`;
 let resp;try{resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});}
 catch(e){con.innerHTML=`<div class="er">нет связи с сервером</div>`;if(onDone)onDone(-1);return;}
 if(!resp.body){con.textContent=await resp.text();if(onDone)onDone(0);return;}
 const rd=resp.body.getReader(),dec=new TextDecoder();let buf="",code=null;con.innerHTML="";
 const push=l=>{if(l.startsWith("__EXIT__")){code=parseInt(l.slice(8),10);return;}
  const stick=con.scrollHeight-con.scrollTop-con.clientHeight<40;   // липнуть к низу только если пользователь уже внизу (иначе не даём прокрутить/скопировать)
  const isErr=/^rsync:|\(code \d|IO error|permission denied|failed to (set|create|open)|cannot |ОШИБКА|ОТКАЗ|не удалось|не создать|не запустить/i.test(l);
  con.appendChild(el(`<div class="${isErr?"er":""}">${l.replace(/</g,"&lt;")||"&nbsp;"}</div>`));if(stick)con.scrollTop=con.scrollHeight;};
 for(;;){const {done,value}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});const ps=buf.split("\n");buf=ps.pop();ps.forEach(push);}
 if(buf)push(buf);if(onDone)onDone(code==null?0:code);
}

   <div class="dp-cap"><div class="capbar" style="width:150px"><span class="used" style="width:${pct}%"></span></div>

  sb.onclick=()=>snapraidDlg(reload);w.appendChild(sb);}

function yamlLint(text){const out=[];(text||"").split("\n").forEach((ln,i)=>{
  if(((ln.match(/^[ \t]*/)||[""])[0]).indexOf("\t")>=0)out.push({line:i,msg:"табуляция в отступе — YAML требует пробелы"});
 });return out;}

function edPanel(cm,panel,probs,srvErr){if(!panel)return;let h="";
  if(srvErr)h+=`<div class="ed-errbox">${esc(srvErr)}</div>`;
  else if(probs&&probs.length)h+=`<div class="ed-errbox"><span class="ed-warn">Проблемы отступов</span>\n`+probs.slice(0,8).map(p=>"строка "+(p.line+1)+": "+p.msg).join("\n")+`</div>`;

// живой линт: только табы (детерминированно, без парсера) — подсветка строки + маркер

function edServerErr(cm,panel,log){cm._srvErr=(log||"").trim();edClearMarks(cm);yamlLint(cm.getValue()).forEach(p=>edMark(cm,p.line,p.msg));
  const m=(log||"").match(/line (\d+)/i)||(log||"").match(/:(\d+):\d+/)||(log||"").match(/\bat line (\d+)/i);
  if(m){const ln=Math.min(cm.lineCount()-1,Math.max(0,parseInt(m[1],10)-1));edMark(cm,ln);cm.setCursor(ln,0);cm.scrollIntoView({line:ln,ch:0},60);cm.focus();}
  edPanel(cm,panel,[],cm._srvErr);}

 /* Загрузка. items — File или {file, rel}, где rel — путь подпапок внутри dir
    (загрузка папки целиком). dir по умолчанию — текущий каталог. */
 async function doUpload(items,dir){
   items=[...items].map(x=>x&&x.file?x:{file:x,rel:""}).filter(x=>x.file);
   if(!items.length)return;
   dir=dir||cwd;
   const total=items.reduce((a,x)=>a+(x.file.size||0),0);
   const dirs=new Set(items.map(x=>x.rel).filter(Boolean));
   // имя файла держим в подписи, а не в заголовке: длинное имя обрезалось многоточием
   const title=dirs.size?"Загрузка папки":(items.length>1?`Загрузка ${items.length} файлов`:"Загрузка файла");
   let cur=items[0].file.name;
   let sent=0,done=0,fail=0,idx=0;const active=new Map(); // xhr → загружено байт
   const o=opAdd(title,{cancel:()=>{active.forEach((v,x)=>{try{x.abort();}catch(e){}});}});
   const upd=()=>{let n=0;active.forEach(v=>n+=v);
     opSet(o,total?Math.min((sent+n)/total,1):(done+fail)/items.length,
       `${done+fail} / ${items.length}${fail?` · ошибок: ${fail}`:""} · ${fmtB(sent+n)} из ${fmtB(total)} · ${cur}`);};
   let lastErr="";
   const one=it=>new Promise(res=>{const xhr=new XMLHttpRequest();active.set(xhr,0);
     cur=(it.rel?it.rel+"/":"")+it.file.name;upd();
     xhr.open("POST","/api/fs/upload-raw?path="+encodeURIComponent(dir)
       +"&name="+encodeURIComponent(it.file.name)
       +(it.rel?"&rel="+encodeURIComponent(it.rel):""));
     if(xhr.upload)xhr.upload.onprogress=e=>{if(e.lengthComputable){active.set(xhr,e.loaded);upd();}};
     const fin=ok=>{active.delete(xhr);sent+=it.file.size||0;ok?done++:fail++;upd();res(ok);};
     xhr.onload=()=>{let ok=xhr.status===200;
       try{const j=JSON.parse(xhr.responseText);ok=ok&&j.ok!==false;if(!ok&&j.log)lastErr=String(j.log).slice(0,90);}
       catch(e){if(!ok)lastErr="HTTP "+xhr.status;}
       if(!ok&&!lastErr)lastErr="HTTP "+xhr.status;
       fin(ok);};
     xhr.onerror=()=>{lastErr="нет связи с сервером";fin(false);};
     xhr.onabort=()=>fin(false);
     xhr.send(it.file);});
   const worker=async()=>{while(idx<items.length&&!o.cancelled)await one(items[idx++]);};
   const par=Math.max(1,Math.min(6,+SET.fmUpPar||2));
   await Promise.all(Array.from({length:par},()=>worker()));
   const okAll=!o.cancelled&&!fail;
   const what=namesSummary(items.map(x=>(x.rel?x.rel.split("/")[0]+"/":"")+x.file.name));
   opEnd(o,okAll,o.cancelled?`отменено · загружено ${done} из ${items.length}${what?` · ${what}`:""}`
     :`${done} / ${items.length}${what?` · ${what}`:""}${fail?` · ошибок: ${fail}`:""}${fail&&lastErr?` · ${lastErr}`:""}`);
   if(LIVE){notifyDone(o.cancelled?"Загрузка отменена":okAll?"Загрузка завершена":"Загрузка с ошибками",`${done} из ${items.length} · ${dir}`);
     logAct(items.length>1?`Загружено ${done} из ${items.length} файлов`+(o.cancelled?" (отменено)":""):`Загружен файл ${items[0].file.name}`,dir,okAll?"ok":"warn");}
   else toast("Демо");
   load(cwd);}

   if(depth>32||out.length>20000)return;

   else if(en.isDirectory){const sub=rel?rel+"/"+en.name:en.name;
     for(const k of await entRead(en.createReader()))await walkEntry(k,sub,out,depth+1);}}

 /* ── Источники ── */
 function tabSources(tc){const c=CFG,push=isPush(),per=!isPushSsh()&&c.dest_mode==="per";
  tc.innerHTML=`<h3 class="set-title">Источники</h3><p class="set-sub">${push?"Какие папки этого NAS отправлять в приёмник.":"Какие папки главного NAS копировать и куда."}</p>
   ${isPushSsh()?"":`<div class="srow"><div class="srow-l"><div class="srow-t">Режим приёмника${tipHTML("Единая папка — всё в одну папку по подпапкам. Отдельно для каждой — у каждого источника своя папка-приёмник.")}</div><div class="srow-d">${per?"у каждого источника своя папка":"всё в одну папку по подпапкам"}</div></div><div class="srow-c"><div class="seg" id="sDm"><button data-v="single" class="${!per?"on":""}">Единая папка</button><button data-v="per" class="${per?"on":""}">Отдельно</button></div></div></div>`}
   <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 6px"><span class="set-h" style="margin:0;padding:0;border:none">Что копировать</span><button class="btn sm pri" id="sAdd">${svg("plus",13)} ${push?"Выбрать папки":"Выбрать с NAS"}</button></div>
   <div id="sJobs"></div>
   ${!per&&!push?`<div class="nb-field" style="margin-top:14px"><label>Общая папка-приёмник${tipHTML("Локальная папка на этом NAS, куда попадёт всё выбранное (каждый источник — своей подпапкой).")}</label><div class="nb-field-row"><input class="mono" id="sBase" value="${att(c.dest_base||"/mnt/storage/nas-backup")}"><button class="btn sm" id="sBaseB">${svg("folder",13)} Выбрать</button></div></div>`:""}
   ${push&&!c.dest_base?`<div class="nb-dwarn" style="margin-top:12px">Приёмник ещё не выбран — задайте его на вкладке «Приёмник», иначе бэкап не запустится.</div>`:""}
   <details class="nb-det"><summary class="nb-sum">Исключения${tipHTML("Шаблоны rsync (по одному в строке): что не копировать — мусор, кэши, служебное.")}</summary>
     <textarea id="sExcl" class="nb-excl" spellcheck="false">${esc((c.excludes||[]).join("\n"))}</textarea>
     <div style="display:flex;gap:8px;margin-top:6px"><button class="btn sm" id="sExDev">${svg("code",13)} Добавить шаблоны разработки</button><button class="btn sm" id="sExReset">Сбросить по умолчанию</button></div>
   </details>`;
  const g=s=>tc.querySelector(s);
  const drawJobs=()=>{const box=g("#sJobs");box.innerHTML=JOBS.length?"":'<div style="color:var(--mut);font-size:12px;padding:6px 0">Пусто — нажмите «Выбрать с NAS».</div>';
   JOBS.forEach((j,i)=>{const exc=(j.excludes&&j.excludes.length)?`<span class="nb-exc" title="${att("Исключено из этой папки:\n"+j.excludes.join("\n"))}">−${j.excludes.length} искл.</span>`:"";
    const srcT=(push?"/":"")+j.src;
    const row=el(`<div class="nb-job"><span class="nb-src mono" title="${att(srcT)}">${svg(push?"folder":"net",13)} ${esc(srcT)}</span>${exc}<span class="nb-arr">→</span><span class="nb-dst mono" title="${att(j.dest)}">${esc(j.dest)}</span>${per?`<button class="iconbtn nb-jb" title="Папка-приёмник">${svg("folder",14)}</button>`:""}<button class="iconbtn dng nb-jx" title="Убрать">${svg("x",14)}</button></div>`);
    row.querySelector(".nb-jx").onclick=()=>{JOBS.splice(i,1);saveCfg({jobs:JOBS});drawJobs();};
    const jb=row.querySelector(".nb-jb");if(jb)jb.onclick=()=>nbPickLocal(j.dest.replace(/\/[^/]+$/,"")||"/mnt",p=>{JOBS[i].dest=p.replace(/\/$/,"")+"/"+j.src.split("/").pop();saveCfg({jobs:JOBS});drawJobs();});
    box.appendChild(row);});};
  drawJobs();
  wireSeg(tc,"#sDm",v=>saveCfg({dest_mode:v}).then(()=>tabSources(tc)));
  const bb=g("#sBase");if(bb)bb.onchange=()=>saveCfg({dest_base:bb.value.trim()});
  const bbB=g("#sBaseB");if(bbB)bbB.onclick=()=>nbPickLocal(bb.value||"/mnt",p=>{bb.value=p;saveCfg({dest_base:p});});
  g("#sAdd").onclick=()=>{
    if(push&&!CFG.dest_base){toast("Сначала выберите приёмник (вкладка «Приёмник»)");return;}
    // существующие per-job исключения → абсолютные пути для преселекта дерева
    const preExcl=[];JOBS.forEach(j=>{const base=j.src.replace(/\/$/,"");(j.excludes||[]).forEach(rel=>preExcl.push(base+rel));});
    nbPickSource(JOBS.map(j=>j.src),preExcl,(list,exl)=>{const chosen=new Set(list);
    JOBS=JOBS.filter(j=>chosen.has(j.src));                                   // снятые — убрать
    list.forEach(src=>{if(!JOBS.some(j=>j.src===src))JOBS.push({src,dest:destFor(src),enabled:true});});
    if(!per)JOBS.forEach(j=>{j.dest=destFor(j.src);});                        // единая папка: выровнять дерево у всех (в т.ч. старых)
    // разложить исключения по задачам: анкорный путь относительно src (ведущий /)
    JOBS.forEach(j=>{const base=j.src.replace(/\/$/,"");
      const ex=(exl||[]).filter(p=>p.startsWith(base+"/")).map(p=>p.slice(base.length));
      if(ex.length)j.excludes=ex;else delete j.excludes;});
    saveCfg({jobs:JOBS}).then(()=>tabSources(tc));},
    push?{title:"Что копировать с этого NAS",loading:"Читаю папки…"}:null);};
  const exList=()=>g("#sExcl").value.split("\n").map(x=>x.trim()).filter(Boolean);
  const exSet=arr=>{const uniq=[...new Set(arr)];g("#sExcl").value=uniq.join("\n");saveCfg({excludes:uniq});};
  g("#sExcl").onchange=()=>exSet(exList());
  g("#sExDev").onclick=()=>exSet(exList().concat(NB_EXCL_DEV));
  g("#sExReset").onclick=()=>exSet(NB_EXCL_DEFAULT.slice());
 }
 /* ── Удалённые файлы ── */
 function tabDeleted(tc){const c=CFG,dm=c.delete_mode||"archive",push=isPush();
  const HELP=push?{archive:{t:"Архив удалённых (рекомендуется)",d:"Файл, удалённый на этом NAS, не пропадает из копии — он переносится в папку _deleted/дата на приёмнике. Его можно восстановить. Старые снимки автоматически чистятся (ниже), чтобы место не росло бесконечно."},
   mirror:{t:"Точное зеркало",d:"Копия 1:1. Что удалено здесь — удаляется и на приёмнике. Экономит место, но случайное удаление на этом NAS удалит файл и из копии — восстановить будет неоткуда."},
   add:{t:"Только добавлять",d:"На приёмнике ничего не удаляется — только добавляются новые и изменённые файлы. Самый безопасный от потерь, но копия со временем накапливает и давно удалённое, и растёт."}}
  :{archive:{t:"Архив удалённых (рекомендуется)",d:"Файл, удалённый на главном NAS, не пропадает — он переносится в папку _deleted/дата на этом NAS. Его можно восстановить. Старые снимки автоматически чистятся (ниже), чтобы место не росло бесконечно."},
   mirror:{t:"Точное зеркало",d:"Копия 1:1. Что удалено на источнике — удаляется и здесь. Экономит место, но случайное удаление на главном NAS удалит файл и из бэкапа — восстановить будет неоткуда."},
   add:{t:"Только добавлять",d:"Локально ничего не удаляется — только добавляются новые и изменённые файлы. Самый безопасный от потерь, но бэкап со временем накапливает и то, что на источнике давно удалено, и растёт."}};
  const h=HELP[dm]||HELP.archive;
  tc.innerHTML=`<h3 class="set-title">Удалённые файлы</h3><p class="set-sub">Что делать с файлами, которые удалили ${push?"на этом NAS":"на главном NAS"}.</p>
   <div class="srow"><div class="srow-l"><div class="srow-t">Режим</div></div><div class="srow-c"><div class="seg" id="dDel"><button data-v="archive" class="${dm==="archive"?"on":""}">Архив</button><button data-v="mirror" class="${dm==="mirror"?"on":""}">Зеркало</button><button data-v="add" class="${dm==="add"?"on":""}">Добавлять</button></div></div></div>
   <div class="nb-help" id="dHelp"><b>${esc(h.t)}</b><span>${esc(h.d)}</span></div>
   <div class="srow" id="dGuardRow" style="${dm==="add"?"display:none":""}"><div class="srow-l"><div class="srow-t">Защита от массового удаления${tipHTML("Если за прогон удалилось бы больше этого % файлов (от числа в прошлый раз) — бэкап останавливается и НИЧЕГО не удаляет. Спасает, если источник случайно стёрли/размонтировали. Рекомендую 20%. 0 — выключить защиту.")}</div><div class="srow-d">стоп, если удаляется слишком много (рекоменд. 20%)</div></div><div class="srow-c"><input class="mono" id="dMax" style="max-width:60px" value="${c.max_delete_pct==null?20:c.max_delete_pct}"><span style="color:var(--mut);font-size:12px">%</span></div></div>
   <div id="dArch" style="${dm==="archive"?"":"display:none"}">
   <div class="set-h">Куда складывать удалённые${tipHTML("Шаблон папки внутри приёмника, куда переносятся удалённые/изменённые файлы. Соберите из токенов ниже. «/» создаёт вложенные папки (напр. _deleted/{year}/{month}). Первая папка должна быть постоянной (её и чистит ретеншен).")}</div>
   <div class="usb-sub">
     <input id="dTpl" class="mono" value="${att(c.deleted_dir||"_deleted/{date}")}" placeholder="_deleted/{date}">
     <div class="usb-prev">Путь: <span class="mono" id="dPrev"></span></div>
     <div class="usb-chips"><span class="usb-lbl">Токены:</span>${DEL_TOKENS.map(t=>`<button class="usb-tok" data-t="${att(t[0])}" title="${att(t[1])}">${esc(t[0])}</button>`).join("")}<button class="usb-tok" data-t="/" title="вложенная папка">/</button></div>
     <div class="usb-chips"><span class="usb-lbl">Готовые:</span><button class="usb-pre" data-t="_deleted/{date}">по дате</button><button class="usb-pre" data-t="_deleted/{year}/{month}">год / месяц</button><button class="usb-pre" data-t="_deleted/{datetime}">дата и время</button></div>
   </div>
   <div class="srow" id="dRetRow"><div class="srow-l"><div class="srow-t">Хранить архив удалённых${tipHTML("Старые снимки чистятся по возрасту И по суммарному размеру — что наступит раньше. 0 в поле — этот лимит не применять.")}</div><div class="srow-d">чистка по возрасту и по размеру</div></div><div class="srow-c"><input class="mono" id="dRd" style="max-width:60px" value="${c.retention_days||0}"><span style="color:var(--mut);font-size:12px">дней</span><input class="mono" id="dRg" style="max-width:60px" value="${c.retention_gb||0}"><span style="color:var(--mut);font-size:12px">ГБ</span></div></div>
   ${isPushSsh()?`<div class="mon-note">На SSH-приёмнике применяется только срок в днях: считать размер архива по сети слишком дорого, лимит в ГБ не действует. Если путь приёмника «от модуля» (без ведущего /), автоочистка архива недоступна вовсе — старые снимки удаляйте вручную.</div>`:""}
   </div>`;
  const g=s=>tc.querySelector(s);
  wireSeg(tc,"#dDel",v=>{g("#dArch").style.display=v==="archive"?"":"none";g("#dGuardRow").style.display=v==="add"?"none":"";const hh=HELP[v];g("#dHelp").innerHTML=`<b>${esc(hh.t)}</b><span>${esc(hh.d)}</span>`;saveCfg({delete_mode:v});});
  g("#dMax").onchange=()=>saveCfg({max_delete_pct:+g("#dMax").value||0});
  g("#dRd").onchange=()=>saveCfg({retention_days:+g("#dRd").value||0});
  g("#dRg").onchange=()=>saveCfg({retention_gb:+g("#dRg").value||0});
  const dt=g("#dTpl"),dp=g("#dPrev"),base=(c.dest_base||(push?"…":"/mnt/storage/nas-backup")).replace(/\/$/,"");
  const updD=()=>dp.textContent=base+"/…/"+nbDelPreview(dt.value);updD();
  dt.oninput=updD;
  dt.onchange=()=>saveCfg({deleted_dir:dt.value.trim()});
  tc.querySelectorAll("#dArch .usb-tok").forEach(b=>b.onclick=()=>{const psel=dt.selectionStart||dt.value.length;
    dt.value=dt.value.slice(0,psel)+b.dataset.t+dt.value.slice(dt.selectionEnd||psel);dt.focus();updD();dt.onchange();});
  tc.querySelectorAll("#dArch .usb-pre").forEach(b=>b.onclick=()=>{dt.value=b.dataset.t;updD();dt.onchange();});
 }
 /* ── Расписание ── */
 function tabSched(tc){const c=CFG,s=c.schedule||{},wk=s.freq==="weekly";
  tc.innerHTML=`<h3 class="set-title">Расписание</h3><p class="set-sub">Автоматический бэкап. Если ${isPush()?"приёмник недоступен":"главный NAS недоступен"} — тихо пропускается.</p>
   <div class="mon-row"><span>Включить автоматический бэкап</span><label class="tgl"><input type="checkbox" id="hOn" ${s.enabled?"checked":""}><span class="sl"></span></label></div>
   <div id="hRow" style="${s.enabled?"":"display:none"}">
    <div class="srow"><div class="srow-l"><div class="srow-t">Частота</div></div><div class="srow-c"><div class="seg" id="hFreq"><button data-v="daily" class="${!wk?"on":""}">Ежедневно</button><button data-v="weekly" class="${wk?"on":""}">Еженедельно</button></div></div></div>
    <div class="srow" id="hDowRow" style="${wk?"":"display:none"}"><div class="srow-l"><div class="srow-t">День недели</div></div><div class="srow-c"><select id="hDow" class="ev-prio">${[["Mon","понедельник"],["Tue","вторник"],["Wed","среда"],["Thu","четверг"],["Fri","пятница"],["Sat","суббота"],["Sun","воскресенье"]].map(([v,l])=>`<option value="${v}"${s.dow===v?" selected":""}>${l}</option>`).join("")}</select></div></div>
    <div class="srow"><div class="srow-l"><div class="srow-t">Время${tipHTML("HH:MM (24ч). Ночь/раннее утро — меньше мешает.")}</div></div><div class="srow-c"><input class="mono" id="hTime" style="max-width:90px" value="${s.time||"03:00"}"></div></div>
   </div>`;
  const g=x=>tc.querySelector(x);
  const save=()=>saveCfg({schedule:{enabled:g("#hOn").checked,freq:g("#hFreq .on").dataset.v,dow:g("#hDow").value,time:g("#hTime").value.trim()}});
  g("#hOn").onchange=()=>{g("#hRow").style.display=g("#hOn").checked?"":"none";save();};
  wireSeg(tc,"#hFreq",v=>{g("#hDowRow").style.display=v==="weekly"?"":"none";save();});
  g("#hDow").onchange=save;g("#hTime").onchange=save;
 }
 /* ── Обзор ── */
 function tabOverview(tc){const c=CFG,push=isPush();
  const sched=c.schedule&&c.schedule.enabled?((c.schedule.freq==="weekly"?"еженедельно в":"ежедневно в")+" "+(c.schedule.time||"03:00")):"выключено";
  // first row: pull — where we take FROM; push — where we send TO
  const ep=push?(isPushSsh()?(c.host?"ssh "+c.user+"@"+c.host+":"+(c.dest_base||"?"):"не задан")
                            :(c.dest_base||"не выбран"))
              :(c.host?(c.transport==="ssh"?"ssh ":"rsync ")+c.user+"@"+c.host:"не задан");
  const epOk=push?(isPushSsh()?!!c.host:!!c.dest_base):!!c.host;
  tc.innerHTML=`<h3 class="set-title">${push?"Бэкап с этого NAS":"Бэкап главного NAS"}</h3>
   <div class="ov-health"><div class="ovh-list">
     <div class="ovh-row"><span class="ovh-dot" style="background:${epOk?"var(--good)":"var(--mut)"}"></span><span class="ovh-n">${push?"Приёмник":"Источник"}</span><span class="ovh-v" title="${att(ep)}">${esc(ep)}</span></div>
     <div class="ovh-row"><span class="ovh-dot" style="background:var(--accent)"></span><span class="ovh-n">Папок в бэкапе</span><span class="ovh-v">${(c.jobs||[]).length}</span></div>
     <div class="ovh-row"><span class="ovh-dot" style="background:var(--accent-2)"></span><span class="ovh-n">Расписание</span><span class="ovh-v" title="${att(sched)}">${esc(sched)}</span></div>
     <div class="ovh-row"><span class="ovh-dot" style="background:var(--dim)"></span><span class="ovh-n">Удалённые</span><span class="ovh-v">${c.delete_mode==="mirror"?"зеркало":c.delete_mode==="add"?"не удалять":"архив"}${c.verify?" · сверка":""}</span></div>
     <div class="ovh-row"><span class="ovh-dot" id="oRecvDot" style="background:var(--mut)"></span><span class="ovh-n">${push?"Состояние":"Приёмник"}</span><span class="ovh-v" id="oRecvV">проверка…</span></div>
   </div></div>
   <div class="set-h">Последний прогон</div>
   <div id="oStatus" style="font-size:12.5px;color:var(--dim);padding:2px 2px 6px">загрузка…</div>
   <div class="nb-foot"><button class="btn" id="oDry">Пробный прогон</button><button class="btn pri" id="oRun">${svg("sync",14)} Запустить бэкап</button><button class="btn sm dng" id="oCancel" style="display:none">${svg("x",13)} Остановить</button><button class="btn sm" id="oTest" style="margin-left:auto">${svg("refresh",13)} Проверить связь</button></div>
   <div class="nb-prog" id="oProg" style="display:none;margin-top:10px"></div>
   <div class="set-h">Папки</div>
   <div id="oDwarn" class="nb-dwarn" style="display:none"></div>
   <div id="oJobs"></div>
   <div style="margin-top:12px"><button class="btn sm" id="oLog">${svg("logs",13)} <span id="oLogT">Показать журнал</span></button></div>
   <div class="upd-con" id="oCon" style="display:none;margin-top:8px"></div>`;
  const g=s=>tc.querySelector(s);
  const qCaption=st=>`<span style="color:var(--warn)">в очереди${st.queue_after?` — начнётся после «${esc(st.queue_after)}»`:""}${st.queue_ahead?`, впереди ещё ${st.queue_ahead}`:""}</span>`;
  // папки со статусом последнего прогона (перекрашиваем и после завершения бэкапа)
  const paintStatus=()=>Promise.all([nbG("/api/backup/status"),nbG("/api/backup/dest-state")]).then(([st,ds])=>{const jn=g("#oJobs");if(!jn)return;
   const byS={};((st&&st.jobs)||[]).forEach(j=>byS[j.src]=j);
   const byD={};((ds&&ds.jobs)||[]).forEach(j=>byD[j.src]=j);
   if(!(c.jobs||[]).length){jn.innerHTML='<div style="color:var(--mut);font-size:12px;padding:4px 0">Источники не выбраны — добавьте на вкладке «Источники».</div>';}
   else jn.innerHTML="";
   let miss=0,emptyN=0;
   (c.jobs||[]).forEach(j=>{const r=byS[j.src],d=byD[j.src];let dot,badge="";
    if(d&&!d.exists){dot="var(--danger)";badge=`<span class="nb-warn dng" title="Папки нет в приёмнике — удалена вручную? Запусти бэкап, чтобы восстановить.">нет папки</span>`;miss++;}
    else if(d&&d.empty){dot="var(--warn)";badge=`<span class="nb-warn wrn" title="Папка в приёмнике есть, но пуста.">пусто</span>`;emptyN++;}
    else dot=r?(r.ok?"var(--good)":"var(--danger)"):"var(--mut)";
    const vb=r&&(r.verify_err?`<span class="nb-warn wrn" title="Сверка контрольных сумм не смогла завершиться — см. журнал.">сверка не удалась</span>`:r.verify_bad?`<span class="nb-warn dng" title="Содержимое ${r.verify_bad} файла(ов) отличается от источника — см. журнал прогона.">≠ ${r.verify_bad}</span>`:"")||"";
    const srcT=(push?"/":"")+j.src;
    jn.appendChild(el(`<div class="nb-job"><span class="ovh-dot" style="background:${dot};flex:none"></span><span class="nb-src mono" title="${att(srcT)}">${esc(srcT)}</span><span class="nb-arr">→</span><span class="nb-dst mono" title="${att(j.dest)}">${esc(j.dest)}</span>${badge}${vb}${r&&r.size?`<span class="nb-sz mono">${fmtB(r.size)}</span>`:""}</div>`));});
   // предупреждение о приёмнике + строка «Приёмник» в сводке
   const rd=g("#oRecvDot"),rv=g("#oRecvV"),dw=g("#oDwarn");
   const notMnt=ds&&ds.base_mounted===false;
   if(rd&&rv){rv.title="";   // textContent bypasses the innerHTML translation hook — translate by hand
    if(ds&&ds.unset){rd.style.background="var(--mut)";rv.textContent=nasTr("не выбран");}
    else if(ds&&ds.remote){rd.style.background="var(--accent)";rv.textContent=nasTr("на другом сервере");}
    else if(notMnt){rd.style.background="var(--danger)";rv.textContent=nasTr("не смонтирован");}
    else if(miss){rd.style.background="var(--danger)";rv.textContent=miss+nasTr(" без папки");}
    else if(emptyN){rd.style.background="var(--warn)";rv.textContent=emptyN+nasTr(" пусто");}
    else if((c.jobs||[]).length){rd.style.background="var(--good)";rv.textContent=nasTr("в порядке");}
    else{rd.style.background="var(--mut)";rv.textContent="—";}
    rv.title=rv.textContent;}
   if(dw){let m="",cls="nb-dwarn";
    if(ds&&ds.unset){m=`Приёмник ещё не выбран — задайте его на вкладке «Приёмник», иначе бэкап не запустится.`;cls="nb-dwarn wrn";}
    else if(notMnt){m=`⚠ Приёмник не смонтирован (${esc(ds.base||"")}) — бэкап не запустится.`;}
    else if(miss){m=`⚠ Папок нет в приёмнике: ${miss}. Похоже, удалены вручную. Запусти бэкап — они восстановятся.`;}
    else if(emptyN){m=`Папок пусто в приёмнике: ${emptyN}.`;cls="nb-dwarn wrn";}
    dw.className=cls;dw.style.display=m?"block":"none";dw.innerHTML=m;}
   const sn=g("#oStatus");if(sn){if(st&&st.running)sn.innerHTML=`<span style="color:var(--accent)">идёт сейчас…</span>`;
    else if(st&&st.queued)sn.innerHTML=qCaption(st);
    else if(st&&st.ts){const ok=(st.jobs||[]).filter(x=>x.ok).length,tot=(st.jobs||[]).length;sn.innerHTML=`${fmDate(st.ts)} · <b style="color:${ok===tot?"var(--good)":"var(--warn)"}">${ok}/${tot}</b> задач успешно`;}
    else sn.textContent=nasTr("ещё не запускался");}});
  paintStatus();
  const con=g("#oCon");
  // фон + переподключение к логу (переживает перезагрузку страницы)
  const nbErr=l=>/^rsync:|\(code \d|IO error|permission denied|failed to (set|create|open)|cannot |ОШИБКА|ОТКАЗ|не удалось|не создать|не запустить/i.test(l);
  const nbAppend=lines=>{const st=con.scrollHeight-con.scrollTop-con.clientHeight<40;
    lines.forEach(l=>con.appendChild(el(`<div class="${nbErr(l)?"er":""}">${(l||"").replace(/</g,"&lt;")||"&nbsp;"}</div>`)));if(st)con.scrollTop=con.scrollHeight;};
  nbCursor=0;nbStarted=null;
  const setBusy=b=>{const r=g("#oRun"),d=g("#oDry"),cb=g("#oCancel");if(r)r.disabled=b;if(d)d.disabled=b;if(cb)cb.style.display=b?"":"none";};
  function attachLog(){clearInterval(win._nbpi);
   win._nbpi=setInterval(async()=>{if(!document.body.contains(con)){clearInterval(win._nbpi);win._nbpi=null;return;}
    const r=await nbG("/api/backup/log?since="+nbCursor);if(!r)return;
    if(nbStarted!==null&&r.started!==nbStarted){con.innerHTML="";nbCursor=0;}
    nbStarted=r.started;
    if(r.base>nbCursor&&nbCursor>0)con.innerHTML="";
    if(r.lines&&r.lines.length)nbAppend(r.lines);
    nbCursor=r.seq;
    const op=g("#oProg");
    if(op){if(r.running){const ln=r.line||"";
      const pm=/(\d+)%/.exec(ln),pct=pm?+pm[1]:null;
      const rm=/([\d.]+[KMGT]?B\/s)/.exec(ln),rate=rm?rm[1]:"";
      const tk=/to-chk=(\d+)\/(\d+)/.exec(ln),left=tk?+tk[1]:null;
      op.style.display="block";
      op.innerHTML=`<div class="nb-prog-cur">${svg("folder",13)} ${esc(r.cur||"…")}${pct!=null?`<span class="nb-prog-pct">${pct}%</span>`:""}</div>`
        +(pct!=null?`<div class="nb-pbar"><i style="width:${pct}%"></i></div>`:"")
        +`<div class="nb-prog-l mono">${esc(rate)}${left!=null?` · осталось ${left} файлов`:""}</div>`;
    }else op.style.display="none";}
    if(!r.running){clearInterval(win._nbpi);win._nbpi=null;setBusy(false);
     notifyDone(r.dry?"Пробный прогон завершён":(r.result==="ok"?"Бэкап завершён":r.result==="unreachable"?(push?"Приёмник недоступен":"Главный NAS недоступен"):"Бэкап с ошибками"),"");
     if(r.dry){const sn=g("#oStatus");if(sn)sn.innerHTML=`<b>пробный прогон завершён</b>`;}
     else paintStatus();}   // реальный прогон → перекрасить точки/итог/размеры без перезагрузки
   },1500);}
  // журнал (терминал) скрыт по умолчанию — открывается кнопкой; лог копится в фоне
  {const lb2=g("#oLog");if(lb2)lb2.onclick=()=>{const open=con.style.display==="none";con.style.display=open?"block":"none";const t=g("#oLogT");if(t)t.textContent=nasTr(open?"Скрыть журнал":"Показать журнал");if(open)con.scrollTop=con.scrollHeight;};}
  // waiting in the queue: keep the caption fresh and attach to the log when our turn
  // comes; full paintStatus (2 extra API calls) only on state transitions
  function waitQueue(){clearInterval(win._nbpi);
   win._nbpi=setInterval(async()=>{if(!document.body.contains(con)){clearInterval(win._nbpi);win._nbpi=null;return;}
    const st=await nbG("/api/backup/status");if(!st)return;
    if(st.running){clearInterval(win._nbpi);win._nbpi=null;con.innerHTML="";nbCursor=0;nbStarted=null;attachLog();paintStatus();}
    else if(!st.queued){clearInterval(win._nbpi);win._nbpi=null;setBusy(false);paintStatus();}   // removed from the queue
    else{const sn=g("#oStatus");if(sn)sn.innerHTML=qCaption(st);}},3000);}
  const run=async dry=>{if(!(c.jobs||[]).length){toast("Сначала выберите источники (вкладка «Источники»)");return;}
   if(isPush()&&!CFG.dest_base){toast("Сначала выберите приёмник (вкладка «Приёмник»)");return;}
   con.innerHTML="";nbCursor=0;nbStarted=null;setBusy(true);
   const rr=await nbP("/api/backup/run-bg",{dry});
   if(rr&&rr.queued){toast("Другой бэкап уже идёт — поставлено в очередь");waitQueue();return;}
   attachLog();};
  g("#oRun").onclick=()=>run(false);g("#oDry").onclick=()=>run(true);
  g("#oCancel").onclick=()=>{nbP("/api/backup/cancel");toast("Останавливаю…");};
  // on tab open: preload the LAST run's log so «Показать журнал» is never empty,
  // then reattach if a run is active or waiting in the queue (journal stays hidden)
  nbG("/api/backup/log?since=0").then(r=>{if(!r)return;
   if(r.lines&&r.lines.length){nbAppend(r.lines);nbCursor=r.seq;nbStarted=r.started;}
   if(r.running){setBusy(true);attachLog();}
   else if(r.queued){setBusy(true);waitQueue();}});
  g("#oTest").onclick=async()=>{toast("Проверяю связь…");const t=await nbP("/api/backup/test");toast(t&&t.ok?"✓ связь работает":("✗ "+((t&&t.log)||"нет связи")));};
 }

 function tabHistory(tc){tc.innerHTML=`<div class="set-titrow"><h3 class="set-title" style="margin:0">История прогонов</h3><button class="btn sm" id="hClear" style="display:none">${svg("trash",13)} Очистить</button></div><p class="set-sub">Последние запуски бэкапа: когда, сколько шёл, что передано.</p><div id="hList"><div class="set-load">загрузка…</div></div>`;
   const dur=s=>{s=+s||0;return s<60?s+" с":s<3600?Math.floor(s/60)+" мин "+(s%60)+" с":Math.floor(s/3600)+" ч "+Math.floor(s%3600/60)+" мин";};
   const draw=list=>{const box=tc.querySelector("#hList");if(!box)return;
    const clr=tc.querySelector("#hClear");if(clr)clr.style.display=list.length?"":"none";
    if(!list.length){box.innerHTML=`<div class="mon-note">Пока пусто — история появится после первого прогона.</div>`;return;}
    box.innerHTML="";
    list.forEach(run=>{const ok=(run.jobs||[]).filter(x=>x.ok).length,tot=(run.jobs||[]).length;
     const bad=run.result!=="ok";
     const meta=run.result==="aborted"?"прерван (сбой или перезагрузка)":`${ok}/${tot} · ${esc(dur(run.dur))}`;
     const head=el(`<div class="nb-hrun"><span class="ovh-dot" style="background:${bad?"var(--warn)":"var(--good)"};flex:none"></span><span class="nb-hdate">${fmDate(run.ts)}</span><span class="nb-hmeta mono">${meta}</span><button class="iconbtn nb-hdel" title="Удалить запись">${svg("x",13)}</button></div>`);
     head.querySelector(".nb-hdel").onclick=async()=>{const r=await nbP("/api/backup/history-del",{ts:run.ts});draw((r&&r.history)||[]);};
     box.appendChild(head);
     (run.jobs||[]).forEach(j=>{const line=(j.code===25)?"остановлено защитой":((j.xfer||0)+" файлов · "+fmtB(j.xfer_bytes||0)+(j.deleted?(" · удалено "+j.deleted):"")+(j.verify_err?" · сверка не удалась":j.verify_bad?(" · сверка: ≠ "+j.verify_bad):j.verify_bad===0?" · сверка ок":""));
      box.appendChild(el(`<div class="nb-hjob"><span class="ovh-dot" style="background:${j.ok?"var(--good)":"var(--danger)"};flex:none"></span><span class="nb-src mono" title="${att(j.src)}">${esc(j.src)}</span><span class="nb-hjm mono">${esc(line)}</span></div>`));});
    });};
   const cb=tc.querySelector("#hClear");if(cb)cb.onclick=()=>confirmDlg("Очистить историю?","Все записи истории этого профиля будут удалены. Сами бэкапы не тронутся.",async()=>{const r=await nbP("/api/backup/history-del",{all:true});draw((r&&r.history)||[]);},true);
   nbG("/api/backup/history").then(r=>draw((r&&r.history)||[]));}
 const TABS={overview:tabOverview,conn:tabConn,sources:tabSources,deleted:tabDeleted,sched:tabSched,history:tabHistory};
 /* ── профили: полоса вкладок ── */
 const curProf=()=>PROFS.find(x=>x.id===NB_PID)||PROFS[0]||{};
 const switchTo=id=>{if(id===NB_PID)return;NB_PID=id;tab="overview";nbCursor=0;nbStarted=null;render();};

 const addDlg=()=>{const s=document.getElementById("scrim"),src=curProf();
  const DHELP={pull:"Забрать данные с другого NAS/сервера на этот (классический бэкап сюда).",
   push:"Отправить папки ЭТОГО NAS наружу: на внешний USB-диск или на другой сервер по SSH. Приёмник выберете после создания."};
  s.innerHTML=`<div class="dialog"><h3>Новый бэкап</h3>
    <div class="mon-note" style="margin:0 0 10px">Отдельный профиль: своё подключение, свои папки, своё расписание и своя история. Ничего общего с остальными.</div>
    <div class="field"><label>Направление</label><div class="seg" id="npDir"><button data-v="pull" class="on">Забрать с другого NAS</button><button data-v="push">Отправить с этого NAS</button></div></div>
    <div class="mon-note" id="npDirHelp" style="margin:0 0 10px">${esc(DHELP.pull)}</div>

    <label class="nb-chk"><input type="checkbox" id="npClone"> Скопировать подключение и исключения из «${esc(src.name||"")}»</label>
    <div class="mon-note" style="margin:10px 0 0">Источники и расписание не копируются: пути на другом NAS свои, а два включённых расписания сразу — неприятный сюрприз.</div>
    <div class="r"><button class="btn" id="npX">Отмена</button><button class="btn pri" id="npOk">Создать</button></div></div>`;
  s.classList.add("show");const nm=s.querySelector("#npName");nm.focus();

  clone.onchange=()=>{dirSeg.style.opacity=clone.checked?".45":"";   // a clone inherits the source profile's direction

      s.querySelector("#npDirHelp").textContent=nasTr(DHELP[dir]);}};

    const r=await api("/api/backup/profile",{method:"POST",body:JSON.stringify(
      {action:"add",name:nm.value.trim(),clone_from:clone.checked?src.id:"",
       direction:clone.checked?"":dir})});

 const renameDlg=()=>{const s=document.getElementById("scrim"),cur=curProf();

 // Защита от дурака: удалить можно только пустой профиль, и только вписав его имя.
 // Скопированные данные в приёмнике не трогаются никогда.
 const delDlg=()=>{const s=document.getElementById("scrim"),cur=curProf();
  if(PROFS.length<2){toast("Последний профиль удалить нельзя");return;}
  const busy=cur.jobs>0;
  s.innerHTML=`<div class="dialog"><h3>Удалить «${esc(cur.name||"")}»?</h3>
    ${busy?`<div class="reboot-ban">${svg("power",16)} Сначала уберите все источники на вкладке «Источники» — сейчас их ${cur.jobs}. Это защита от случайного удаления настроенного бэкапа.</div>`
          :`<p class="nb-del-warn">Исчезнут только настройки, история и логи этого профиля. <b>Уже скопированные файлы в папке-приёмнике останутся на диске</b> — их надо удалять вручную, если они не нужны.</p>
            <div class="field"><label>Введите название профиля для подтверждения</label><input id="ndName" class="mono" placeholder="${att(cur.name||"")}" autocomplete="off"></div>`}
    <div class="r"><button class="btn" id="ndX">Отмена</button>${busy?"":`<button class="btn dng" id="ndOk" disabled>Удалить профиль</button>`}</div></div>`;
  s.classList.add("show");
  s.querySelector("#ndX").onclick=()=>s.classList.remove("show");
  if(busy)return;
  const nm=s.querySelector("#ndName"),ok=s.querySelector("#ndOk");nm.focus();

  ok.onclick=async()=>{
    const r=await api("/api/backup/profile",{method:"POST",body:JSON.stringify({action:"delete",p:cur.id,confirm:nm.value.trim()})});

 const renderTabs=()=>{const bar=body.querySelector("#nbTabs");if(!bar)return;

 function paintCounts(c){

  const tot=Object.values(c).reduce((a,b)=>a+b,0);
  bar.querySelectorAll("button").forEach(b=>{
   const k=b.dataset.k,n=k?(c[k]||0):tot;
   const old=b.querySelector(".fsw-cnt");if(old)old.remove();
   if(n)b.insertAdjacentHTML("beforeend",`<i class="fsw-cnt ${k||"all"}">${n>999?"999+":n}</i>`);});
 }
 async function loadGrpPage(grp,box,before){
  const r=await api(`/api/fsw/events?kind=${grp.dataset.kind}&ts=${grp.dataset.ts}&limit=200${before?"&before="+before:""}${Q?"&q="+encodeURIComponent(Q):""}`);
  const evs=(r&&r.events)||[];
  if(!before)box.innerHTML="";
  const mb=box.querySelector(".fsw-more");if(mb)mb.remove();
  box.insertAdjacentHTML("beforeend",evs.map(rowHTML).join(""));
  if(evs.length===200){box.insertAdjacentHTML("beforeend",`<button class="btn sm fsw-more">Показать ещё</button>`);
   box.querySelector(".fsw-more").onclick=()=>loadGrpPage(grp,box,evs[evs.length-1].id);}
 }
 const grpHTML=gr=>{
  if(gr.n<=5)return gr.items.map(rowHTML).join("");
  const k=FSW_KINDS[gr.kind]||{ic:"file"};
  const pl={add:"Добавлено",del:"Удалено",mod:"Изменено",move:"Перемещено",corrupt:"Повреждено"}[gr.kind]||gr.kind;
  const first=gr.items.slice(0,3).map(i=>(i.path||"").split("/").pop()).join(", ");
  const gdir=((gr.items[0]||{}).path||"").replace(/\/[^/]*$/,"")||"/";
  return `<div class="fsw-grp" data-ts="${gr.ts}" data-kind="${gr.kind}">

    <div class="fsw-nm"><div class="fsw-fn">${pl}: ${gr.n} файлов</div><div class="fsw-fp">${esc(first)}…</div></div>
    <button class="fsw-go" data-d="${att(gdir)}" title="Открыть папку в файлах">${svg("folder",12)}</button>

    <span class="fsw-chev">${svg("chev",12)}</span></div>
   <div class="fsw-grpb" style="display:none"></div></div>`;};
 let nextTs=null;
 async function loadFeed(reset){
  const feed=g("#fswFeed");if(!feed)return;
  if(reset){feed.innerHTML="";nextTs=null;feed._day="";}
  const r=await api(`/api/fsw/events?group=1&kind=${KIND}&q=${encodeURIComponent(Q)}&day=${DAY}${RANGE?"&days="+RANGE:""}${nextTs?"&before="+nextTs:""}`);
  paintCounts(r&&r.counts);
  const grs=(r&&r.groups)||[];
  const more=feed.querySelector(".fsw-more");if(more)more.remove();
  if(!grs.length&&!feed.children.length){
   feed.innerHTML=`<div class="fsw-empty">${svg("shield",34)}<div>${ST&&!ST.last?"Индекс ещё не построен — запусти первое сканирование.":(DAY?"За этот день событий нет.":"Событий нет — с файлами ничего не происходило.")}</div></div>`;
   return;}
  let html="";
  for(const gr of grs){const dl=dayLbl(gr.ts);
   if(dl!==feed._day){html+=`<div class="fsw-day">${dl}</div>`;feed._day=dl;}
   html+=grpHTML(gr);}
  feed.insertAdjacentHTML("beforeend",html);
  feed.querySelectorAll(".fsw-grp:not([data-w])").forEach(grp=>{grp.dataset.w=1;
   const box=grp.querySelector(".fsw-grpb");
   grp.querySelector(".fsw-grph").onclick=()=>{
    const open=box.style.display!=="none";
    box.style.display=open?"none":"";grp.classList.toggle("open",!open);
    if(!open&&!box._loaded){box._loaded=1;box.innerHTML=`<div class="fsw-fp" style="padding:4px 8px">загрузка…</div>`;loadGrpPage(grp,box,0);}};});
  if(r&&r.next){nextTs=r.next;
   feed.insertAdjacentHTML("beforeend",`<button class="btn sm fsw-more">Показать ещё</button>`);
   feed.querySelector(".fsw-more").onclick=()=>loadFeed(false);}
 }

   const p=b.dataset.p;

   paintFilterState();loadFeed(true);});

  g("#fswClr").onclick=()=>{DAY="";Q="";RANGE=0;g("#fswQ").value="";paintFilterState();loadFeed(true);};
  paintFilterState();
  loadFeed(true);
 }
 let ACT_P=30;
 const sumPeriod=n=>{const t={add:0,del:0,mod:0,move:0,corrupt:0};const now=new Date();
  for(let i=0;i<n;i++){const v=(ACT&&ACT[dayKey(new Date(now.getTime()-i*864e5))])||{};
   for(const k in t)t[k]+=v[k]||0;}
  return t;};
 const hotHTML=h=>{const nm=h.dir.split("/").pop()||h.dir;
  const chips=["add","del","mod","move","corrupt"].filter(k=>h[k]).map(k=>`<i class="fsw-cnt ${k}">${h[k]}</i>`).join("");
  return `<div class="fsw-row"><div class="fsw-ki n">${svg("folder",13)}</div>
   <div class="fsw-nm"><div class="fsw-fn">${esc(nm)}</div><div class="fsw-fp"><span class="fsw-fpl" data-fp="${att(h.dir+"/")}" title="Показать события этой папки">${esc(h.dir)}</span></div></div>
   <div style="display:flex;gap:4px;align-items:center;flex:none">${chips}</div>
   <button class="fsw-go" data-d="${att(h.dir)}" title="Показать в файлах">${svg("folder",12)}</button></div>`;};

  // клик по столбику = открыть этот день в Хронике

  pane.addEventListener("mouseout",e=>{const col=e.target.closest(".fsw-col");

 }

function avBarsHTML(r,pct,hours){
 if(Array.isArray(r))r={bars:r,pct:pct,hours:hours};   // legacy (bars,pct,hours) call shape
 const bars=r&&r.bars;if(!bars||!bars.length)return "";
 const c=v=>v===2?"var(--good)":v===1?"var(--warn)":v===0?"var(--danger)":"var(--track)";
 const h=r.hours||24;
 const now=(r.now?r.now*1000:Date.now()),t0=(r.start?r.start*1000:now-h*3600e3);
 const slotW=(now-t0)/bars.length,wDate=h>=48;
 const p2=n=>String(n).padStart(2,"0");
 const hm=t=>{const d=new Date(t),s=`${p2(d.getHours())}:${p2(d.getMinutes())}`;return wDate?`${p2(d.getDate())}.${p2(d.getMonth()+1)} ${s}`:s;};
 const dur=s=>s>=5400?Math.round(s/3600)+" ч":s>=90?Math.round(s/60)+" мин":Math.max(1,Math.round(s))+" сек";
 const word=v=>v===2?"онлайн":v===1?"без сети":v===0?"обесточен":"нет данных";
 const ev=r.events||[];
 /* native title per bar: slot time range + worst state; red/yellow bars also
    list the exact outage intervals (r.events) overlapping the slot */
 const tit=(v,i)=>{
  const a=t0+i*slotW,b=a+slotW;
  let s=`${hm(a)}–${hm(b)} · ${word(v)}`;
  if(v===0||v===1)for(const e of ev){
   const f=e.from*1000,t=e.to*1000;
   if(f<b&&t>a)s+=`\n${word(e.state==="off"?0:1)}: ${hm(f)}–${hm(t)} (${dur((t-f)/1000)})`;
  }
  return s;};
 const span=h>=48?`−${Math.round(h/24)}d`:`−${h}h`;
 return `<div class="gl-avwrap"><div class="gl-bars">${bars.map((v,i)=>`<i style="background:${c(v)}" title="${tit(v,i)}"></i>`).join("")}</div><div class="gl-avcap"><span>${span}</span><span>${r.pct==null?"":r.pct+"% доступность"}</span><span>сейчас</span></div></div>`;}

/* custom select on top of the vendor mechanics: its <input> stays as the
   commit path (Enter/blur) AND doubles as the search field; around it — our
   list with keyboard navigation, check mark and Escape-cancel */
function ntLangDress(box,sp,anchor){
 const inp=sp.querySelector("input");if(!inp)return;
 /* re-parent into .nt-ed (position:relative) and place absolutely under the
    badge, clamped to the editor box — position:fixed at viewport coords kept
    escaping the window (and ancestor filters break fixed altogether) */
 if(anchor){
  box.appendChild(sp);
  const bb=box.getBoundingClientRect(),ab=anchor.getBoundingClientRect(),W=200;
  sp.style.position="absolute";
  sp.style.left=Math.max(8,Math.min(ab.right-bb.left-10-W,bb.width-W-8))+"px";
  sp.style.top=Math.max(8,Math.min(ab.top-bb.top+38,bb.height-320))+"px";
  sp.style.width=W+"px";}
 const orig=inp.value,cur=(orig||"text").toLowerCase();
 inp.placeholder=nasTr("поиск языка…");
 const ls=document.createElement("div");ls.className="nt-langs";
 const items=NT_LANGS.map(l=>{const b=document.createElement("button");b.type="button";b.textContent=l;
  if(l===cur)b.classList.add("on");
  /* mousedown, not click: keeps focus in the input so vendor blur doesn't fire first */
  b.onmousedown=e=>{e.preventDefault();inp.value=l==="text"?"":l;
   inp.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter",bubbles:true}));};
  ls.appendChild(b);return b;});
 sp.appendChild(ls);
 const on=ls.querySelector(".on");if(on)setTimeout(()=>on.scrollIntoView({block:"nearest"}),0);
 setTimeout(()=>inp.select(),30);   // after the vendor focuses it: typing replaces the old value
 const vis=()=>items.filter(b=>b.style.display!=="none");
 const setHi=b=>{items.forEach(x=>x.classList.toggle("sel",x===b));if(b)b.scrollIntoView({block:"nearest"});};
 /* capture phase: runs before the vendor's Enter handler on the same event,
    so a keyboard-highlighted item lands in input.value just in time */
 inp.addEventListener("keydown",e=>{
  const v=vis(),hi=v.find(x=>x.classList.contains("sel"));
  if(e.key==="ArrowDown"||e.key==="ArrowUp"){e.preventDefault();
   let i=v.indexOf(hi);i=e.key==="ArrowDown"?Math.min(v.length-1,i+1):Math.max(0,i-1);
   setHi(v[i]);}
  else if(e.key==="Enter"&&hi){const l=hi.textContent;inp.value=l==="text"?"":l;}
  else if(e.key==="Escape"){inp.value=orig;inp.blur();}   // blur commits = cancel with the old value
 },true);
 inp.addEventListener("input",()=>{const v=inp.value.trim().toLowerCase();
  items.forEach(b=>{b.style.display=!v||b.textContent.includes(v)?"":"none";});
  setHi(v?vis()[0]:null);});
}
/* our notes are trusted local content; still strip scripts/handlers but keep
   layout attributes (style/width on img) that the default sanitizer removes */
function ntSanitize(html){
 const doc=new DOMParser().parseFromString("<body>"+html,"text/html");
 doc.querySelectorAll("script,iframe,object,embed,form").forEach(n=>n.remove());
 doc.querySelectorAll("*").forEach(n=>{
  [...n.attributes].forEach(a=>{
   const nm=a.name.toLowerCase();
   if(nm.startsWith("on")||(nm==="href"&&/^javascript:/i.test(a.value))||(nm==="src"&&/^javascript:/i.test(a.value)))n.removeAttribute(a.name);});});
 return doc.body.innerHTML;
}

/* MySpeed: последний замер скорости интернета. Сервис ставится отдельным стеком,
   поэтому карточка исчезает целиком, если его нет или он молчит — пустая плашка
   «нет данных» мозолила бы глаза тем, кто его не ставил. */
let MS_URL="";
async function pollMySpeed(){
 const box=document.getElementById("wg-myspeed");if(!box)return;
 const wdg=box.closest(".wdg");
 const hide=()=>{if(wdg)wdg.style.display="none";};
 let r=null;
 try{r=await api("/api/myspeed");}catch(e){}
 if(!r||!r.ok){hide();return;}   /* ok=false — сервиса нет или он молчит; замеры при ok=true есть всегда */
 if(wdg)wdg.style.display="";
 /* r.url — это адрес, по которому ходит СЕРВЕР (обычно 127.0.0.1): в браузере он
    ведёт на машину пользователя. Берём ссылку из web-desktop.url-лейбла контейнера,
    а если ярлыка нет — подставляем текущий хост вместо loopback. */
 const app=(APPS||[]).find(a=>/myspeed/i.test(a.name||"")||/:5216(\/|$)/.test(a.url||""));
 MS_URL=(app&&app.url)||String(r.url||"").replace(/\/\/(127\.0\.0\.1|localhost)\b/,"//"+location.hostname);
 /* провальный замер MySpeed хранит как -1 — такие числа не показываем.
    null проверяем отдельно: +null===0, а null>=0 — true, оба прошли бы как валидные. */
 const num=v=>(v!=null&&+v>=0);
 const mbit=v=>(!num(v)?"—":(+v>=100?Math.round(+v):(+v).toFixed(1))+" Мбит/с");
 const ago=t=>{const s=(Date.now()-Date.parse(t))/1000;
   if(!isFinite(s))return "";
   if(s<90)return "только что";
   if(s<5400)return Math.round(s/60)+" мин назад";
   if(s<172800)return Math.round(s/3600)+" ч назад";
   return Math.round(s/86400)+" дн назад";};
 const a=r.avg||{};
 // цвета берём из уже подогнанных по контрасту токенов поверхности виджета
 const pingCol=!num(r.ping)?"var(--dim)":(r.ping<30?"var(--good)":r.ping<80?"var(--warn)":"var(--danger)");
 const foot=[ago(r.created),r.count?r.count+" замеров":""].filter(Boolean).join(" · ");
 box.innerHTML=`<div class="ms-row"><span class="ms-l ms-dn">${svg("download",13)} Скачивание</span><b class="ms-dn">${esc(mbit(r.download))}</b></div>
   <div class="ms-row"><span class="ms-l ms-up">${svg("upload",13)} Отдача</span><b class="ms-up">${esc(mbit(r.upload))}</b></div>
   <div class="ms-row"><span class="ms-l">${svg("activity",13)} Пинг</span><b style="color:${pingCol}">${!num(r.ping)?"—":esc(r.ping+" мс")}</b></div>
   ${a.download!=null?`<div class="ms-avg">в среднем ${esc(mbit(a.download))} / ${esc(mbit(a.upload))}${a.ping!=null?` · пинг ${esc(a.ping+" мс")}`:""}</div>`:""}
   ${foot?`<div class="ms-avg">${esc(foot)}</div>`:""}
   ${r.failed?`<div class="ms-avg" style="color:var(--danger)">последний замер не удался · ${esc(ago(r.failed_at))}</div>`:""}`;
 const mm=document.getElementById("more-myspeed");
 if(mm)mm.onclick=()=>{if(MS_URL)window.open(MS_URL,"_blank");};
}
/* vnstat: накопленный трафик по основному интерфейсу (сегодня/месяц/всего).

 box.innerHTML=row("Сегодня",r.today)+row("За месяц",r.month)+row("Всего",r.total);
}
function paintVols(){const box=document.getElementById("wg-vols");if(!box)return;box.innerHTML="";
 const wdg=box.closest(".wdg");   // нет томов → прячем всю карточку виджета, а не показываем пустую плашку
 if(!VOLS||!VOLS.length){if(wdg)wdg.style.display="none";return;}

function drawNet(){const cv=document.getElementById("wg-net");if(!cv)return;const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
 ctx.clearRect(0,0,W,H);if(NETH.length<2)return;
 const cs=getComputedStyle(cv);   // с самого canvas — good/danger, адаптированные под фон виджета
 const cRx=cs.getPropertyValue("--good").trim()||"#1FA971",cTx=cs.getPropertyValue("--danger").trim()||"#DE4E48";
 const mx=Math.max(...NETH,...NETT,1);
 const line=(data,col,fill)=>{if(data.length<2)return;
  ctx.beginPath();data.forEach((v,i)=>{const x=i/(data.length-1)*W,y=H-3-Math.min((v||0)/mx,1)*(H-6);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
  if(fill){ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=col+"26";ctx.fill();}};
 line(NETH,cRx,true);   // download — зелёный, с заливкой
 line(NETT,cTx,false);  // upload — красный, только линия

 if(pollEvents._busy)return;pollEvents._busy=true;   // без перекрытия опросов (медленный ответ → дубли)
 try{await _pollEvents();}finally{pollEvents._busy=false;}}
/* long-poll цикл: запрос сам висит до 25с (или до события), затем сразу повторяем.
   Ошибка/офлайн → пауза и ретрай, чтобы не молотить. Заменяет 15-сек setInterval. */
let _evLoopOn=false;
async function eventLoop(){
 if(_evLoopOn)return;_evLoopOn=true;
 for(;;){
  let ok=true;
  try{await _pollEvents();}catch(e){ok=false;}
  await new Promise(r=>setTimeout(r,ok?150:4000));
 }
}
/* Реакция на события: обновляем только затронутое, а не всю страницу. Диск
   вставили/убрали → сразу перерисовать иконки/тома/диски; контейнер сменил
   состояние → стеки; сменился IP/линк → сеть; импорт с USB завершился → ярлыки. */
let _reactT=null;
function reactToEvents(events){
 const names=new Set(events.map(e=>e.event||"")),kinds=new Set(events.map(e=>e.kind||""));
 const has=(...xs)=>xs.some(x=>names.has(x));
 const jobs=new Set();
 if(kinds.has("disk")||has("disk_add","disk_remove","disk_remount","readonly","fserror","usb_import")){jobs.add("disks");jobs.add("apps");}
 if(has("container","container_loop","svcfail","cron_failed")||kinds.has("svc"))jobs.add("stacks");
 if(has("ip_changed","link_changed","vpn_offline")||kinds.has("net"))jobs.add("net");
 // лёгкий дебаунс: пачка событий за раз → один прогон обновлений
 clearTimeout(_reactT);
 _reactT=setTimeout(()=>{
  if(jobs.has("disks"))pollDisks();
  if(jobs.has("apps"))pollApps();
  if(jobs.has("stacks"))pollStacks();
  if(jobs.has("net"))pollNet();
 },350);
}
async function _pollEvents(){
 // long-poll: сервер держит запрос до 25с, пока не появится событие (при after=0
 // отдаёт сразу). Так панель узнаёт о происходящем мгновенно, без 15-сек опроса.
 const r=await api("/api/events?after="+EVQ.seq+"&wait="+(EVQ.seq?25:0));if(!r||!Array.isArray(r.events))return;
 if(r.events.length)reactToEvents(r.events);   // подтянуть затронутые данные без перезагрузки
 const first=!EVQ.init;EVQ.init=true;
 r.events.forEach(e=>EVQ.cache.push(e));
 if(EVQ.cache.length>800)EVQ.cache.splice(0,EVQ.cache.length-800);
 EVQ.seq=r.seq||EVQ.seq;EVQ.seen=r.seen||0;EVQ.unseen=r.unseen||0;
 if(first)EVQ.toasted=EVQ.seq;      // старое при загрузке страницы не тостим
 else{const fresh=r.events.filter(e=>e.id>EVQ.toasted&&e.desk);
  fresh.slice(-4).forEach(e=>ntoast(e));
  if(r.events.length)EVQ.toasted=Math.max(EVQ.toasted,...r.events.map(e=>e.id));}
 // непрочитанное критичное (свежее суток, с включённой плашкой) — напоминать раз в N минут (SET.critRemind)
 const remMin=SET.critRemind!=null?+SET.critRemind:10;
 const crit=EVQ.cache.filter(e=>e.lvl==="crit"&&e.desk&&e.id>EVQ.seen&&(Date.now()/1e3-(e.t2||e.t))<86400);
 if(remMin>0&&crit.length&&Date.now()-EVQ.remind>remMin*60000){EVQ.remind=Date.now();ntoast(crit[crit.length-1],true);}
 paintBell();}
function paintBell(){const b=document.getElementById("bellBtn");if(!b)return;
 const hasCrit=EVQ.cache.some(e=>e.lvl==="crit"&&e.id>EVQ.seen);
 b.innerHTML=svg("bell",16)+(EVQ.unseen?`<span class="mb-badge${hasCrit?" crit":""}">${EVQ.unseen>99?"99+":EVQ.unseen}</span>`:"");
 b.title=nasTr(EVQ.unseen?`Уведомления: ${EVQ.unseen} новых`:"Уведомления");}
function markSeen(){if(EVQ.seen>=EVQ.seq)return;EVQ.seen=EVQ.seq;EVQ.unseen=0;paintBell();
 api("/api/events/seen",{method:"POST",body:JSON.stringify({id:EVQ.seq})});}
function ntoast(e,remind){const c=document.getElementById("ntoasts");if(!c)return;
 while(c.children.length>=4)c.firstChild.remove();
 const n=el(`<div class="ntoast ${e.lvl}">${nico(e)}<div class="nt-m"><div class="nt-t">${esc(e.title)}${e.n>1?` <span class="nmul">×${e.n}</span>`:""}${remind?` <span class="nmul">· напоминание</span>`:""}</div>${e.msg?`<div class="nt-s">${esc(e.msg)}</div>`:""}</div><button class="nt-x">${svg("x",12)}</button></div>`);
 c.appendChild(n);requestAnimationFrame(()=>n.classList.add("show"));
 const close=()=>{n.classList.remove("show");setTimeout(()=>n.remove(),260);};
 n.querySelector(".nt-x").onclick=ev=>{ev.stopPropagation();close();};
 n.onclick=()=>{close();winNotif();};
 setTimeout(close,e.lvl==="crit"?15000:7000);
 try{if("Notification"in window&&Notification.permission==="granted"&&document.hidden)new Notification(nasTr(e.title),{body:nasTr(e.msg||""),icon:"/icon.svg"});}catch(x){}}
function evRow(e,isNew){return `<div class="mbp-row${isNew?" new":""}" data-eid="${e.id}">${nico(e)}<div class="mbp-m"><div class="mbp-t">${esc(e.title)}${e.n>1?` <span class="nmul">×${e.n}</span>`:""}</div>${e.msg?`<div class="mbp-s">${esc(e.msg)}</div>`:""}</div><span class="mbp-w">${ruWhen(e.t2||e.t)}</span></div>`;}
function bellPop(){const b=document.getElementById("bellBtn");
 const seenAt=EVQ.seen;   // водораздел ДО markSeen — новые подсвечиваем
 mbPop(b,p=>{const items=EVQ.cache.slice(-12).reverse();
  p.innerHTML=`<div class="mbp-h"><span>Уведомления</span>${EVQ.unseen?`<span class="mbp-cnt">${EVQ.unseen} новых</span>`:""}<span class="grow"></span><button class="mbp-hb" id="mbAll" title="Показать все">${svg("list",15)}</button><button class="mbp-hb" id="mbCfg" title="Настройки уведомлений">${svg("cog",15)}</button></div>`
   +(items.length?items.map(e=>evRow(e,e.id>seenAt)).join(""):`<div class="mbp-empty">Пока пусто — здесь появятся события и действия системы</div>`);
  p.querySelectorAll(".mbp-row").forEach(rw=>rw.onclick=()=>{closeMenu();winNotif();});
  p.querySelector("#mbAll").onclick=()=>{closeMenu();winNotif();};
  p.querySelector("#mbCfg").onclick=()=>{closeMenu();winSettings("notify");};});
 markSeen();}

/* ---- центр операций (очереди, прогресс, отмена) ---- */
const OPS={list:[],seq:0,paintT:0,autoClosed:false,autoOpened:false};

/* Operation history now lives on the server (~/nas-config/ops-history.json), so it is
   the same in every browser and survives a reinstall through the settings backup.
   localStorage stays as an offline cache: if the API is unreachable we still show
   something. Running operations are never persisted — an upload dies with the page,
   while backup and USB import keep going and are re-created from the server. */
const OPS_KEY="nasops",OPS_KEEP=60,OPS_TTL=30*86400e3;
const opsUid=()=>Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8);
function opsSave(){
 try{
  const keep=OPS.list.filter(o=>o.state!=="run").slice(-OPS_KEEP)
    .map(o=>({id:o.id,uid:o.uid,title:o.title,state:o.state,label:o.label,t:o.t}));
  localStorage.setItem(OPS_KEY,JSON.stringify(keep));
 }catch(e){}}
function opsPush(o){                       // завершённую операцию отдаём серверу
 if(!o.uid)return;
 api("/api/ops",{method:"POST",body:JSON.stringify(
   {uid:o.uid,state:o.state,ts:Math.round((o.t||Date.now())/1000),title:o.title,label:o.label||""})}).catch(()=>{});}
function opsAdopt(items){
 const now=Date.now();
 OPS.list=items.filter(o=>o&&o.t&&now-o.t<OPS_TTL).sort((a,b)=>a.t-b.t).slice(-OPS_KEEP);
 OPS.seq=0;
 OPS.list.forEach(o=>{o.id=++OPS.seq;o.p=o.state==="done"?1:null;o.cancel=null;o.cancelled=false;
   if(o.state==="run"){o.state="err";o.label="прервано перезагрузкой панели";}
   // не заводить дубль по уже записанному импорту
   if(o.uid&&o.uid.indexOf("usb:")===0&&typeof USB_SEEN!=="undefined")USB_SEEN.add(o.uid.slice(4));});
 paintOps(true);}
async function opsLoad(){
 let items=null;
 try{const r=await api("/api/ops");
   if(r&&Array.isArray(r.ops))items=r.ops.map(x=>({uid:x.uid,title:x.title,state:x.state,label:x.label,t:(x.ts||0)*1000}));
 }catch(e){}
 if(!items){                              // сервер недоступен — показываем локальный кэш
   try{items=JSON.parse(localStorage.getItem(OPS_KEY)||"[]");}catch(e){items=[];}
   if(!Array.isArray(items))items=[];
 }
 opsAdopt(items);opsSave();}
const opAgo=t=>{if(!t)return "";const s=Math.max(0,(Date.now()-t)/1000);
 if(s<60)return "только что";
 if(s<3600)return Math.floor(s/60)+" мин назад";
 if(s<86400)return Math.floor(s/3600)+" ч назад";
 return Math.floor(s/86400)+" дн назад";};
let OPS_TICK=null;
// Пока что-то выполняется — перерисовываем сами. Иначе полоса замирает: события
// прогресса приходят редко (пакетные операции) или попап открыли уже после старта.
function opsTick(){if(OPS_TICK)return;
 OPS_TICK=setInterval(()=>{if(!OPS.list.some(o=>o.state==="run")){clearInterval(OPS_TICK);OPS_TICK=null;return;}
  paintOps();},300);}
/* «Сохранено ✓» слева от кнопки. Тост исчезает в углу экрана, и в настройках его
   легко пропустить — подтверждение должно быть там, куда смотрит глаз. */
function flashSaved(btn,msg){
 if(!btn||!btn.parentNode)return;
 const p=btn.parentNode;
 let b=[...p.children].find(x=>x.classList&&x.classList.contains("saved-badge"));
 if(!b){b=el(`<span class="saved-badge"></span>`);p.insertBefore(b,btn);}
 b.textContent=nasTr(msg||"Сохранено ✓");
 b.classList.remove("show");void b.offsetWidth;   // перезапустить анимацию при повторном клике
 b.classList.add("show");
 clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove("show"),2200);}

function opAdd(title,opts){opts=opts||{};
 const o={id:++OPS.seq,title,state:"run",p:null,label:"",cancel:opts.cancel||null,cancelled:false,t:Date.now()};
 OPS.list.push(o);if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
 paintOps(true);opsTick();
 // сам открывается при старте операции (настройка SET.opsAuto); если пользователь
 // закрыл во время работы — не навязываемся до конца текущей пачки
 if(SET.opsAuto!==false&&!document.querySelector(".mbpop[data-ops]")&&!OPS.autoClosed){OPS.autoOpened=true;opsPop();}
 return o;}
function opSet(o,p,label){o.p=p;if(label!=null)o.label=label;paintOps();}
function opEnd(o,ok,label){if(o.state!=="run")return;o.state=o.cancelled?"cancel":ok?"done":"err";
 if(label!=null&&label!=="")o.label=label;if(o.state==="done")o.p=1;o.cancel=null;
 o.t=Date.now();o.uid=o.uid||opsUid();
 paintOps(true);opsSave();opsPush(o);
 if(!OPS.list.some(x=>x.state==="run")){OPS.autoClosed=false;
  // авто-открытый поповер сам прячется чуть после завершения всего
  if(OPS.autoOpened)setTimeout(()=>{const q=document.querySelector(".mbpop[data-ops]");
   if(q&&OPS.autoOpened&&!OPS.list.some(x=>x.state==="run")){q.remove();OPS.autoOpened=false;}},1800);}}
function opCancel(o){if(o.state!=="run")return;o.cancelled=true;
 try{if(o.cancel)o.cancel(o);}catch(e){}paintOps(true);}
function paintOps(force){
 const now=Date.now();if(!force&&now-OPS.paintT<200)return;OPS.paintT=now;
 const b=document.getElementById("opsBtn");if(!b)return;
 const run=OPS.list.filter(o=>o.state==="run").length;
 // иконка всегда на месте: по ней смотрят историю загрузок и копирований,
 // а не только текущий прогресс. Пустой список — приглушённая иконка.
 b.classList.toggle("mb-idle",!OPS.list.length);
 b.innerHTML=svg(run?"sync":"list",16)+(run?`<span class="mb-badge">${run}</span>`:"");
 b.title=nasTr(run?`Операции: ${run} выполняется`:"Операции");
 const p=document.querySelector(".mbpop[data-ops]");if(p)renderOpsList(p);}
function renderOpsList(p){
 // инкрементально: если состав/состояния не менялись — обновляем только прогресс и подписи
 const sig=OPS.list.map(o=>o.id+":"+o.state).join(",");
 if(p._sig===sig){
  OPS.list.forEach(o=>{if(o.state!=="run")return;   // завершённые не трогаем: в подписи <span class="op-when">
   const row=p.querySelector(`[data-op="${o.id}"]`);if(!row)return;
   const bf=row.querySelector(".op-bf");if(bf&&o.p!=null)bf.style.width=Math.round(Math.min(o.p,1)*100)+"%";
   const s2=row.querySelector(".op-s2");if(s2){const l=nasTr(o.label);if(s2.textContent!==l){s2.textContent=l;s2.title=o.label||"";}}
   const t2=row.querySelector(".op-t2"),tt=nasTr(o.title);if(t2&&t2.textContent!==tt){t2.textContent=tt;t2.title=o.title;}});
  return;}
 p._sig=sig;
 const items=OPS.list.slice().reverse();
 p.innerHTML=`<div class="mbp-h"><span>Операции</span>${OPS.list.some(o=>o.state==="run")?`<span class="mbp-cnt">${OPS.list.filter(o=>o.state==="run").length} активных</span>`:""}<span class="grow"></span><button class="mbp-hb" id="opsClr" title="Убрать завершённые">${svg("eraser",15)}</button></div>`
  +(items.length?items.map(o=>{
    const st=o.state==="run"?"":o.state==="done"?`<span class="op-st done" style="font-weight:800">✓</span>`:o.state==="cancel"?`<span class="op-st">⊘</span>`:`<span class="op-st err" style="font-weight:800">!</span>`;
    const bar=o.state==="run"?`<div class="op-bar"><div class="op-bf" style="width:${o.p==null?40:Math.round(Math.min(o.p,1)*100)}%"></div></div>`:"";
    const when=o.state==="run"?"":`<span class="op-when">${esc(opAgo(o.t))}</span>`;
    return `<div class="op-row${o.state==="run"&&o.p==null?" ind":""}" data-op="${o.id}"><div class="op-m"><div class="op-t2" title="${att(o.title)}">${esc(o.title)}</div><div class="op-s2" title="${att(o.label||"")}">${esc(o.label||"")}${when}</div>${bar}</div>${st}${o.state==="run"?`<button class="op-x" title="Отменить">${svg("x",14)}</button>`:""}</div>`;
  }).join(""):`<div class="mbp-empty">Нет операций</div>`);
 p.querySelectorAll(".op-x").forEach(x=>x.onclick=ev=>{ev.stopPropagation();
  const o=OPS.list.find(y=>y.id===+x.closest(".op-row").dataset.op);if(o)opCancel(o);});
 const clr=p.querySelector("#opsClr");if(clr)clr.onclick=()=>{OPS.list=OPS.list.filter(o=>o.state==="run");
  opsSave();api("/api/ops/clear",{method:"POST",body:"{}"}).catch(()=>{});paintOps(true);
  const q=document.querySelector(".mbpop[data-ops]");if(q){q._sig=null;renderOpsList(q);}};}
function opsPop(){const b=document.getElementById("opsBtn");if(!b)return;
 mbPop(b,p=>{p.setAttribute("data-ops","1");renderOpsList(p);},
  ()=>{OPS.autoOpened=false;if(OPS.list.some(x=>x.state==="run"))OPS.autoClosed=true;});}

/* poll */
let LAST=null;
const HIST={cpu:[],mem:[],temp:[],rx:[],tx:[]};
function pushHist(s){const cap=60;const add=(k,v)=>{HIST[k].push(v||0);if(HIST[k].length>cap)HIST[k].shift();};
 add("cpu",s.cpu);add("mem",s.mem&&s.mem.pct);add("temp",s.temp);add("rx",s.net&&s.net.rx);add("tx",s.net&&s.net.tx);}
function sparkSVG(data,color,max){const w=120,h=28,d=(data||[]).slice(-40);if(d.length<2)return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
 const mx=max||Math.max(...d,1);const pts=d.map((v,i)=>`${(i/(d.length-1)*w).toFixed(1)},${(h-2-Math.min((v||0)/mx,1)*(h-4)).toFixed(1)}`).join(" ");
 return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;}
/* USB-import runs in the background (udev), the panel may be closed. Mirror its
   jobs into the shared operations centre so the progress is visible everywhere,
   not only on the USB settings tab. Keyed by device — one op per partition. */
const USB_OPS={},USB_SEEN=new Set();
function usbLabel(j){
 const bits=[j.label||j.dev];
 if(j.bytes!=null)bits.push(fmtB(j.bytes)+(j.total?" из "+fmtB(j.total):""));
 if(j.status==="running"){if(j.speed)bits.push(j.speed);if(j.eta)bits.push("осталось "+j.eta);}
 return bits.join(" · ");}
function syncUsbOps(jobs){
 (jobs||[]).forEach(j=>{
  const key=j.dev+":"+j.started;
  let o=USB_OPS[j.dev];
  if(!o){
   if(j.status!=="running"){
    // импорт мог начаться и кончиться, пока панель была закрыта: заносим в историю,
    // иначе быстрые копирования (пара секунд) не видно вообще нигде
    if(USB_SEEN.has(key))return;
    USB_SEEN.add(key);
    const done=j.status==="done";
    const rec={id:++OPS.seq,uid:"usb:"+key,title:"Импорт с USB",state:done?"done":"err",p:done?1:null,
      label:usbLabel(j)+(j.dest?" · "+j.dest:""),cancel:null,cancelled:false,
      t:(j.finished||j.started||0)*1000||Date.now()};
    OPS.list.push(rec);
    if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
    opsSave();opsPush(rec);paintOps(true);
    return;
   }
   USB_SEEN.add(key);
   o=USB_OPS[j.dev]=opAdd("Импорт с USB");o.uid="usb:"+key;
  }
  if(j.status==="running"){
   opSet(o,j.percent==null?null:Math.min(j.percent,100)/100,usbLabel(j));
  }else{
   opEnd(o,j.status==="done",usbLabel(j)+(j.dest?" · "+j.dest:""));
   delete USB_OPS[j.dev];
  }});}

 if(!SET.wpVer&&SET.wpType==="url"&&SET.wpUrl)setWallUrl();  // первый запуск: подтянуть обои по умолчанию
 startSlideshow();sampleWallLum();
