  .stbadge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600}
  .stbadge.run{color:var(--good);background:var(--good-soft)}.stbadge.dead{color:var(--mut);background:var(--line)}.stbadge.fail{color:var(--danger);background:var(--danger-soft)}
  .smart{margin-top:12px;border:none;border-radius:var(--r-md);padding:15px;background:var(--card);box-shadow:var(--sh-sm)}
  .smart table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:10px}
  .smart td,.smart th{padding:5px 7px;border-top:1px solid var(--line);text-align:right;font-family:var(--mono)}
  .smart th{color:var(--mut);text-align:right;font-size:10px;text-transform:uppercase;border:none}
  .smart td:first-child,.smart th:first-child{text-align:left}
  .mcon{background:var(--code-bg);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:11px 13px;font-family:var(--mono);font-size:11.5px;line-height:1.65;max-height:160px;overflow:auto;color:var(--code-fg);margin-top:12px;display:none}
  .mcon .er{color:#ff8a7a}
  /* disk manager — современная NAS-storage вёрстка */
  .dm-sec{margin-bottom:22px}.dm-sec:last-child{margin-bottom:0}
  .dm-sectop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:11px}
  .dm-eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--mut);font-weight:600}
  /* health-пилюля */
  .hstat{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:650;padding:5px 12px;border-radius:999px;white-space:nowrap}
  .hstat::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor;flex:none}
  .hstat.ok{color:var(--good);background:var(--good-soft)}
  .hstat.warn{color:var(--warn);background:var(--warn-soft)}
  .hstat.bad{color:var(--danger);background:var(--danger-soft)}
  .hstat.na{color:var(--mut);background:var(--line)}
  /* пул-хиро */
  .pool{background:linear-gradient(152deg,var(--accent-soft),transparent 62%),var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:19px;box-shadow:var(--sh-sm)}
  .pool-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
  .pool-title{font-weight:680;font-size:15.5px;letter-spacing:-.01em}
  .pool-sub{font-size:12px;color:var(--dim);margin-top:4px;font-family:var(--mono)}
  .capbar{height:15px;border-radius:8px;background:var(--track,var(--line));overflow:hidden;display:flex}
  .capbar .used{height:100%;display:block;background:linear-gradient(90deg,var(--accent),var(--accent-2));min-width:3px;transition:width .6s}
  /* ===== Хранилище: master-detail ===== */
  .dmroot{display:flex;flex-direction:column;height:100%}
  .dm-pool{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex:none}
  .dm-pool .dp-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft);flex:none}
  .dm-pool.np .dp-ic{color:var(--mut);background:var(--card-2)}
  .dp-txt{flex:1;min-width:0}
  .dp-t{font-weight:660;font-size:13.5px;display:flex;align-items:center}
  .dp-t .hstat{font-size:10px;padding:2px 8px}
  .dp-s{font-size:11.5px;color:var(--mut);margin-top:1px}
  .dp-cap{flex:none;text-align:right}
  .dp-cap .capbar{height:8px;border-radius:999px}
  .dp-lbl{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:4px}
  .dm2{display:flex;flex:1;min-height:0}
  .dm2-side{width:250px;flex:none;border-right:1px solid var(--line);padding:8px 8px 12px;overflow-y:auto}
  .dm2-side-h{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-family:var(--mono);padding:6px 8px 8px}
  .dm2-grp{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-family:var(--mono);padding:11px 8px 5px}
  .dm2-grp:first-child{padding-top:4px}
  .dm2-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 9px;border-radius:var(--r-sm);border:1px solid transparent;background:transparent;text-align:left;margin-bottom:2px;transition:.12s}
  .dm2-item:hover{background:var(--sel)}
  /* active item: soft film (--sel shifted contrast too hard against the sidebar) */
  .dm2-item.on{background:var(--tab-on);border-color:var(--accent-line)}
  .dm2-item.sys{opacity:.62}.dm2-item.sys.on,.dm2-item.sys:hover{opacity:1}
  .dm2-item .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dm2-item .li-main{flex:1;min-width:0}
  .dm2-item .li-name{display:block;font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dm2-item .li-sub{display:block;font-size:11px;color:var(--mut);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dm2-item .li-temp{font-family:var(--mono);font-size:11px;font-weight:650;flex:none}
  .li-temp:empty,.htemp:empty{display:none}   /* нет температуры — не занимать место/зазор во flex */
  .dm2-item .li-pi{width:16px;height:16px;flex:none;margin:0 -4px}
  .dm2-item .li-ico{width:17px;height:17px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--dim)}
  .dm2-item .li-ico img{width:100%;height:100%;object-fit:contain;border-radius:4px}
  .dd-ic-pi{background:transparent!important;box-shadow:none!important}.dd-ic-pi img{width:100%;height:100%}
  .dm2-slots{font-size:11px;color:var(--mut);padding:10px 9px;line-height:1.5}
  .dm2-detail{flex:1;min-width:0;overflow-y:auto;padding:18px 20px}
  /* Scrutiny: детальная сводка здоровья диска (сетка карточек) */
  .dd-scr{margin:12px 0;padding:14px;border-radius:var(--r-md);background:var(--card);box-shadow:var(--sh-sm)}
  .dd-scr-h{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;margin-bottom:11px}
  .dd-scr-sub{font-weight:500;font-size:11.5px;color:var(--dim);margin-left:auto}
  .dd-scr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px}
  .scr-cell{background:var(--glass);border-radius:var(--r-sm);padding:9px 10px;display:flex;flex-direction:column;gap:3px;cursor:default}
  .scr-cell .sc-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .scr-cell .sc-ic{display:flex;flex:none}
  .scr-cell .sc-v{font-size:16px;font-weight:680;letter-spacing:-.01em}.scr-cell .sc-v i{font-size:11px;font-weight:600;color:var(--dim);font-style:normal;margin-left:1px}
  .scr-cell .sc-n{font-size:10.5px;color:var(--dim);line-height:1.2}
  /* вердикт показателя: цвет иконки + лёгкая заливка на проблемных */
  .scr-good .sc-ic{color:var(--good)} .scr-info .sc-ic{color:var(--mut)}
  .scr-warn{background:var(--warn-soft,rgba(224,145,60,.13))} .scr-warn .sc-ic{color:var(--warn)}
  .scr-bad{background:var(--danger-soft)} .scr-bad .sc-ic{color:var(--danger)} .scr-bad .sc-v{color:var(--danger)}
  .dd-scr-warn{margin-top:9px;font-size:11.5px;color:var(--danger);display:flex;align-items:center;gap:6px}
  .dd-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
  .dd-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;flex:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}
  .dd-hmain{flex:1;min-width:0}
  .dd-name{font-weight:660;font-size:15px;letter-spacing:-.01em}
  .dd-lbl{color:var(--dim);font-weight:500;font-size:13px}
  .dd-sub{font-size:12px;color:var(--mut);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dd-health{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .dd-usage{margin-bottom:16px}
  .dd-usage .lbls{display:flex;justify-content:space-between;font-size:11.5px;color:var(--dim);margin-top:6px}
  .dd-facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-bottom:16px}
  .dd-facts>div{background:var(--card);padding:9px 12px;display:flex;flex-direction:column;gap:2px}
  .dd-facts span{font-size:11px;color:var(--mut)}
  .dd-facts b{font-size:12.5px;font-weight:600;font-family:var(--mono);overflow-wrap:anywhere}
  .dd-acts{display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding-top:14px;border-top:1px solid var(--line)}
  .dd-note{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:6px}
  .dd-spin{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--dim);margin-bottom:16px;padding:2px}
  .dd-spin select{width:auto!important;padding:6px 9px!important;font-size:12px}
  .dd-spd{display:flex;align-items:center;gap:9px;margin-top:12px;padding:10px 12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);font-size:12.5px;color:var(--dim)}
  .dd-spd .dd-spd-ic{display:flex;color:var(--accent)}
  .dd-spd b{color:var(--text)}
  .dd-spd .dd-spd-d{color:var(--mut);font-size:11.5px}
  .dd-coll{display:flex;align-items:center;gap:6px;width:100%;border:none;background:transparent;cursor:pointer;padding:4px 0;border-radius:7px}
  .dd-coll:hover{color:var(--dim)}
  .dd-coll .dd-chev{font-size:9px}
  .dd-coll .dd-coll-hint{margin-left:auto;font-size:9.5px;letter-spacing:0;text-transform:none;color:var(--mut)}
  .dd-grp{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-family:var(--mono);margin:20px 0 8px}
  .dd-smk{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;margin-bottom:12px}
  .dd-smk>div{background:var(--card);padding:9px 12px;display:flex;flex-direction:column;gap:2px}
  .dd-smk span{font-size:11px;color:var(--mut)}.dd-smk b{font-size:13px;font-weight:650}
  .dd-attrs{width:100%;border-collapse:collapse;font-size:11.5px;font-family:var(--mono)}
  .dd-attrs th{text-align:left;color:var(--mut);font-weight:500;padding:5px 8px;border-bottom:1px solid var(--line);font-family:var(--font)}
  .dd-attrs td{padding:5px 8px;border-bottom:1px solid var(--line);overflow-wrap:anywhere}
  /* список обновлений пакетов */
  .upd-list{max-height:300px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-md)}
  .upd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 12px;border-top:1px solid var(--line);font-size:12.5px}
  .upd-row:first-child{border-top:none}
  .upd-n{font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .upd-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--warn);border:1px solid var(--warn);border-radius:5px;padding:0 5px;margin-left:6px}
  .upd-v{font-size:11px;color:var(--mut);flex:none}
  .upd-con{max-height:300px;overflow:auto;background:var(--code-bg);color:var(--code-fg);font-family:var(--mono);font-size:11.5px;line-height:1.6;padding:10px 12px;border-radius:var(--r-md);white-space:pre-wrap}
  .upd-con .er{color:var(--danger)}
  /* бэкап главного NAS */
  .nbwrap{padding:2px 18px 0}
  /* Выбор папки в стиле файлового менеджера: слева диски и избранное, справа список. */
  /* .dialog объявлен НИЖЕ и при равной специфичности перебивал max-width:440px —
     зажимал пикер в узкую колонку. Поэтому селектор из двух классов. */
  .dialog.pf-dlg{max-width:820px;width:min(94vw,820px)}
  /* фиксированная высота: иначе диалог прыгал при переходе в папку с другим числом
     подпапок — центрированная модалка «дышала» по вертикали */
  .pf-body{display:flex;gap:14px;height:min(56vh,460px);align-items:stretch}
  .pf-side{flex:0 0 200px;min-width:0;height:100%;overflow-y:auto;padding-right:2px;
    border-right:1px solid var(--line)}
  .pf-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:10px 2px 5px}
  .pf-grp:first-child{margin-top:0}
  .pf-it{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:8px;cursor:pointer;
    font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pf-it:hover{background:var(--card-2)}
  .pf-it.on{background:var(--sel);color:var(--accent);box-shadow:var(--sh-sm);font-weight:600}
  .pf-it svg{flex:none;opacity:.8}
  .pf-it .pf-sub{margin-left:auto;font-size:10.5px;color:var(--mut);font-family:var(--mono)}
  .pf-main{flex:1;min-width:0;height:100%;display:flex;flex-direction:column}
  .pf-bar{display:flex;gap:6px;align-items:center;margin-bottom:6px}
  .pf-bar input{flex:1;font-family:var(--mono);font-size:12px;padding:7px 10px}
  .pf-list{flex:1;min-height:0;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-md)}
  .pf-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-top:1px solid var(--line);
    cursor:pointer;font-size:12.5px}
  .pf-list .pf-row:first-child{border-top:none}
  .pf-row:hover{background:var(--card-2)}
  .pf-empty{color:var(--mut);padding:14px;font-size:12px;text-align:center}
  .pf-foot{display:flex;align-items:center;gap:8px;margin-top:10px}
  .pf-cur{flex:1;min-width:0;font-family:var(--mono);font-size:11.5px;color:var(--dim);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left}
  @media (max-width:760px){
    .pf-body{flex-direction:column}
    .pf-side{flex:none;max-height:none;display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;
      border-right:none;border-bottom:1px solid var(--line);padding-bottom:8px}
    .pf-side::-webkit-scrollbar{height:0}
    .pf-grp{display:none}
    .pf-it{flex:0 0 auto}
    .pf-body{height:auto}
    .pf-list{height:44vh;flex:none}
  }
  .nb-crumb{font-size:11.5px;color:var(--mut);padding:6px 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nb-brl{max-height:300px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r-md);margin:2px 0 4px}
  .nb-bri{display:flex;align-items:center;gap:8px;padding:8px 11px;border-top:1px solid var(--line);cursor:pointer;font-size:12.5px}
  .nb-bri:first-child{border-top:none}.nb-bri:hover{background:var(--sel)}
  .nb-bri input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex:none}
  .nb-bri.sel{background:var(--accent-soft)}.nb-bri.sel .nb-brn{color:var(--accent);font-weight:600}
  .nb-brn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nb-brgo{flex:none;border:none;background:none;color:var(--mut);padding:2px 4px;border-radius:6px;cursor:pointer}
  .nb-brgo:hover{background:var(--card);color:var(--accent)}
  .nb-pcrumb{display:flex;flex-wrap:wrap;align-items:center;gap:1px;padding:4px 2px 8px;font-size:12px}
  .nb-pcrumb a{color:var(--dim);cursor:pointer;padding:2px 6px;border-radius:6px}
  .nb-pcrumb a:last-child{color:var(--text);font-weight:600}.nb-pcrumb a:hover{background:var(--sel);color:var(--accent)}
  .nb-pcrumb .sepc{color:var(--mut)}
  .nb-saved{font-size:12px;color:var(--good);font-weight:600;opacity:0;transition:opacity .2s;margin-left:4px}
  .nb-saved.show{opacity:1}
  /* подтверждение рядом с кнопкой: тост улетает в угол, а тут видно на месте */
  .saved-badge{font-size:12px;color:var(--good);font-weight:600;white-space:nowrap;
    opacity:0;transition:opacity .18s;margin-right:6px;flex:none;pointer-events:none}
  .saved-badge.show{opacity:1}
  .nb-prog{font-size:12px;padding:9px 12px;background:var(--accent-soft);border-radius:var(--r-sm)}
  .nb-prog-cur{display:flex;align-items:center;gap:5px;color:var(--accent);font-weight:600;min-width:0}
  .nb-prog-cur svg{flex:none}
  .nb-prog-pct{margin-left:auto;font-family:var(--mono);font-weight:700}
  .nb-pbar{height:6px;border-radius:999px;background:var(--line-2);overflow:hidden;margin:6px 0 4px}
  .nb-pbar i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .4s}
  .nb-prog-l{color:var(--mut);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* дерево-выбор источников */
  /* .dialog{max-width:440px} объявлен ниже по файлу → при равной специфичности перебивал .nb-pick.
     .dialog.nb-pick (специфичность выше) фиксит ширину. */
  .dialog.nb-pick{max-width:880px;width:min(880px,95vw)}
  .dialog.nb-pick .r button{white-space:nowrap}
  .dialog.nb-pick .nb-selc{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* заметный индикатор загрузки в пикере — спиннер + текст, чтобы не казалось «сломалось» */
  .nb-load{display:flex;align-items:center;gap:10px;padding:22px 14px;color:var(--dim);font-size:13px}
  .nb-load::before{content:"";width:18px;height:18px;border-radius:50%;border:2.5px solid var(--line);border-top-color:var(--accent);animation:wspin .8s linear infinite;flex:none}
  .nb-tchev.busy{opacity:1}
  .nb-tchev.busy svg{animation:wspin .8s linear infinite;color:var(--accent)}
  /* область дерева — слегка утоплена (var(--card)), чтобы папки не сливались с фоном диалога */
  .nb-tree{max-height:min(64vh,620px);overflow:auto;border:1px solid var(--line-2);border-radius:var(--r-md);padding:4px;background:var(--card)}
  .nb-selc{margin-right:auto;font-size:12px;color:var(--mut)}
  .nb-trow{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;font-size:12.5px;border-radius:7px}
  .nb-trow:hover{background:var(--sel)}
  .nb-trow.checked>.nb-tn,.nb-trow.covered>.nb-tn{color:var(--accent);font-weight:600}
  .nb-trow.indet>.nb-tn{color:var(--text);font-weight:600}
  /* исключённая вложенная папка (сняли внутри выбранного родителя) — зачёркнута и чуть приглушена */
  .nb-trow.excluded>.nb-tn{text-decoration:line-through;opacity:.55}
  .nb-trow.exout{opacity:.45}.nb-trow.exout>.nb-tn{text-decoration:line-through}
  .nb-trow.locked{cursor:default;opacity:.75}
  .nb-tw{width:18px;flex:none;display:flex;justify-content:center}
  .nb-tchev{border:none;background:none;color:var(--mut);padding:0;cursor:pointer;display:flex;transition:transform .12s}
  .nb-tchev.open{transform:rotate(90deg)}.nb-tchev.busy{opacity:.5}
  .nb-tck{width:15px;height:15px;accent-color:var(--accent);flex:none}
  .nb-tn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nb-trow>svg{flex:none;color:var(--accent-2)}
  .nb-job{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line);font-size:12px}
  .nb-job:first-child{border-top:none}
  .nb-src{flex:none;max-width:38%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--accent)}
  .nb-exc{flex:none;font-size:10.5px;color:var(--dim);background:var(--sel);border-radius:6px;padding:1px 6px;cursor:help;white-space:nowrap}
  .nb-arr{color:var(--mut);flex:none}
  .nb-dst{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dim)}
  .nb-sz{flex:none;color:var(--mut);font-size:11px}
  /* бейдж состояния приёмника у задачи + предупреждение */
  .nb-warn{flex:none;font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 6px;border-radius:5px}
  .nb-warn.dng{color:var(--danger);border:1px solid var(--danger)}
  .nb-warn.wrn{color:var(--warn);border:1px solid var(--warn)}
  .nb-dwarn{font-size:12px;line-height:1.45;border-radius:var(--r-sm);padding:8px 10px;margin-bottom:8px;color:var(--text);
    background:color-mix(in srgb,var(--danger) 12%,transparent);border:1px solid color-mix(in srgb,var(--danger) 35%,transparent)}
  .nb-dwarn.wrn{background:color-mix(in srgb,var(--warn) 12%,transparent);border-color:color-mix(in srgb,var(--warn) 35%,transparent)}
  .nb-hrun{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:8px;border-top:1px solid var(--line);font-size:12.5px}
  .nb-hrun:first-child{margin-top:0;border-top:none}
  .nb-hdate{font-weight:600}.nb-hmeta{margin-left:auto;color:var(--mut);font-size:11px}
  .nb-hdel{flex:none;padding:2px;color:var(--mut);opacity:0;transition:opacity .12s}
  .nb-hrun:hover .nb-hdel{opacity:1}.nb-hdel:hover{color:var(--danger)}
  .set-titrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .nb-hjob{display:flex;align-items:center;gap:8px;padding:3px 0 3px 16px;font-size:12px}
  .nb-hjm{margin-left:auto;color:var(--mut);font-size:11px;white-space:nowrap}
  .nb-help{display:flex;flex-direction:column;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:11px 13px;margin:10px 0 4px;font-size:12.5px;line-height:1.5}
  .nb-help b{font-weight:640;color:var(--text)}.nb-help span{color:var(--dim)}
  .nb-testr{margin:2px 0 0}
  .nb-testr .nb-ok{color:var(--good);font-size:12.5px;font-weight:600}
  .nb-testr .nb-err{margin-top:2px;background:var(--danger-soft);color:var(--danger);font-size:11.5px;padding:8px 11px;border-radius:var(--r-sm);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:auto;font-family:var(--mono);line-height:1.45}
  .nb-field{margin:16px 0 6px}
  .nb-field>label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;margin-bottom:6px}
  .nb-field-row{display:flex;gap:8px}
  .nb-field-row input{flex:1;min-width:0}
  .nb-excl{width:100%;min-height:150px;font-family:var(--mono);font-size:12px;line-height:1.6;resize:vertical;margin-top:8px}
  .nb-det{margin-top:16px}
  .nb-sum{cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--mut);font-family:var(--mono);padding:4px 0;user-select:none}
  .nb-sum::-webkit-details-marker{display:none}
  .nb-sum::before{content:"▸";font-size:9px;transition:transform .15s}
  .nb-det[open] .nb-sum::before{transform:rotate(90deg)}
  .nb-sum:hover{color:var(--dim)}
  .nb-foot{display:flex;align-items:center;gap:9px;padding:14px 0;border-top:1px solid var(--line);margin-top:8px;flex-wrap:wrap}
  /* конструктор раскладки подпапок USB-импорта */
  .usb-sub{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 13px;margin:2px 0 4px}
  .usb-sub>input{width:100%;font-size:13px}
  .usb-prev{font-size:12px;color:var(--dim);margin:8px 0 10px}
  .usb-prev .mono{color:var(--accent)}
  .usb-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px}
  .usb-lbl{font-size:11.5px;color:var(--mut);margin-right:2px}
  .usb-tok,.usb-pre{font-family:var(--mono);font-size:11.5px;padding:3px 8px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--glass);color:var(--text);transition:.12s}
  .usb-pre{font-family:var(--font)}
  .usb-tok:hover,.usb-pre:hover{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
  .nb-foot .grow{flex:1}
  .nbwrap .set-h:first-child{margin-top:6px;padding-top:0;border-top:none}
  /* история метрик */
  .grow{flex:1;min-width:8px}
  .dk-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:14px}
  /* ---- магазин приложений ---- */
  .st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:4px}
  .st-card{background:var(--card);border-radius:var(--r-lg);padding:12px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--sh-sm)}
  .st-top{display:flex;gap:10px;align-items:center;min-width:0}
  .st-ic{width:34px;height:34px;border-radius:8px;object-fit:contain;flex:none}
  .st-fb{width:34px;height:34px;border-radius:8px;background:var(--sel);color:var(--accent);font-weight:700;font-size:16px;align-items:center;justify-content:center;flex:none;display:none}
  .st-tt{display:flex;flex-direction:column;min-width:0}
  .st-tt b{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .st-status{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--mut)}
  .st-status .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .st-desc{font-size:12.5px;color:var(--dim);line-height:1.45;flex:1}
  .st-acts{display:flex;gap:6px;flex-wrap:wrap}
  .dk-tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 13px;display:flex;flex-direction:column;gap:2px}
  .dk-tile b{font-size:19px;font-weight:750;line-height:1.15}
  .dk-tile span{font-size:11.5px;color:var(--dim)}
  .dk-tile small{font-size:10.5px;color:var(--mut)}
  .hist-note{font-size:11.5px;color:var(--mut);margin-bottom:12px}
  .hist-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .hist-bar .seg button{padding:5px 11px;font-size:12px}
  .hist-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 13px 8px;margin-bottom:12px}
  .hist-h{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:600;margin-bottom:6px}
  .hist-cur{font-family:var(--mono);font-weight:700;font-size:12.5px}
  /* сводка здоровья */
  .ov-health{margin-bottom:14px}
  .ovh-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13.5px}
  .ovh-badge{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;flex:none}
  .ovh-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
  .ovh-row{display:flex;align-items:center;gap:8px;background:var(--card);padding:8px 12px;font-size:12px}
  .ovh-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .ovh-n{flex:1;min-width:0;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ovh-v{font-family:var(--mono);font-size:11px;font-weight:600;flex:none;max-width:68%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .caplbls{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-top:10px}
  .caplbls b{color:var(--text);font-weight:650;font-family:var(--mono)}
  /* Ненавязчивая напоминалка «поставь сервис» (Scrutiny/WUD) — стекло, не солид */
  .svc-hint{display:flex;align-items:center;gap:11px;margin:10px 0 0;padding:11px 14px;border-radius:var(--r-md);background:var(--card);box-shadow:var(--sh-sm);color:var(--dim);font-size:12.5px;line-height:1.45}
  .svc-hint svg{flex:none;opacity:.7}
  .svc-hint-t{flex:1}.svc-hint-t b{color:var(--fg,var(--ink))}
  .svc-hint .btn{flex:none}
  .pool-empty{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:14px}
  .pool-empty-card{background:var(--card);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;padding:26px 22px}
  .pe-icon{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft);margin-bottom:6px}
  .pe-title{font-weight:680;font-size:15.5px;letter-spacing:-.01em}
  .pe-sub{font-size:12px;color:var(--mut);font-family:var(--mono)}
  .pe-desc{font-size:12.5px;color:var(--dim);line-height:1.5;max-width:44ch;margin:4px 0 12px}
  /* карточки накопителей — сетка, не на всю ширину */
  .dm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:11px;align-items:start}
  .drv{background:var(--card);border:1px solid transparent;border-radius:var(--r-lg);padding:14px 15px;box-shadow:var(--sh-sm);transition:border-color .15s}
  .drv:hover{border-color:var(--line-2)}
  .drv.system{opacity:.82}.drv.system:hover{opacity:1}
  .drv-top{display:flex;align-items:center;gap:12px}
  .drv-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;flex:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}
  .drv-main{flex:1;min-width:0}
  .drv-name{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:650;font-size:14px}
  .drv-meta{font-size:12px;color:var(--mut);margin-top:3px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drv-health{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .htemp{font-family:var(--mono);font-size:12.5px;font-weight:650}
  .rbadge{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:6px;font-weight:700;flex:none}
  .rbadge.data{color:var(--accent);background:var(--accent-soft)}
  .rbadge.parity{color:var(--accent-2);background:rgba(76,141,246,.14)}
  .rbadge.pool{color:var(--good);background:var(--good-soft)}
  .rbadge.system{color:var(--mut);background:var(--line)}
  .rbadge.free{color:var(--warn);background:var(--warn-soft)}
  .rbadge.removable{color:#8a7dff;background:rgba(138,125,255,.16)}
  .drv-usage{margin-top:14px}
  .drv-usage .lbls{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:6px}
  .drv-acts{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
  .drv-acts .grow{flex:1;min-width:10px}
  .dparts{margin-top:13px;padding-top:2px;border-top:1px solid var(--line)}
  .dpart{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:12px;border-top:1px solid var(--line)}
  .dpart:first-child{border-top:none}
  .dpart .pi{flex:1;min-width:0;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dpart .pi .pn{color:var(--dim)}
  .dempty{padding:12px 14px;border:1px dashed var(--line-2);border-radius:var(--r-md);font-size:12px;color:var(--mut);display:flex;align-items:center;gap:10px}
  .dempty svg{flex:none;opacity:.65}.dempty b{color:var(--dim);font-weight:600}
  /* KPI-строка (диспетчер и др.) */
  .kpis{display:flex;gap:10px;margin-bottom:15px}
  .kpi{flex:1;background:var(--card);border:1px solid transparent;border-radius:var(--r-md);padding:11px 13px;box-shadow:var(--sh-sm)}
  .kpi .v{font-family:var(--mono);font-weight:680;font-size:17px;letter-spacing:-.01em}
  .kpi .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;font-family:var(--mono)}
  /* окно файлов: сайдбар + редактор */
  .filesplit{display:flex;height:100%}
  .fsidebar{width:210px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line);padding-right:13px;margin-right:15px}
  .fsidebar .flist{flex:1;overflow:auto;margin-top:8px}
  .fitem{display:block;width:100%;text-align:left;border:1px solid transparent;background:none;padding:8px 10px;border-radius:var(--r-sm);font-size:12.5px;color:var(--dim);margin-bottom:3px;font-family:var(--mono);transition:.12s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fitem:hover{background:var(--sel);color:var(--text)}
  .fitem.on{background:var(--sel);color:var(--accent);border-color:var(--accent-line);font-weight:600}
  .fitem b{color:inherit;font-weight:700}
  .feditor{flex:1;display:flex;flex-direction:column;min-width:0}
  .feditor .fhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;font-family:var(--mono);font-size:12px;color:var(--dim);min-height:20px}
  .feditor textarea{flex:1;min-height:140px}
  .feditor .ffoot{display:flex;justify-content:space-between;align-items:center;margin-top:11px}
  /* нативный файловый менеджер */
  .fm{display:flex;height:100%}
  .fm-side{flex:1;min-width:0;display:flex;flex-direction:column;position:relative}
  .fm-bar{display:flex;gap:4px;align-items:center;margin-bottom:9px}
  .fm-path{margin-bottom:8px;font-family:var(--mono);font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:5px 8px;background:var(--card);border-radius:var(--r-sm)}
  .fm-list{flex:1;overflow:auto;margin:0 -4px}
  /* ===== Корзина (в стиле файлменеджера) ===== */
  .trwrap{display:flex;flex-direction:column;height:100%}
  .tr-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex:none}
  .tr-title{display:flex;align-items:center;gap:9px;font-weight:650;font-size:14px}
  .tr-title .tr-cnt{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--card-2);padding:1px 9px;border-radius:999px}
  .tr-auto{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
  .tr-auto select{width:auto!important;padding:5px 8px!important;font-size:12px}
  .tr-cols{display:flex;align-items:center;gap:10px;padding:9px 18px 8px;border-bottom:1px solid var(--line);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-family:var(--mono);flex:none}
  .tr-list{flex:1;overflow-y:auto;padding:6px 10px}
  .tr-row{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:var(--r-sm);font-size:12.5px;transition:.1s}
  .tr-row:hover{background:var(--sel)}
  .tr-row.lost{opacity:.5}
  .tc-n{flex:1;min-width:0;display:flex;align-items:center;gap:9px;overflow:hidden}
  .tc-n .fi{flex:none;color:var(--dim);display:grid;place-items:center;width:20px;height:20px}
  .tr-row.dir .fi{color:var(--accent-2)}
  .tc-n .tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tc-s{width:150px;flex:none;font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tc-w{width:92px;flex:none;font-size:11px;color:var(--mut);font-family:var(--mono)}
  .tc-z{width:66px;flex:none;text-align:right;font-family:var(--mono);font-size:11px;color:var(--dim)}
  .tc-a{width:60px;flex:none;display:flex;gap:2px;justify-content:flex-end;visibility:hidden}
  .tr-row:hover .tc-a{visibility:visible}
  .tr-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:48px 20px;color:var(--dim)}
  @media(max-width:640px){.tc-s,.tc-w,.tr-cols .tc-s,.tr-cols .tc-w{display:none}}
  .fm-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--r-sm);cursor:pointer;font-size:12.5px}
  /* размер шрифта названий следует за размером значков S/M/L (M — базовый) */
  .fm-sz-s .fm-row{font-size:11px}.fm-sz-l .fm-row{font-size:14.5px;padding:9px 8px}
  .fm-sz-s .fm-tile .tn{font-size:10px}.fm-sz-l .fm-tile .tn{font-size:13.5px}
  .fm-row:hover{background:var(--sel)}
  /* скрытые (показанные тумблером) — приглушены, чтобы отличать от обычных */
  .fm-row.fm-hid,.fm-tile.fm-hid{opacity:.5}
  .fm-row.fm-hid:hover,.fm-tile.fm-hid:hover,.fm-row.fm-hid.sel,.fm-tile.fm-hid.sel{opacity:.85}
  .fm-row.sel{background:var(--accent-soft);color:var(--accent)}
  .fm-row .fi{flex:none;color:var(--dim);display:grid;place-items:center;width:28px;height:28px;position:relative}
  .fm-row .fi .thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:var(--thumb-fit,contain);border-radius:4px;opacity:0;transition:opacity .12s}
  .fm-row .fi.thumbed .thumb{opacity:1}
  .fm-row.dir .fi{color:var(--accent-2)}
  .fm-row .fn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    display:flex;align-items:baseline;gap:0}
  .fm-row .fn-b{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-row .fn-x{flex:none;color:var(--mut)}
  .fm-row .fn>small,.fm-row .fn>.fpath{flex:none}
  .fm-row .fsz{font-family:var(--mono);font-size:10px;color:var(--mut);flex:none}
  .fm-row .fx{display:none;gap:1px;flex:none}
  .fm-row:hover .fx{display:flex}.fm-row:hover .fsz{display:none}
  .fm-main{flex:1;display:flex;flex-direction:column;min-width:0}
  .fm-head{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-family:var(--mono);font-size:12px;min-height:26px}
  .fm-head .fh-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
  .fm-ed{flex:1;min-height:0;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
  .fm-empty{flex:1;display:grid;place-items:center;color:var(--mut);font-size:13px;text-align:center;padding:22px;line-height:1.5}
  .fm-prev{flex:1;overflow:auto;display:grid;place-items:center;background:var(--code-bg);border-radius:var(--r-md);padding:10px}
  .fm-prev img{max-width:100%;max-height:100%;border-radius:4px}
  /* CodeMirror — единый читаемый тёмный редактор (файл-менеджер и compose) */
  .CodeMirror{height:100%;font-family:var(--mono);font-size:13px;line-height:1.6;background:var(--code-bg);color:var(--code-fg)}
  .CodeMirror-gutters{background:var(--code-bg);border-right:1px solid rgba(140,160,195,.15)}
  .CodeMirror-linenumber{color:#6b7688}
  .CodeMirror-cursor{border-left:2px solid var(--accent)}
  .CodeMirror-selected{background:rgba(90,140,220,.30)!important}
  .CodeMirror-activeline-background{background:rgba(150,175,215,.07)}
  .CodeMirror-matchingbracket{color:#ffe08a!important;font-weight:700;border-bottom:1px solid rgba(255,224,138,.55)}
  .ed-dark{background:#1b1f27}.ed-dark .CodeMirror{height:100%;background:#1b1f27;color:#d6deec}
  .ed-dark .CodeMirror-gutters{background:#1b1f27;border-right:1px solid rgba(150,170,205,.13)}
  .ed-dark .CodeMirror-linenumber{color:#6b7688}
  .ed-dark .CodeMirror-cursor{border-left:2px solid #5ec8d4}
  .ed-dark .CodeMirror-selected{background:rgba(90,130,180,.34)!important}
  .ed-dark .CodeMirror-activeline-background{background:rgba(255,255,255,.05)}
  .ed-dark .cm-keyword{color:#d8a0f0}.ed-dark .cm-atom{color:#f0a878}
  .ed-dark .cm-number{color:#f0a878}.ed-dark .cm-string,.ed-dark .cm-string-2{color:#a9dc8a}
  .ed-dark .cm-comment{color:#8b95ab;font-style:italic}.ed-dark .cm-property{color:#74c0ff}
  .ed-dark .cm-variable-2,.ed-dark .cm-def,.ed-dark .cm-variable{color:#e8c583}
  .ed-dark .cm-tag,.ed-dark .cm-meta,.ed-dark .cm-attribute{color:#63cddb}
  /* подсветка проблемных строк YAML (табы/отступы + ошибка docker compose) */
  .ed-err-line{background:rgba(255,95,95,.16)!important}
  .CodeMirror .ed-lint-mk{color:#ff6b6b;font-weight:800;padding-left:3px}
  .ed-errbox{margin-top:6px;font-family:var(--mono);font-size:11.5px;line-height:1.5;border-radius:var(--r-sm);

  /* полноценный менеджер: крошки, чипы, колонки, выбор, dnd */

  .fmico{display:block;filter:drop-shadow(0 1px 1px rgba(20,30,50,.22))}
  /* анализатор места */
  .du{display:flex;flex-direction:column;height:100%;padding:12px 16px 14px}
  .du-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .du-auto-wrap{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--dim);white-space:nowrap}
  .du-auto-wrap svg{opacity:.7}
  .du-roots{flex-wrap:wrap}
  .du-roots button{display:inline-flex;align-items:center;gap:5px}
  .du-roots button svg{opacity:.8}
  .du-meta{font-family:var(--mono);font-size:11.5px;color:var(--mut);white-space:nowrap;display:inline-flex;align-items:center;gap:8px}
  .du-age{display:inline-flex;align-items:center;gap:4px;font-weight:700;font-size:12px;padding:3px 9px;border-radius:999px}
  .du-age svg{opacity:.85}
  .du-age.fresh{color:var(--good);background:var(--good-soft)}
  .du-age.ok{color:var(--dim);background:var(--sel)}
  .du-age.warn{color:var(--warn);background:var(--warn-soft)}
  .du-age.old{color:var(--danger);background:var(--danger-soft)}
  .du-main{flex:1;min-height:0;display:flex;flex-direction:column}
  .du-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);font-size:13px;text-align:center}
  .du-empty svg{color:var(--accent);opacity:.8}
  .du-empty .du-prog{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .du-spin svg{animation:wspin 1s linear infinite;color:var(--accent)}
  .du-empty2{color:var(--mut);font-size:12px;padding:12px}
  .du-crumb{display:flex;gap:2px;align-items:center;flex-wrap:wrap;font-family:var(--mono);font-size:13.5px;margin-bottom:12px}
  .du-crumb a{color:var(--dim);cursor:pointer;padding:3px 8px;border-radius:7px;font-weight:550}
  .du-crumb a:last-child{color:var(--text);font-weight:700;background:var(--sel)}.du-crumb a:hover{background:var(--accent-soft);color:var(--accent)}
  .du-crumb .sepc{color:var(--mut);font-size:12px}
  .du-cols{flex:1;min-height:0;display:flex;gap:16px}
  .du-chart{flex:none;display:flex;align-items:flex-start;justify-content:center}
  .du-chart svg{max-width:100%;height:auto}
  .duseg{cursor:pointer;transition:opacity .12s,filter .12s;stroke:var(--line);stroke-width:1}
  .duseg2{fill-opacity:.5}   /* 2-й уровень отступает через прозрачность — корректно и в тёмной теме */
  .duseg.du-dim{opacity:.25}
  .duseg.du-hot{filter:brightness(1.12)}
  .du-row.du-hot{background:var(--sel)}
  .du-row.du-dim{opacity:.45}
  .du-hole{fill:var(--glass);stroke:var(--line)}
  .du-lbl{fill:#fff;font-family:var(--mono);font-weight:600;font-size:9.5px;pointer-events:none;paint-order:stroke;stroke:rgba(0,0,0,.4);stroke-width:2.4px;stroke-linejoin:round}
  .du-ctext{fill:var(--text);font-family:var(--mono);font-weight:700;font-size:15px}
  .du-csub{fill:var(--mut);font-size:9.5px}
  .du-list{flex:1;min-width:0;overflow:auto}
  /* списки «крупнейшие файлы» / «дубликаты» */
  .du-big{flex:1;min-width:0;overflow:auto;padding:2px}
  .du-frow{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--r-sm);font-size:12.5px}
  .du-frow:hover{background:var(--sel)}
  .du-frow .du-ico{flex:none;display:flex}
  .du-frow .du-fnm{flex:1;min-width:0;display:flex;flex-direction:column}
  .du-frow .du-fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:550}
  .du-frow .du-fp{font-size:10.5px;color:var(--mut);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .du-frow .du-sz{flex:none;font-family:var(--mono);color:var(--dim);font-size:11.5px}
  .du-dgrp{margin-bottom:10px;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
  .du-dgh{font-size:11px;color:var(--dim);background:var(--card);padding:6px 10px;font-family:var(--mono)}
  .du-dupsum{font-size:12.5px;margin-bottom:10px;color:var(--dim)}
  .du-keep{flex:none;font-size:9.5px;color:var(--good);padding:2px 7px;border:1px solid var(--good);border-radius:5px;white-space:nowrap}
  .du-row{display:flex;align-items:center;gap:9px;padding:6px 6px;border-radius:var(--r-sm);font-size:12.5px}
  .du-row:hover{background:var(--sel)}
  .du-row.isdir .du-nm,.du-row.isdir .du-sw{cursor:pointer}
  .du-sw{flex:none;width:5px;height:22px;border-radius:3px}
  .du-ico{flex:none;width:20px;height:20px;display:grid;place-items:center}
  .du-agg{color:var(--mut)}
  .du-nm{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .du-bar{flex:1;min-width:40px;height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:0 2px}
  .du-bar i{display:block;height:100%;border-radius:999px}
  .du-sz{flex:none;font-family:var(--mono);font-size:11px;color:var(--mut);min-width:62px;text-align:right}

  .du-row:hover .du-x{opacity:1}.du-x:hover{color:var(--danger);background:var(--danger-soft)}
  @media (max-width:900px){.du-cols{flex-direction:column;overflow:auto}.du-chart{align-self:center}}
  /* --- История файлов (fswatch): журнал изменений + контроль целостности --- */

  .fsw-stats{flex:1;min-width:0;display:flex;gap:9px;flex-wrap:wrap;align-items:stretch}
  .fsw-st{display:flex;align-items:center;gap:9px;min-width:0;padding:7px 12px 7px 8px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--r-md)}

  .fsw-prog svg{animation:wspin 1s linear infinite;color:var(--accent)}
  .fsw-guard{border:1px solid var(--danger);background:var(--danger-soft);border-radius:var(--r-md);
    padding:10px 12px;font-size:12.5px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  .fsw-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .fsw-q{flex:1;min-width:130px;font-family:var(--mono);font-size:11.5px;padding:5px 9px;
    border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--text)}
  .fsw-feed{flex:1;min-height:0;overflow:auto;padding-right:2px}
  .fsw-day{font-size:10.5px;font-weight:700;color:var(--dim);padding:10px 6px 4px}
  .fsw-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:var(--r-sm);font-size:12.5px}
  .fsw-row:hover{background:var(--sel)}
  .fsw-ki{flex:none;width:22px;height:22px;border-radius:7px;display:grid;place-items:center}
  .fsw-ki.add{color:var(--good);background:var(--good-soft)}
  .fsw-ki.del{color:var(--danger);background:var(--danger-soft)}
  .fsw-ki.mod{color:var(--warn);background:var(--warn-soft)}
  .fsw-ki.move{color:var(--accent);background:var(--accent-soft)}
  .fsw-ki.corrupt{color:#fff;background:var(--danger)}
  .fsw-nm{flex:1;min-width:0;display:flex;flex-direction:column}
  .fsw-fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:550}
  .fsw-fp{font-size:10.5px;color:var(--mut);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsw-sz{flex:none;font-family:var(--mono);font-size:11px;color:var(--mut)}
  .fsw-tm{flex:none;font-family:var(--mono);font-size:11px;color:var(--dim);min-width:38px;text-align:right}
  .fsw-more{display:block;margin:10px auto}
  .fsw-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    color:var(--dim);font-size:13px;text-align:center;padding:20px}
  .fsw-empty svg{color:var(--accent);opacity:.8}
  .fsw-rootrow{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;padding:3px 0}
  .fsw-rootrow span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fsw .nbmain{min-height:0}
  .fsw-bar .seg button{display:inline-flex;align-items:center;gap:5px}
  .fsw-cnt{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:999px;background:var(--sel);color:var(--dim)}
  .fsw-cnt.add{background:var(--good-soft);color:var(--good)}
  .fsw-cnt.del{background:var(--danger-soft);color:var(--danger)}
  .fsw-cnt.mod{background:var(--warn-soft);color:var(--warn)}
  .fsw-cnt.move{background:var(--accent-soft);color:var(--accent)}
  .fsw-cnt.corrupt{background:var(--danger);color:#fff}
  .fsw-grph{cursor:pointer}
  .fsw-grph .fsw-fn{font-weight:700}
  .fsw-chev{flex:none;display:flex;color:var(--mut);transition:transform .15s}
  .fsw-grp.open .fsw-chev{transform:rotate(90deg)}
  .fsw-grpb{margin:0 0 4px 14px;padding-left:8px;border-left:2px solid var(--line)}
  /* активная вкладка без акцента: адаптивный акцент на стекле бывает блёклым */
  .fsw .set-nav button.on svg{color:inherit;opacity:.9}
  .fsw-side{margin-top:auto;padding:12px 10px 6px;display:flex;flex-direction:column;gap:8px;
    font-size:11px;color:var(--dim);border-top:1px solid var(--line)}

  .fsw-col.on{background:var(--accent-soft)}

  .fsw-col i.corrupt{background:var(--danger);box-shadow:0 0 0 1px var(--card)}
  .fsw-go{flex:none;border:none;background:none;color:var(--mut);padding:3px 5px;border-radius:6px;

  .fsw-fpl{cursor:pointer}
  .fsw-fpl:hover{color:var(--accent);text-decoration:underline}
  .fsw-fn[data-p]{cursor:pointer}
  .fsw-fn[data-p]:hover{text-decoration:underline}
  /* --- Launchpad: все приложения на весь экран (кнопка в верхнем баре) --- */

  .fm-row.srch{align-items:flex-start}
  .fm-row.srch .fn{white-space:normal;display:flex;flex-direction:column;gap:1px;line-height:1.32}
  .fpath{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;color:var(--mut);cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fpath:hover{color:var(--accent)}.fpath svg{flex:none;opacity:.75}
  /* плавающая «пилюля» действий над списком — не сдвигает контент вниз */
  .fm-selbar{position:absolute;left:50%;bottom:44px;transform:translateX(-50%);z-index:20;
    display:flex;align-items:center;gap:6px;padding:6px 9px;max-width:calc(100% - 20px);
    background:var(--menu-bg,var(--glass));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:999px;box-shadow:var(--sh-md);overflow-x:auto}
  .fm-selbar .cnt{font-weight:650;color:var(--accent);font-size:12.5px;white-space:nowrap;padding:0 4px}
  .fm-selbar .btn{flex:none}
  .fm-cols{display:flex;align-items:center;gap:9px;padding:5px 8px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-family:var(--mono);border-bottom:1px solid var(--line)}
  .fm-cols span{cursor:pointer}.fm-cols .c-n{flex:1}.fm-cols .c-s{width:60px;text-align:right}.fm-cols .c-d{width:92px;text-align:right}
  .fm-cols .on{color:var(--accent)}
  .fm-ck{width:15px;height:15px;flex:none;accent-color:var(--accent);cursor:pointer}
  .fm-row .fsz{width:60px;text-align:right;flex:none;display:inline-block!important}
  .fm-row .fdate{font-family:var(--mono);font-size:10px;color:var(--mut);width:92px;text-align:right;flex:none}
  .fm-list.drop{outline:2px dashed var(--accent);outline-offset:-4px;background:var(--accent-soft)}
  /* внутри SSH-маунта папки сине-бирюзовые, чтобы не путать с локальными */
  .fm-list.fm-remote .fmico path[fill="#E0A63C"]{fill:#2E86AB}
  .fm-list.fm-remote .fmico path[fill="#F5C24C"]{fill:#4FA8CF}
  /* диски вне пула (USB, отдельные члены пула, чётность) — зелёные */
  .fm-list.fm-extdisk .fmico path[fill="#E0A63C"]{fill:#3E9E52}
  .fm-list.fm-extdisk .fmico path[fill="#F5C24C"]{fill:#64C178}
  .fm-row.dragover,.fm-tile.dragover,.fm-fav-i.dragover{background:var(--accent-soft)!important;outline:2px solid var(--accent);outline-offset:-2px;color:var(--accent)}
  .fm-row[draggable],.fm-tile[draggable]{-webkit-user-drag:element}
  .fm-band{position:absolute;border:1px solid var(--accent);background:var(--accent-soft);opacity:.55;pointer-events:none;z-index:5;border-radius:2px}
  .iconbtn.pri{color:var(--accent);background:var(--accent-soft)}
  /* избранное-сайдбар */
  .fm-fav{width:160px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--line);margin-right:12px;padding-right:10px}
  .fm.fav-hidden .fm-fav{display:none}
  .fm-fav-h{display:flex;align-items:center;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);font-family:var(--mono);margin-bottom:6px;padding:2px 4px}
  .fm-fav-h .iconbtn{padding:1px 7px;font-size:15px;line-height:1}
  .fm-fav-list{flex:1;overflow:auto;margin:0 -4px}
  .fm-fav-i{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r-sm);cursor:pointer;font-size:12.5px;color:var(--dim);transition:background .12s,box-shadow .12s,opacity .12s}
  .fm-fav-i:hover{background:var(--sel);color:var(--text)}
  .fm-fav-i.on{background:var(--sel);color:var(--text);font-weight:650;box-shadow:var(--sh-sm)}
  .fm-fav-i .fi{flex:none;color:var(--accent-2);display:flex}
  .fm-fav-i .fn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-fav-i .fx{border:none;background:none;color:var(--mut);display:flex;visibility:hidden;padding:2px;cursor:pointer}
  .fm-fav-i:hover .fx{visibility:visible}.fm-fav-i .fx:hover{color:var(--danger)}
  .fm-fav-i .fx.fx-eject{visibility:visible;color:var(--accent)}
  /* перетаскивание избранного: элементы расступаются вживую, источник полупрозрачный */
  .fm-fav-i.fav-drag{opacity:.4}
  .fm-fav-i .fav-edit{flex:1;min-width:0;font:inherit;font-size:12.5px;background:var(--glass);border:1px solid var(--accent);border-radius:5px;color:var(--text);padding:2px 6px;outline:none}
  /* плитки */
  .fm-list.fm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:6px;align-content:start;padding:6px 2px}
  .fm-tile{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px 10px;border-radius:var(--r-md);cursor:pointer;border:1px solid transparent}
  .fm-tile:hover{background:var(--sel);border-color:var(--line)}
  .fm-tile.sel{background:var(--accent-soft);border-color:var(--accent-line)}
  .fm-tile .ti{position:relative;width:64px;height:64px;display:grid;place-items:center;color:var(--dim)}.fm-tile.dir .ti{color:var(--accent-2)}
  .fm-tile .ti .thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:var(--thumb-fit,contain);border-radius:6px;opacity:0;transition:opacity .12s}
  .fm-tile .ti.thumbed .thumb{opacity:1}
  /* превью загрузилось — убираем типовой значок из-под него, иначе он торчит
     по краям вписанной картинки. Пока превью не пришло, значок виден. */
  .fi.thumbed>svg.fmico,.ti.thumbed>svg.fmico{visibility:hidden}
  /* в режиме «заполнить» превью закрывает плитку целиком, подложка не нужна;
     в режиме «вписать» тёмная подложка проявила бы поля — поэтому её нет */
  .fm-tile .ti .thumb,.fm-row .fi .thumb{background:transparent}
  .fm-tile .tn{font-size:11px;text-align:center;line-height:1.25;color:var(--text);
    display:flex;justify-content:center;align-items:baseline;max-width:100%;overflow:hidden}
  .fm-tile .tn-b{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-tile .tn-x{flex:none;color:var(--mut)}
  .fm-tile .fm-ck{position:absolute;top:6px;left:6px;opacity:0}
  .fm-tile:hover .fm-ck,.fm-tile.sel .fm-ck{opacity:1}
  /* размер значков/плиток ФМ (S/M/L; M — базовый, задаётся классом .fm-sz-* на .fm) */
  .fm-sz-s .fm-row .fi{width:24px;height:24px}
  .fm-sz-l .fm-row .fi{width:36px;height:36px}
  .fm-sz-s .fm-list.fm-grid{grid-template-columns:repeat(auto-fill,minmax(84px,1fr))}
  .fm-sz-l .fm-list.fm-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .fm-sz-s .fm-tile .ti{width:48px;height:48px}
  .fm-sz-l .fm-tile .ti{width:88px;height:88px}
  /* окно-редактор */
  .ed-wrap{display:flex;flex-direction:column;height:100%}
  .ed-bar{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--line);flex:none}
  .ed-bar .grow{flex:1}
  .ed-path{flex:0 1 auto;min-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left;font-size:11.5px;color:var(--dim)}
  .ed-body{flex:1;min-height:0;overflow:hidden}
  .ed-body .CodeMirror{height:100%}
  .ed-body .fm-prev{height:100%}
  /* --- медиа-просмотрщик (видео/картинки/аудио) --- */
  .vw{position:absolute;inset:0;display:flex;flex-direction:column;background:#0b0e14}
  .vw-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;flex:none;color:#e6edf7;background:rgba(0,0,0,.35)}
  .vw-bar .vw-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:12.5px}
  .vw-bar .vw-i{color:#9fb0c6;font-family:var(--mono);font-size:11px;flex:none;margin-right:4px}
  .vw-bar button,.vw-bar a{border:none;background:rgba(255,255,255,.09);color:#e6edf7;border-radius:8px;padding:6px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;transition:.12s;text-decoration:none;flex:none}
  .vw-bar button:hover,.vw-bar a:hover{background:rgba(255,255,255,.2)}
  .vw-bar button.on{background:var(--sel);color:var(--text)}
  .vw-stage{flex:1;min-height:0;min-width:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .vw-stage img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;will-change:transform}
  /* заглушка из миниатюры, пока грузится полная: размываем, чтобы не выглядело «мылом» */
  .vw-stage img.vw-lo{filter:blur(6px);transform:scale(1.01)}
  .vw-stage img.grab{cursor:grab}.vw-stage img.grabbing{cursor:grabbing}
  .vw-stage video{max-width:100%;max-height:100%;background:#000;outline:none}
  .vw-stage audio{width:80%}
  /* кастомный видеоплеер */
  .vp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .vp video{max-width:100%;max-height:100%;background:#000;cursor:pointer}
  /* фуллскрин: видео тянется на весь экран (без него — оставалось нативного размера по центру) */
  .vp:fullscreen,.vp:-webkit-full-screen{width:100vw;height:100vh;background:#000}
  .vp:fullscreen video,.vp:-webkit-full-screen video{width:100%;height:100%;max-width:none;max-height:none;object-fit:contain}
  .vp-ctl{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:13px;padding:30px 18px 15px;font-size:13px;background:linear-gradient(transparent,rgba(0,0,0,.82));transition:opacity .25s;z-index:3}
  .vp.hide .vp-ctl{opacity:0;pointer-events:none}
  .vp-ctl button{border:none;background:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:7px;border-radius:9px;flex:none;min-width:34px;min-height:34px;font-size:15px}
  .vp-ctl button:hover{background:rgba(255,255,255,.18)}
  .vp-ctl button.on{color:var(--accent);background:rgba(255,255,255,.1)}
  .vp-seek{flex:1;height:6px;background:rgba(255,255,255,.22);border-radius:999px;position:relative;cursor:pointer;transition:height .1s;margin:0 2px}
  .vp-seek:hover{height:10px}
  .vp-buf{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.32);border-radius:999px;width:0}
  .vp-prog{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:999px;width:0}
  .vp-prog::after{content:"";position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.55);opacity:0;transition:opacity .1s}
  .vp-seek:hover .vp-prog::after{opacity:1}
  .vp-t{color:#dfe7f2;font-size:12px;font-family:var(--mono);flex:none;min-width:44px;text-align:center}
  .vp-vol{width:84px;accent-color:var(--accent);cursor:pointer}
  .vp-spd{font-size:12.5px;font-weight:700;min-width:38px;justify-content:center}
  /* меню плеера (дорожки/субтитры) */
  .vp-menu{position:absolute;right:12px;bottom:64px;z-index:5;min-width:190px;max-height:50%;overflow:auto;background:rgba(18,22,30,.97);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .vp-menu .vpm-h{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#8fa0b8;padding:6px 9px 3px}
  .vp-menu button{display:flex;width:100%;align-items:center;gap:8px;background:none;border:none;color:#e6edf7;font-size:12.5px;text-align:left;padding:8px 9px;border-radius:8px;cursor:pointer}
  .vp-menu button:hover{background:rgba(255,255,255,.1)}
  .vp-menu button.on{color:var(--accent)}.vp-menu button .vpm-ck{margin-left:auto;flex:none}
  .vw-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:70px;display:grid;place-items:center;background:rgba(0,0,0,.42);color:#fff;border:none;cursor:pointer;border-radius:12px;opacity:0;transition:opacity .15s;z-index:2}
  .vw:hover .vw-nav{opacity:.8}.vw-nav:hover{opacity:1!important;background:rgba(0,0,0,.62)}
  .vw-nav.prev{left:12px}.vw-nav.next{right:12px}.vw-nav svg{transform:rotate(-90deg)}.vw-nav.next svg{transform:rotate(90deg)}
  /* --- Quick Look (пробел) --- */
  .ql{position:absolute;inset:0;z-index:30;background:rgba(10,13,20,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;animation:fade .15s}
  .ql-bar{display:flex;align-items:center;gap:10px;padding:11px 15px;color:#e6edf7;flex:none}
  .ql-bar .ql-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;font-size:13px}
  .ql-bar .ql-i{color:#9fb0c6;font-family:var(--mono);font-size:11px}
  .ql-bar button{border:none;background:rgba(255,255,255,.12);color:#e6edf7;border-radius:8px;padding:6px 11px;cursor:pointer;font-size:12px;font-weight:600}
  .ql-body{flex:1;min-height:0;min-width:0;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
  .ql-body img,.ql-body video{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 12px 44px rgba(0,0,0,.55)}
  .ql-body pre{align-self:stretch;flex:1;min-width:0;overflow:auto;background:var(--code-bg);color:var(--code-fg);border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;word-break:break-word;margin:0}
  .ql-meta{color:#aebac6;font-size:12.5px;text-align:center;line-height:1.8}
  /* --- вкладки файлового менеджера --- */
  .fm-tabs{display:flex;gap:4px;align-items:center;overflow-x:auto;scrollbar-width:none;margin-bottom:2px}
  .fm-tabs::-webkit-scrollbar{height:0}
  .fm-tab{display:inline-flex;align-items:center;gap:7px;max-width:150px;padding:5px 10px;border-radius:9px;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;flex:none}
  .fm-tab.on{background:var(--sel);color:var(--text);font-weight:600}
  .fm-tab .fm-tabn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fm-tab .fm-tabx{opacity:.55;display:flex}.fm-tab .fm-tabx:hover{opacity:1;color:var(--danger)}
  .fm-tab-add{border:none;background:none;color:var(--dim);cursor:pointer;padding:5px 9px;border-radius:8px;flex:none}.fm-tab-add:hover{background:var(--sel);color:var(--text)}
  /* --- прогресс операций --- */
  .op-prog{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);z-index:620;background:var(--glass-2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:14px;box-shadow:var(--sh);padding:12px 16px;min-width:300px;font-size:12.5px;color:var(--text)}
  .op-prog .op-t{font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;gap:12px}
  .op-prog .op-track{height:6px;border-radius:999px;background:var(--card-2);overflow:hidden}
  .op-prog .op-fill{height:100%;background:var(--accent);width:0;transition:width .18s}
  /* terminal */
  /* встроенные моноширинные шрифты для терминала (свои файлы, работают офлайн и на любом
     устройстве); @font-face качает woff2 только когда шрифт реально выбран (font-display:swap) */
  @font-face{font-family:"JetBrains Mono";src:url("/fonts/jetbrains-mono-400.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"JetBrains Mono";src:url("/fonts/jetbrains-mono-700.woff2") format("woff2");font-weight:700;font-display:swap}
  @font-face{font-family:"Fira Code";src:url("/fonts/fira-code-400.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"Fira Code";src:url("/fonts/fira-code-700.woff2") format("woff2");font-weight:700;font-display:swap}
  @font-face{font-family:"Ubuntu Mono";src:url("/fonts/ubuntu-mono-400.woff2") format("woff2");font-weight:400;font-display:swap}
  @font-face{font-family:"Ubuntu Mono";src:url("/fonts/ubuntu-mono-700.woff2") format("woff2");font-weight:700;font-display:swap}
  .term-wrap{display:flex;height:100%;background:#0a0f17;overflow:hidden}
  .term-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
  .term-tb{display:flex;align-items:center;gap:4px;padding:6px 12px;border-bottom:1px solid rgba(120,140,175,.14);background:rgba(255,255,255,.035)}
  .term-tb .t{font-family:var(--mono);font-size:11px;color:#8595ad;flex:1;display:flex;align-items:center;gap:8px}
  .term-tb .t .led{width:8px;height:8px;border-radius:50%;background:#43c08a;box-shadow:0 0 7px #43c08a}
  .term-tb button{border:none;background:none;color:#8595ad;padding:4px 9px;border-radius:7px;font-size:11px;font-family:var(--mono)}
  .term-tb button:hover{background:rgba(255,255,255,.08);color:#eaf0f8}
  /* только область терминала красится темой (вместе с внутренним паддингом) — не всё окно */
  .term-stack{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--tbg,#0a0f17)}
  .term-xt-wrap{position:relative;height:100%}
  .term-xt{height:100%;padding:8px 4px 8px 10px}
  .term-xt .xterm{height:100%}
  /* курсор-черта: рисуем сами тонкой укороченной полоской с мягким миганием — штатная
     анимация bar в xterm не мигает (её keyframe трогает border-bottom, которого у bar нет).
     --tcur — полупрозрачный цвет курсора темы (ставится в applyTermStyle) */
  .term-xt .xterm-cursor.xterm-cursor-bar{box-shadow:none !important;
    background-image:linear-gradient(var(--tcur,#8bd0ff),var(--tcur,#8bd0ff));background-repeat:no-repeat;
    background-position:left center;background-size:2px 58%;animation:tcurBlink 1.5s step-end infinite !important}
  @keyframes tcurBlink{50%{background-size:2px 0}}
  /* попап оформления терминала — в нашей стилистике (стекло), с предпросмотром */
  .tcfg-pop{position:absolute;top:62px;right:12px;z-index:20;width:306px;background:var(--menu-bg,rgba(24,32,46,.94));backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);border:1px solid rgba(255,255,255,.13);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.55);padding:13px;display:flex;flex-direction:column;gap:12px;color:#e6edf6}
  .tcfg-h{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#8fa0b8;font-weight:700;margin-bottom:-4px}
  .tcfg-prev{border-radius:10px;padding:10px 12px;font-size:12px;overflow:hidden;border:1px solid rgba(255,255,255,.09);white-space:nowrap}
  .tcfg-themes{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .tcfg-sw{cursor:pointer;border-radius:9px;height:42px;position:relative;border:2px solid transparent;transition:.12s;overflow:hidden}
  .tcfg-sw:hover{transform:translateY(-1px)}
  .tcfg-sw.on{border-color:var(--accent,#34c6be)}
  .tcfg-sw .snm{position:absolute;top:3px;left:6px;font-size:8px;font-family:var(--mono);opacity:.8}
  .tcfg-sw .dots{position:absolute;bottom:5px;left:6px;display:flex;gap:3px}
  .tcfg-sw .dots i{width:7px;height:7px;border-radius:50%}
  .tcfg-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .tcfg-row label{font-size:12.5px;color:#9fb0c8}
  .tcfg-row select{flex:none;width:142px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:#e6edf6;border-radius:8px;padding:6px 9px;font-size:12.5px}
  .term-tb .grow{flex:1}
  .term-tb button.pri{background:rgba(53,201,192,.16);color:#35c9c0}
  .term-find{background:rgba(0,0,0,.25);border:1px solid rgba(53,201,192,.4);border-radius:7px;color:#c7d3e6;font-family:var(--mono);font-size:11px;padding:4px 9px;width:180px}
  .term-find:focus{outline:none;border-color:#35c9c0}
  .term-tabs{display:flex;gap:2px;padding:6px 8px 0;background:rgba(255,255,255,.02);overflow-x:auto;align-items:flex-end}
  .term-tabs::-webkit-scrollbar{height:0}

  /* ===================== Notes app — DESIGN.md contract =====================
     Notes owns its two palettes — LIGHT = warm paper, DARK = neutral dark —
     with ONE emerald accent in both (the app's character). From the OS
     appearance system it inherits only shape: radius slider and shadow scale.
     data-theme (light|dark) is always set by ntApplyTheme(). */
  .nt-root{
   --radius-sm:var(--r-sm);--radius-lg:var(--r-lg);
   --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;--sp-7:48px;
   --font-ui:ui-sans-serif,-apple-system,"Inter",system-ui,sans-serif;
   --font-mono:ui-monospace,"IBM Plex Mono","JetBrains Mono",monospace;
   --fs-h1:28px;--fs-h2:22px;--fs-h3:18px;--fs-body:16px;--fs-meta:13px;
   /* light (default) — warm paper */
   --bg:#F7F6F3;--surface:#FFFFFF;--surface-2:#F0EFEA;--surface-inset:#ECEBE6;
   --text:#1C1B1A;--text-muted:#6B6A66;--text-faint:#A3A29E;
   --border:#E4E2DD;--border-strong:#D2CFC8;
   --accent:#1F9E6E;--accent-hover:#178A5F;--accent-soft:#E3F3EC;--on-accent:#FFFFFF;
   --success:#1F9E6E;--warning:#C98A1B;--danger:#C0473B;
   --callout-bg:#FBF3D9;--callout-border:#F0E2AE;
   --checkbox-border:var(--border-strong);
   --surface-3:#FFFFFF;                /* popovers */
   --side-bg:#F0EFEA;--card-bg:#FFFFFF;   /* columns differ by tone, not borders */
   --heading:#1C1B1A;--link:#1F9E6E;--code-fg:#1C1B1A;--selection:#E3F3EC;--quote-border:#E3F3EC;
   --veil:rgba(28,27,26,.06);          /* translucent hover wash — never solid */
   --shadow-1:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);
   --shadow-2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
   background:var(--bg);color:var(--text);font-family:var(--font-ui)}
  /* DARK notes = Everforest-style palette fixed by owner (2026-07-11):
     warm grey-green surfaces bottom-up, sage accent, semantic content colours */
  .nt-root[data-theme="dark"]{
   --bg:#2d353b;--side-bg:#232a2e;--card-bg:#343f44;--surface:#2d353b;--surface-2:#343f44;--surface-3:#3d484d;--surface-inset:#343f44;
   --text:#d3c6aa;--text-muted:#9da9a0;--text-faint:#859289;
   --border:#414b50;--border-strong:#4f585e;
   --accent:#a7c080;--accent-hover:#bacc8f;--accent-soft:#425047;--on-accent:#232a2e;
   --success:#a7c080;--warning:#dbbc7f;--danger:#e67e80;
   --callout-bg:#343f44;--callout-border:#4f585e;
   --checkbox-border:#4f585e;
   --veil:rgba(255,255,255,.06);
   --heading:#e4dbc4;--link:#7fbbb3;--code-fg:#e69875;--selection:#543a48;--quote-border:#a7c080;
   --shadow-1:0 1px 2px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.35);
   --shadow-2:0 4px 14px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.3)}

  body.nt-solo .phone-nav,body.nt-solo .win .wbar,body.nt-solo .win .wgrip,body.nt-solo .win>.rz,
  body.nt-solo .mb-grad,body.nt-solo .wall-refresh{display:none!important}
  body.nt-solo .win{inset:0!important;width:auto!important;height:auto!important;
   border-radius:0;box-shadow:none;transform:none!important}
  /* window chrome follows the notes theme: seamless strip above the paper */
  .win.nt-win{background:var(--bg)}
  .win.nt-win .wbar{background:var(--bg);border-bottom:1px solid var(--border)}
  .win.nt-win .ttl{color:var(--text-muted)}
  /* ---- sidebar (folders/tags) = surface-2 ---- */
  .nt-side{width:220px;flex:none;display:flex;flex-direction:column;gap:var(--sp-2);
   padding:var(--sp-4);overflow:auto;background:var(--side-bg)}

  .nt-dnote{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-2);border-radius:var(--radius-sm);cursor:pointer;font-size:14px;color:var(--text-muted)}

  .nt-dnote .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nt-tag{display:inline-flex;align-items:center;gap:var(--sp-1);margin:2px 3px 2px 0;padding:3px 10px;border-radius:999px;background:var(--surface);font-size:var(--fs-meta);cursor:pointer;color:var(--text)}
  .nt-tag i{font-style:normal;color:var(--text-muted);font-size:11px}
  .nt-tag.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
  .nt-mut{color:var(--text-faint);font-size:var(--fs-meta)}
  /* ---- list = bg, cards = surface ---- */
  .nt-list{width:270px;flex:none;overflow:auto;padding:var(--sp-3);background:var(--bg)}
  .nt-lhead{display:flex;align-items:center;justify-content:space-between;padding:var(--sp-1) var(--sp-2) var(--sp-3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
  .nt-item{display:flex;flex-direction:column;gap:var(--sp-1);padding:var(--sp-4);margin-bottom:var(--sp-2);border-radius:var(--radius-lg);cursor:pointer;background:var(--card-bg);box-shadow:var(--shadow-1)}
  .nt-item:hover{background:var(--surface-2)}
  .nt-item.on{background:var(--accent-soft);box-shadow:inset 2px 0 0 var(--accent),var(--shadow-1)}
  .nt-item b{font-size:14px;font-weight:600;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--text)}
  .nt-item b svg{color:var(--warning);vertical-align:-1px}
  .nt-snip{font-size:var(--fs-meta);line-height:1.4;color:var(--text-muted);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .nt-meta{display:flex;align-items:center;gap:var(--sp-1);font-size:11px;color:var(--text-muted);margin-top:var(--sp-1);flex-wrap:wrap}
  .nt-meta i{font-style:normal;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:2px 8px;font-weight:600}
  .nt-meta>span{margin-left:auto}
  .nt-split{width:5px;flex:none;cursor:col-resize;touch-action:none;position:relative;z-index:5;margin:0 -2px;background:transparent}

  .nt-empty{margin:auto;color:var(--text-faint)}
  .nt-crumb{padding:var(--sp-1) var(--sp-6) 0;font-size:var(--fs-meta);color:var(--text-muted)}

  .nt-head .nt-pin-on{color:var(--warning)!important}
  .nt-tagrow{display:flex;align-items:center;gap:var(--sp-1);flex-wrap:wrap;margin:0;padding:0 var(--sp-6) var(--sp-1)}
  .nt-chip{display:inline-flex;align-items:center;gap:var(--sp-1);padding:var(--sp-1) var(--sp-2);border-radius:var(--radius-sm);
   background:var(--accent-soft);color:var(--accent);font-size:var(--fs-meta);font-weight:600}

  .nt-ed{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}

const _hex2rgb=h=>{const n=parseInt(h.slice(1),16);return [n>>16&255,n>>8&255,n&255];};

 const g=_hex2rgb(rd("-good","#1FA971")),w=_hex2rgb(rd("-warn","#CF881B")),d=_hex2rgb(rd("-danger","#DE4E48"));
 if(pct<50)return `rgb(${g[0]},${g[1]},${g[2]})`;         // всё хорошо — зелёный
 let a,b,t;if(pct<78){a=g;b=w;t=(pct-50)/28;}else{a=w;b=d;t=(pct-78)/22;}  // →янтарный →красный
 const m=a.map((v,i)=>Math.round(v+(b[i]-v)*t));
 return `rgb(${m[0]},${m[1]},${m[2]})`;}

function enterExpo(){const ids=Object.keys(OPEN).filter(id=>OPEN[id].style.display!=="none");if(!ids.length){toast("Нет открытых окон");return;}
 if(EXPO)return;EXPO=true;document.body.classList.add("expo-on");const meta=winMeta();
 const back=el(`<div class="expo-back"></div>`);back.onclick=()=>exitExpo();document.body.appendChild(back);EXPO_ELS.push(back);
 const n=ids.length,cols=Math.ceil(Math.sqrt(n)),rows=Math.ceil(n/cols);
 const padX=44,top=MENUBAR_H+34,gapx=26,gapy=40,botM=34;
 const cw=(innerWidth-padX*2-gapx*(cols-1))/cols,chh=(innerHeight-top-botM-gapy*(rows-1))/rows;
 ids.forEach((id,i)=>{const w=OPEN[id],r=Math.floor(i/cols),c=i%cols;
  const cellX=padX+c*(cw+gapx),cellY=top+r*(chh+gapy);
  const bw=w.offsetWidth,bh=w.offsetHeight,s=Math.min(cw/bw,chh/bh,1);
  const dx=cellX-w.offsetLeft,dy=cellY-w.offsetTop;
  w._expoZ=w.style.zIndex;w.dataset.expo="1";w.classList.add("expo-win");w.style.zIndex=1500+i;
  w.style.transformOrigin="0 0";w.style.transform=`translate(${dx}px,${dy}px) scale(${s})`;
  const title=w._title||(meta[id]&&meta[id].name)||id;
  const hit=el(`<div class="expo-hit" style="left:${cellX}px;top:${cellY}px;width:${(bw*s).toFixed(0)}px;height:${(bh*s).toFixed(0)}px"><span class="expo-lab">${esc(title)}</span></div>`);
  hit.onclick=e=>{e.stopPropagation();const win=w;exitExpo();if(win.style.display==="none")win.style.display="flex";focus(win);};
  document.body.appendChild(hit);EXPO_ELS.push(hit);});}
function exitExpo(){if(!EXPO)return;EXPO=false;document.body.classList.remove("expo-on");
 Object.keys(OPEN).forEach(id=>{const w=OPEN[id];if(w.dataset.expo){w.classList.remove("expo-win");w.style.transform="";w.style.transformOrigin="";if(w._expoZ!=null)w.style.zIndex=w._expoZ;delete w.dataset.expo;delete w._expoZ;}});
 EXPO_ELS.forEach(e=>e.remove());EXPO_ELS=[];}
function drag(w,h){let sx,sy,ox,oy,d=false;
 h.addEventListener("pointerdown",e=>{if(e.target.closest(".lights"))return;d=true;h.classList.add("drag");sx=e.clientX;sy=e.clientY;ox=w.offsetLeft;oy=w.offsetTop;h.setPointerCapture(e.pointerId);});
 h.addEventListener("pointermove",e=>{if(!d)return;w.classList.remove("max");w.style.left=Math.min(innerWidth-60,Math.max(-40,ox+e.clientX-sx))+"px";w.style.top=Math.min(innerHeight-60,Math.max(MENUBAR_H,oy+e.clientY-sy))+"px";});
 h.addEventListener("pointerup",()=>{d=false;h.classList.remove("drag");persistWin(w);});
}
// смена размера экрана/монитора: возвращаем все окна в видимую область (заголовок доступен)
addEventListener("resize",()=>{for(const id in OPEN){const w=OPEN[id];if(!w||w.classList.contains("max")||w.style.display==="none")continue;

  w.style.left=g.x+"px";w.style.top=g.y+"px";w.style.width=g.w+"px";w.style.height=g.h+"px";}});

async function openVolume(v,target){
 if(v.mounted){winFiles(v.mount);return;}
 toast("Монтирую "+(v.label||v.dev)+"…");
 const body={dev:v.dev};if(target)body.target=target;
 const r=await api("/api/disk/mount-dev",{method:"POST",body:JSON.stringify(body)});

// быстрое меню бэкапа с иконки дока (запуск/отмена без открытия окна)
async function nbDockMenu(x,y){
 const bp=(path,obj)=>api(path,{method:"POST",body:JSON.stringify(obj||{})});
 const r=await api("/api/backup/config").catch(()=>null);
 const profs=(r&&r.profiles)||[];
 const it=[{label:"Открыть бэкап",ic:svg("sync",16),act:()=>winBackup()}];
 // один профиль — меню как было; несколько — каждый своей строкой, иначе непонятно,
 // какой именно бэкап запускается
 const one=profs.length<2;
 profs.forEach(pr=>{
  const nm=one?"":" · "+pr.name;
  if(pr.running)it.push({label:"Остановить бэкап"+nm,ic:svg("x",16),dng:1,
    act:()=>{bp("/api/backup/cancel",{p:pr.id});toast("Останавливаю…");}});
  else if(pr.queued)it.push({label:"Убрать из очереди"+nm,ic:svg("x",16),
    act:()=>{bp("/api/backup/cancel",{p:pr.id});toast("Убрано из очереди");}});
  else{
   it.push({label:"Запустить бэкап сейчас"+nm,ic:svg("sync",16),act:async()=>{
     const q=await bp("/api/backup/run-bg",{p:pr.id});
     toast(q&&q.queued?"Другой бэкап уже идёт — поставлено в очередь":(q&&q.ok?"Бэкап запущен":(q&&q.log)||"уже выполняется"));}});
   it.push({label:"Пробный прогон"+nm,ic:svg("eye",16),act:async()=>{
     const q=await bp("/api/backup/run-bg",{p:pr.id,dry:true});
     toast(q&&q.queued?"Поставлено в очередь":"Пробный прогон запущен");}});}
  if(!one)it.push({sep:1});});
 if(it.length&&it[it.length-1].sep)it.pop();
 showMenu(x,y,it);}
function dockItems(){
 const base=INTERNAL.map(a=>({id:a.id,ic:a.ic,color:a.color,name:a.name,fn:a.fn,bare:a.bare}));
 base.push({id:"__cockpit",ic:"dash",bare:1,color:"linear-gradient(135deg,#4b7bec,#3a63c9)",name:"Cockpit",fn:()=>window.open(cockpitURL(),"_blank")});
 const byId={};base.forEach(b=>byId[b.id]=b);
 const order=(SET.dockOrder&&SET.dockOrder.length)?SET.dockOrder:base.map(b=>b.id);
 const out=[];order.forEach(id=>{if(byId[id]){out.push(byId[id]);delete byId[id];}});
 base.forEach(b=>{if(byId[b.id])out.push(b);});
 return out;}
function dockDragAfter(d,x,y){const vert=(SET.dockPos==="left"||SET.dockPos==="right");
 const els=[...d.querySelectorAll("button[data-did]:not(.dragging)")];
 let best=null,bestOff=-Infinity;
 els.forEach(el=>{const box=el.getBoundingClientRect();const off=vert?(y-box.top-box.height/2):(x-box.left-box.width/2);
  if(off<0&&off>bestOff){bestOff=off;best=el;}});
 return best;}
function renderDock(){
 const d=document.getElementById("dock");if(!d)return;d.innerHTML="";
 dockItems().filter(a=>!(SET.dockHidden||[]).includes(a.id)).forEach(a=>{const busy=a.id==="__nasbak"&&NB_RUNNING;const b=el(`<button title="${esc(a.name)}${busy?" — идёт бэкап":""}" draggable="true" data-did="${a.id}"><span class="di${busy?" di-busy":""}${a.bare?" di-bare":""}"${a.bare?"":` style="background:${a.color}"`}>${appIcon(a.ic)}${OPEN[a.id]?'<span class="run"></span>':''}${busy?'<span class="di-spin"></span>':''}</span><span class="dl">${esc(a.name)}</span></button>`);
  b.onclick=a.fn;
  if(a.id==="__nasbak")b.oncontextmenu=e=>{e.preventDefault();nbDockMenu(e.clientX,e.clientY);};
  else b.oncontextmenu=e=>{e.preventDefault();dockCtxMenu(a,e.clientX,e.clientY);};
  b.ondragstart=()=>b.classList.add("dragging");
  b.ondragend=()=>{b.classList.remove("dragging");SET.dockOrder=[...d.querySelectorAll("button[data-did]")].map(x=>x.dataset.did);saveSettings();};
  d.appendChild(b);});
 d.ondragover=e=>{e.preventDefault();const dragging=d.querySelector(".dragging");if(!dragging)return;
  const after=dockDragAfter(d,e.clientX,e.clientY);if(after)d.insertBefore(dragging,after);else d.appendChild(dragging);};
}
