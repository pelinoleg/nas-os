     <div style="display:flex;gap:8px;margin-top:6px"><button class="btn sm" id="sExDev">${svg("code",13)} Add development patterns</button><button class="btn sm" id="sExReset">Reset to defaults</button></div>
   </details>`;
  const g=s=>tc.querySelector(s);
  const drawJobs=()=>{const box=g("#sJobs");box.innerHTML=JOBS.length?"":'<div style="color:var(--mut);font-size:12px;padding:6px 0">Empty — click «Pick from NAS».</div>';
   JOBS.forEach((j,i)=>{const exc=(j.excludes&&j.excludes.length)?`<span class="nb-exc" title="${att("Excluded from this folder:\n"+j.excludes.join("\n"))}">−${j.excludes.length} excl.</span>`:"";
    const srcT=(push?"/":"")+j.src;
    const row=el(`<div class="nb-job"><span class="nb-src mono" title="${att(srcT)}">${svg(push?"folder":"net",13)} ${esc(srcT)}</span>${exc}<span class="nb-arr">→</span><span class="nb-dst mono" title="${att(j.dest)}">${esc(j.dest)}</span>${per?`<button class="iconbtn nb-jb" title="Destination folder">${svg("folder",14)}</button>`:""}<button class="iconbtn dng nb-jx" title="Remove">${svg("x",14)}</button></div>`);
    row.querySelector(".nb-jx").onclick=()=>{JOBS.splice(i,1);saveCfg({jobs:JOBS});drawJobs();};
    const jb=row.querySelector(".nb-jb");if(jb)jb.onclick=()=>nbPickLocal(j.dest.replace(/\/[^/]+$/,"")||"/mnt",p=>{JOBS[i].dest=p.replace(/\/$/,"")+"/"+j.src.split("/").pop();saveCfg({jobs:JOBS});drawJobs();});
    box.appendChild(row);});};
  drawJobs();
  wireSeg(tc,"#sDm",v=>saveCfg({dest_mode:v}).then(()=>tabSources(tc)));
  wireSeg(tc,"#dTr",v=>saveCfg({dst:{kind:v}}).then(()=>tabSources(tc)));
  {const dc=g("#dConn");if(dc)dc.onclick=()=>{tab="conn";render();};}
  // redraw after saving: the server re-derives every job's dest from the new base, so the
  // list must be repainted — otherwise it keeps showing the destinations of the old folder
  const remoteDest=()=>((CFG.dst||{}).kind==="ssh");
  const saveDest=async v=>{
   if(v&&!remoteDest()&&!/^\/(mnt|media|srv|home)\//.test(v)){
    toast("The destination folder must be under /mnt, /media, /srv or /home");return;}
   await saveCfg({dest_base:v});
   // single folder: each job's destination is derived from the base — rebuild
   if(v&&CFG.dest_mode!=="per"&&JOBS.length){JOBS.forEach(j=>{j.dest=destFor(j.src);});await saveCfg({jobs:JOBS});}
   drawJobs();};
  const bb=g("#sBase");if(bb)bb.onchange=()=>saveDest(bb.value.trim());
  const bbB=g("#sBaseB");if(bbB)bbB.onclick=()=>{
   if(remoteDest()){
    if(!CFG.host||!CFG.user){toast("Fill in the connection first (address and user)");return;}
    nbPickDest(bb.value.trim(),p=>{bb.value=p;saveDest(p);});
   }else nbPickLocal(bb.value||"/mnt",p=>{bb.value=p;saveDest(p);});};
  g("#sAdd").onclick=()=>{
    if(push&&!CFG.dest_base){toast("First choose a destination (the «Destination» tab)");return;}
    // existing per-job exclusions → absolute paths for tree pre-selection
    const preExcl=[];JOBS.forEach(j=>{const base=j.src.replace(/\/$/,"");(j.excludes||[]).forEach(rel=>preExcl.push(base+rel));});
    nbPickSource(JOBS.map(j=>j.src),preExcl,(list,exl)=>{const chosen=new Set(list);
    JOBS=JOBS.filter(j=>chosen.has(j.src));                                   // deselected — remove
    list.forEach(src=>{if(!JOBS.some(j=>j.src===src))JOBS.push({src,dest:destFor(src),enabled:true});});
    if(!per)JOBS.forEach(j=>{j.dest=destFor(j.src);});                        // single folder: align the tree for all (including old ones)
    // distribute exclusions across jobs: anchored path relative to src (leading /)
    JOBS.forEach(j=>{const base=j.src.replace(/\/$/,"");
      const ex=(exl||[]).filter(p=>p.startsWith(base+"/")).map(p=>p.slice(base.length));
      if(ex.length)j.excludes=ex;else delete j.excludes;});
    saveCfg({jobs:JOBS}).then(()=>tabSources(tc));},
    push?{title:"What to copy from this NAS",loading:"Reading folders…"}:null);};
  const exList=()=>g("#sExcl").value.split("\n").map(x=>x.trim()).filter(Boolean);
  const exSet=arr=>{const uniq=[...new Set(arr)];g("#sExcl").value=uniq.join("\n");saveCfg({excludes:uniq});};
  g("#sExcl").onchange=()=>exSet(exList());
  g("#sExDev").onclick=()=>exSet(exList().concat(NB_EXCL_DEV));
  g("#sExReset").onclick=()=>exSet(NB_EXCL_DEFAULT.slice());
 }

  // comes; full paintStatus (2 extra API calls) only on state transitions
  function waitQueue(){clearInterval(win._nbpi);
   win._nbpi=setInterval(async()=>{if(!document.body.contains(con)){clearInterval(win._nbpi);win._nbpi=null;return;}
    const st=await nbG("/api/backup/status");if(!st)return;
    if(st.running){clearInterval(win._nbpi);win._nbpi=null;con.innerHTML="";nbCursor=0;nbStarted=null;attachLog();paintStatus();}
    else if(!st.queued){clearInterval(win._nbpi);win._nbpi=null;setBusy(false);paintStatus();}   // removed from the queue
    else{const sn=g("#oStatus");if(sn)sn.innerHTML=qCaption(st);}},3000);}
  // allow — a one-time "I deleted this myself on the source": a run without --max-delete.
  // not written to the config: the next run is protected again
  const run=async (dry,allow)=>{if(!(c.jobs||[]).length){toast("Select sources first (the «Sources» tab)");return;}
   if(isPush()&&!CFG.dest_base){toast("First choose a destination (the «Destination» tab)");return;}

   const gn=g("#oGuard");if(gn&&allow){gn.style.display="none";gn.innerHTML="";}
   const rr=await nbP("/api/backup/run-bg",{dry,allow_delete:!!allow});
   if(rr&&rr.queued){toast("Another backup is already running — queued");waitQueue();return;}
   attachLog();};
  g("#oRun").onclick=()=>run(false);g("#oDry").onclick=()=>run(true);
  g("#oCancel").onclick=()=>{setStopping(true);nbP("/api/backup/cancel");toast("Stopping…");};
  // on tab open: preload the LAST run's log so «Show log» is never empty,
  // then reattach if a run is active or waiting in the queue (journal stays hidden)
  nbG("/api/backup/log?since=0").then(r=>{if(!r)return;
   if(r.lines&&r.lines.length){nbAppend(r.lines);nbCursor=r.seq;nbStarted=r.started;}
   if(r.running){setBusy(true);attachLog();}
   else if(r.queued){setBusy(true);waitQueue();}});
  g("#oTest").onclick=async()=>{toast("Testing connection…");const t=await nbP("/api/backup/test");toast(t&&t.ok?"✓ connection works":("✗ "+((t&&t.log)||"no connection")));};

/* Bar color — by the slot's uptime SHARE (frac), not by the "worst state": a slot
   here is an hour or a whole day, and one one-second dip colored it entirely red —
   a month with 99.9 % uptime looked like a solid outage. The scale is continuous good→warn→
   danger, pure red only when downtime is ≥ 50 % of the slot. We take colors from the already
   contrast-adjusted widget surface tokens (--wdg-*), not hardcoded. */
const _avHex=n=>{const v=getComputedStyle(document.documentElement).getPropertyValue(n).trim();
 return /^#[0-9a-f]{6}$/i.test(v)?v:null;};
const _avMix=(a,b,t)=>{const p=h=>[1,3,5].map(i=>parseInt(h.slice(i,i+2),16));
 const x=p(a),y=p(b),c=i=>Math.round(x[i]+(y[i]-x[i])*t).toString(16).padStart(2,"0");
 return "#"+c(0)+c(1)+c(2);};
/* anchor points: 0 → green, 1 % downtime → slightly yellower, 10 % → yellow,
   25 % → orange, ≥ 50 % → red */
function avScale(d){
 if(d<=0)return 0;
 if(d<0.10)return 0.5*Math.sqrt(d/0.10);
 return Math.min(1,0.5+0.5*(d-0.10)/0.40);
}
function avColor(f){
 if(f==null)return "var(--track)";
 const g=_avHex("--wdg-good"),w=_avHex("--wdg-warn"),d=_avHex("--wdg-danger");
 if(!g||!w||!d)return f>=1?"var(--good)":f>=0.5?"var(--warn)":"var(--danger)";
 const u=avScale(1-f);
 return u<=0.5?_avMix(g,w,u*2):_avMix(w,d,(u-0.5)*2);
}
function avBarsHTML(r,pct,hours){

 const c=(v,i)=>fr.length?avColor(fr[i]):(v===2?"var(--good)":v===1?"var(--warn)":v===0?"var(--danger)":"var(--track)");
 const op=i=>cv.length?Math.max(0,Math.min(1,cv[i])):1;   // share of the slot's known time
 const h=r.hours||24;
 const now=(r.now?r.now*1000:Date.now()),t0=(r.start?r.start*1000:now-h*3600e3);
 const slotW=(now-t0)/bars.length,wDate=h>=48;
 const p2=n=>String(n).padStart(2,"0");
 const hm=t=>{const d=new Date(t),s=`${p2(d.getHours())}:${p2(d.getMinutes())}`;return wDate?`${p2(d.getDate())}.${p2(d.getMonth()+1)} ${s}`:s;};

    list the exact outage intervals (r.events) overlapping the slot */
 const tit=(v,i)=>{
  const a=t0+i*slotW,b=a+slotW;
  const f=fr[i];
  // the slot is now large (hour/day) — the "worst state" without an uptime share lies:
  // 99.9 % and 10 % would look the same
  let s=`${hm(a)}–${hm(b)} · ${f!=null?(f*100).toFixed(f>=0.999&&f<1?2:1)+"% availability":word(v)}`;
  // we honestly say that not everything about the slot is known — otherwise "4.2 %" looks like
  // an hour of downtime, though the log only knows a couple of minutes about this hour in total
  if(f!=null&&op(i)<0.98)s+=` · known ${Math.round(op(i)*100)}% of the time`;

   1.2s autosave debounce would otherwise drop the last keystrokes. keepalive
   lets the request outlive the page; conflict_copy=true because nobody is
   left to answer a conflict dialog — the server parks the text in a sibling
   file instead of clobbering a newer version from another device. */

 NT_DIRTY=false;clearTimeout(NT_SAVE_T);

  const t=document.getElementById("ntTitle");
  fetch("/api/notes/save",{method:"POST",keepalive:true,headers:{"Content-Type":"application/json"},
   body:JSON.stringify({path:NT_PATH,title:t?t.value.trim():"",tags:NT_TAGS.slice(),pinned:NT_PIN,
    md:NT_ED.getMarkdown(),base_mtime:NT_MTIME,conflict_copy:true})})
   .then(x=>x.json()).then(r=>{if(r&&r.ok&&r.mtime)NT_MTIME=r.mtime;   // page survived (tab switch) — stay in sync
    if(r&&r.conflict_copy)toast("Version conflict: the text was saved as a copy «"+r.conflict_copy+"»");})

function ntLangWire(box){
 let anchor=null;
 box.addEventListener("mousedown",e=>{const cb=e.target.closest(".toastui-editor-ww-code-block,.toastui-editor-ww-code-block-highlighting");if(cb)anchor=cb;},true);
 new MutationObserver(()=>{

     (openLanguageSelectBox → new instance) and destroyed on close — it can
     only be caught here, never wired once at editor init */
  const wr=box.querySelector(".toastui-editor-code-block-language");

function ntLangDressHl(box,wr,anchor){

    based). Forcing absolute moved it deep into the editor scrollable, focus
    auto-scrolled it into view → PM emitted "scroll" → the plugin destroys
    the box on scroll → the panel died the instant it opened. */

    there makes PM mark the node dirty, rebuild the node view and DESTROY the
    select box the moment it opened (found the hard way) */
 if(anchor){
  const ab=anchor.getBoundingClientRect();
  L=Math.max(8,Math.min(ab.right-10-W,innerWidth-W-8));
  T=Math.max(8,Math.min(ab.top+38,innerHeight-320));}
 wr.style.left=L+"px";wr.style.top=T+"px";
 if(list)list.style.display="block";
 if(inp){inp.placeholder=nasTr("search language…");
  setTimeout(()=>{try{inp.select();}catch(e){}},30);
  inp.addEventListener("input",()=>{const v=inp.value.trim().toLowerCase();
   if(list)list.style.display="block";   // vendor hides the list on non-nav keys
   btns.forEach(b=>{b.style.display=!v||b.textContent.toLowerCase().includes(v)?"":"none";});});}

 if(act)setTimeout(()=>{const bx=list.querySelector(".buttons");if(bx)bx.scrollTop=Math.max(0,act.offsetTop-60);},0);
}
/* custom select on top of the vendor mechanics: its <input> stays as the
   commit path (Enter/blur) AND doubles as the search field; around it — our
   list with keyboard navigation, check mark and Escape-cancel */
function ntLangDress(box,sp,anchor){

 /* re-parent into .nt-ed (position:relative) and place absolutely under the
    badge, clamped to the editor box — position:fixed at viewport coords kept
    escaping the window (and ancestor filters break fixed altogether) */
 if(anchor){
  box.appendChild(sp);
  const bb=box.getBoundingClientRect(),ab=anchor.getBoundingClientRect(),W=200;
  sp.style.position="absolute";
  sp.style.left=Math.max(8,Math.min(ab.right-bb.left-10-W,bb.width-W-8))+"px";
  sp.style.top=Math.max(8,Math.min(ab.top-bb.top+38,bb.height-320))+"px";
  sp.style.width=W+"px";}
 const orig=inp.value,cur=(orig||"text").toLowerCase();
 inp.placeholder=nasTr("search language…");
 const ls=document.createElement("div");ls.className="nt-langs";
 const items=NT_LANGS.map(l=>{const b=document.createElement("button");b.type="button";b.textContent=l;
  if(l===cur)b.classList.add("on");
  /* mousedown, not click: keeps focus in the input so vendor blur doesn't fire first */
  b.onmousedown=e=>{e.preventDefault();inp.value=l==="text"?"":l;
   inp.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter",bubbles:true}));};
  ls.appendChild(b);return b;});
 sp.appendChild(ls);
 const on=ls.querySelector(".on");if(on)setTimeout(()=>on.scrollIntoView({block:"nearest"}),0);
 setTimeout(()=>inp.select(),30);   // after the vendor focuses it: typing replaces the old value
 const vis=()=>items.filter(b=>b.style.display!=="none");

    so a keyboard-highlighted item lands in input.value just in time */

  const v=vis(),hi=v.find(x=>x.classList.contains("sel"));

   let i=v.indexOf(hi);i=e.key==="ArrowDown"?Math.min(v.length-1,i+1):Math.max(0,i-1);

  items.forEach(b=>{b.style.display=!v||b.textContent.includes(v)?"":"none";});
  setHi(v?vis()[0]:null);});
}

   layout attributes (style/width on img) that the default sanitizer removes */
function ntSanitize(html){
 const doc=new DOMParser().parseFromString("<body>"+html,"text/html");
 doc.querySelectorAll("script,iframe,object,embed,form").forEach(n=>n.remove());
 doc.querySelectorAll("*").forEach(n=>{
  [...n.attributes].forEach(a=>{
   const nm=a.name.toLowerCase();
   if(nm.startsWith("on")||(nm==="href"&&/^javascript:/i.test(a.value))||(nm==="src"&&/^javascript:/i.test(a.value)))n.removeAttribute(a.name);});});
 return doc.body.innerHTML;
}

/* Unified block view: section headers .set-h + their rows wrapped in cards
   .set-card (as in "Files"), so settings aren't a solid wall. Idempotent:
   it doesn't touch an already-carded tab or a tab without .set-h. Reparenting preserves
   handlers, and all binding runs by id (querySelector) — independent of nesting. */
function cardify(tc){

 if(!tc||tc.querySelector(".set-card")||tc.querySelector(".ev-cols"))return;
 if(!tc.querySelector(".set-h")&&!tc.querySelector(".set-grp"))return;   // no section headers

  if(c.contains("set-title")||c.contains("set-sub")||c.contains("set-savebar")||c.contains("rban")){card=null;return;}
  if(c.contains("set-h")||c.contains("set-grp")){                       // section start → new card
   card=document.createElement("div");card.className="set-card";c.remove("set-h");c.add("set-grp");

  const saveSm=async()=>{const r=await api("/api/maintenance",{method:"POST",body:JSON.stringify({maintenance:{
     smart_scan_min:+sc.value||10,smart_short_days:+ss.value||0,smart_long_days:+sl.value||0,
     snap_sync_time:sy.value.trim(),snap_scrub_dow:sd.value,snap_scrub_time:sr.value.trim()}})});

  const saveRel=async()=>{const r=await api("/api/maintenance",{method:"POST",body:JSON.stringify({maintenance:{
     automount_recover:amr.checked,summary_enabled:sumOn.checked,summary_freq:segVal(sumFreq),
     summary_dow:sumDow.value,summary_time:sumTime.value.trim()||"09:00",

    const md=(r&&r.maintenance)||{};thHot.value=md.thermal_hot;thCrit.value=md.thermal_crit;

}

let MS_URL="";
async function pollMySpeed(){
 const box=document.getElementById("wg-myspeed");if(!box)return;
 const wdg=box.closest(".wdg");
 const hide=()=>{if(wdg)wdg.style.display="none";};
 let r=null;
 try{r=await api("/api/myspeed");}catch(e){}
 if(!r||!r.ok){hide();return;}   /* ok=false — the service is absent or silent; with ok=true there are always measurements */
 if(wdg)wdg.style.display="";
 /* r.url is the address the SERVER uses (usually 127.0.0.1): in the browser it
    points to the user's machine. We take the link from the container's web-desktop.url label,
    and if there is no label, we substitute the current host instead of loopback. */
 const app=(APPS||[]).find(a=>/myspeed/i.test(a.name||"")||/:5216(\/|$)/.test(a.url||""));
 MS_URL=(app&&app.url)||String(r.url||"").replace(/\/\/(127\.0\.0\.1|localhost)\b/,"//"+location.hostname);
 /* MySpeed stores a failed measurement as -1 — we do not show such numbers.
    We check null separately: +null===0, and null>=0 is true, both would pass as valid. */
 const num=v=>(v!=null&&+v>=0);
 const mbit=v=>(!num(v)?"—":(+v>=100?Math.round(+v):(+v).toFixed(1))+" Mbit/s");
 const ago=t=>{const s=(Date.now()-Date.parse(t))/1000;
   if(!isFinite(s))return "";
   if(s<90)return "just now";
   if(s<5400)return Math.round(s/60)+" min ago";
   if(s<172800)return Math.round(s/3600)+" h ago";
   return Math.round(s/86400)+" d ago";};
 const a=r.avg||{};
 // we take colors from the widget surface's already contrast-adjusted tokens
 const pingCol=!num(r.ping)?"var(--dim)":(r.ping<30?"var(--good)":r.ping<80?"var(--warn)":"var(--danger)");
 const foot=[ago(r.created),r.count?r.count+" tests":""].filter(Boolean).join(" · ");
 box.innerHTML=`<div class="ms-row"><span class="ms-l ms-dn">${svg("download",13)} Download</span><b class="ms-dn">${esc(mbit(r.download))}</b></div>
   <div class="ms-row"><span class="ms-l ms-up">${svg("upload",13)} Upload</span><b class="ms-up">${esc(mbit(r.upload))}</b></div>
   <div class="ms-row"><span class="ms-l">${svg("activity",13)} Ping</span><b style="color:${pingCol}">${!num(r.ping)?"—":esc(r.ping+" ms")}</b></div>
   ${a.download!=null?`<div class="ms-avg">average ${esc(mbit(a.download))} / ${esc(mbit(a.upload))}${a.ping!=null?` · ping ${esc(a.ping+" ms")}`:""}</div>`:""}
   ${foot?`<div class="ms-avg">${esc(foot)}</div>`:""}
   ${r.failed?`<div class="ms-avg" style="color:var(--danger)">last test failed · ${esc(ago(r.failed_at))}</div>`:""}`;
 const mm=document.getElementById("more-myspeed");
 if(mm)mm.onclick=()=>{if(MS_URL)window.open(MS_URL,"_blank");};
}

/* The mini speed test result is set once on click and is not updated afterwards:
   pollNet only repaints the link rows. Without a timestamp, an old value
   sits next to fresh MySpeed data and looks like a discrepancy. */
let NS_AT=0, NS_HTML="";
const nsPaint=()=>{const e=document.getElementById("wg-nsres");

/* "Local network": latency to the router + verdict "path to the network is not direct".
   A gigabit switch responds faster than 1 ms. Milliseconds and/or proxy-ARP (several
   addresses answering with the router's MAC) = a bridge/repeater between the NAS and the network — it will be
   the ceiling of any copy, no matter what the link promises. */
function lanHTML(L){
 if(L.rtt==null)return "";
 const bad=!!L.slow||L.relay>0;
 const row=`<div class="krow" style="margin-top:2px" title="${att("Round-trip time to the router. A gigabit switch answers in under 1 ms.")}"><span style="color:var(--mut);font-size:11px">Local network</span><b style="font-size:11px;color:${bad?"var(--warn)":"var(--good)"}">${L.rtt} ms</b></div>`;
 if(!bad)return row;
 const why=(L.slow?"The cable is gigabit, but the local network answers slowly. ":"")
  +(L.relay?"Several addresses answer with the router's MAC address (proxy-ARP): traffic goes through a bridge, not a switch. ":"")
  +"There is a middleman between the NAS and the rest of the network — a Wi-Fi bridge, repeater or powerline adapter. Copying and backups will hit its ceiling, not the disks'. Plug the NAS by cable into the same router or switch as your other devices.";
 return row+`<div class="wg-lanwarn" title="${att(why)}">${svg("warn",12)}<span>The network is capping your speed</span></div>`;}
async function pollNet(){const box=document.getElementById("wg-netlink");if(!box)return;
 const n=await api("/api/net");if(!n)return;
 // network speed is measured in Mbit/s — that's what the provider, driver and MySpeed call it.
 // Earlier we divided by 8 and showed MB/s: the numbers didn't match anything.
 const wifi=n.type==="wifi",spd=n.link_mbit?Math.round(n.link_mbit)+" Mbit/s":"—";
 const name=wifi?((n.ssid||"Wi-Fi")+(n.band?" · "+n.band:"")):"Cable (Ethernet)";
 const spdCol=wifi?(n.link_mbit>=800?"var(--good)":"var(--warn)"):"var(--good)";
 box.innerHTML=`<div class="krow"><span style="display:inline-flex;align-items:center;gap:6px;min-width:0"><span style="flex:none;display:flex">${svg(wifi?"wifi":"net",13)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></span><b style="color:${spdCol};flex:none" title="${n.link_mbit?Math.round(n.link_mbit/8)+" MB/s":""}">${spd}</b></div>`
  +(wifi&&n.signal!=null?`<div class="krow" style="margin-top:2px"><span style="color:var(--mut);font-size:11px">Signal</span><b style="font-size:11px">${n.signal_pct}% · ${n.signal} dBm</b></div>`:"")
  // link speed promises nothing: behind the cable there may be a Wi-Fi bridge/repeater,
  // and then it, not the disks, is the copy ceiling. The signs are latency to the router and proxy-ARP
  +lanHTML(n.lan||{});
 const btn=document.getElementById("wg-nstest"),res=document.getElementById("wg-nsres");
 if(btn&&!btn._wired){btn._wired=1;btn.onclick=async()=>{btn.disabled=true;const o=btn.textContent;btn.textContent=nasTr("Test… (~15 s)");if(res)res.textContent=nasTr("measuring…");
   const r=await api("/api/net/speedtest");btn.disabled=false;btn.textContent=o;
   if(r&&r.ok){NS_AT=Date.now();
     NS_HTML=`<b style="color:var(--good)" title="${r.down_MBs!=null?r.down_MBs+" MB/s":""}">↓ ${r.down_mbps!=null?r.down_mbps:"—"} Mbit/s</b> · <b style="color:var(--accent)" title="${r.up_MBs!=null?r.up_MBs+" MB/s":""}">↑ ${r.up_mbps!=null?r.up_mbps:"—"} Mbit/s</b>`;
     nsPaint();}
   else{NS_HTML="";if(res)res.textContent=nasTr("Error: ")+((r&&r.log)||"?");}};}

 if(pollEvents._busy)return;pollEvents._busy=true;   // no overlapping polls (a slow response → duplicates)
 try{await _pollEvents();}finally{pollEvents._busy=false;}}
/* long-poll loop: the request itself hangs for up to 25s (or until an event), then we immediately repeat.
   Error/offline → pause and retry, so as not to hammer. Replaces the 15-s setInterval. */
let _evLoopOn=false;
async function eventLoop(){
 if(_evLoopOn)return;_evLoopOn=true;
 for(;;){
  let ok=true;
  try{await _pollEvents();}catch(e){ok=false;}
  await new Promise(r=>setTimeout(r,ok?150:4000));
 }
}
/* Reaction to events: we update only what is affected, not the whole page. A disk
   inserted/removed → immediately repaint icons/volumes/disks; a container changed
   state → stacks; IP/link changed → network; USB import finished → shortcuts. */
let _reactT=null;
function reactToEvents(events){
 const names=new Set(events.map(e=>e.event||"")),kinds=new Set(events.map(e=>e.kind||""));
 const has=(...xs)=>xs.some(x=>names.has(x));
 const jobs=new Set();
 if(kinds.has("disk")||has("disk_add","disk_remove","disk_remount","readonly","fserror","usb_import")){jobs.add("disks");jobs.add("apps");}
 if(has("container","container_loop","svcfail","cron_failed")||kinds.has("svc"))jobs.add("stacks");
 if(has("ip_changed","link_changed","vpn_offline")||kinds.has("net"))jobs.add("net");
 // light debounce: a batch of events at once → a single update run
 clearTimeout(_reactT);
 _reactT=setTimeout(()=>{
  if(jobs.has("disks"))pollDisks();
  if(jobs.has("apps"))pollApps();
  if(jobs.has("stacks"))pollStacks();
  if(jobs.has("net"))pollNet();
 },350);
}
async function _pollEvents(){
 // long-poll: the server holds the request for up to 25s until an event appears (with after=0
 // it returns immediately). This way the panel learns about what's happening instantly, without 15-s polling.
 const r=await api("/api/events?after="+EVQ.seq+"&wait="+(EVQ.seq?25:0));if(!r||!Array.isArray(r.events))return;
 if(r.events.length)reactToEvents(r.events);   // pull affected data without a reload
 const first=!EVQ.init;EVQ.init=true;
 r.events.forEach(e=>EVQ.cache.push(e));
 if(EVQ.cache.length>800)EVQ.cache.splice(0,EVQ.cache.length-800);
 EVQ.seq=r.seq||EVQ.seq;EVQ.seen=r.seen||0;EVQ.unseen=r.unseen||0;
 if(first)EVQ.toasted=EVQ.seq;      // don't toast old items on page load
 else{const fresh=r.events.filter(e=>e.id>EVQ.toasted&&e.desk);
  fresh.slice(-4).forEach(e=>ntoast(e));
  if(r.events.length)EVQ.toasted=Math.max(EVQ.toasted,...r.events.map(e=>e.id));}
 // unread critical (fresher than a day, with the banner enabled) — remind once every N minutes (SET.critRemind)
 const remMin=SET.critRemind!=null?+SET.critRemind:10;
 const crit=EVQ.cache.filter(e=>e.lvl==="crit"&&e.desk&&e.id>EVQ.seen&&(Date.now()/1e3-(e.t2||e.t))<86400);
 if(remMin>0&&crit.length&&Date.now()-EVQ.remind>remMin*60000){EVQ.remind=Date.now();ntoast(crit[crit.length-1],true);}

const OPS={list:[],seq:0,paintT:0,autoClosed:false,autoOpened:false};

/* Operation history now lives on the server (~/nas-config/ops-history.json), so it is
   the same in every browser and survives a reinstall through the settings backup.
   localStorage stays as an offline cache: if the API is unreachable we still show
   something. Running operations are never persisted — an upload dies with the page,
   while backup and USB import keep going and are re-created from the server. */
const OPS_KEY="nasops",OPS_KEEP=60,OPS_TTL=30*86400e3;

function opsSave(){
 try{
  const keep=OPS.list.filter(o=>o.state!=="run").slice(-OPS_KEEP)
    .map(o=>({id:o.id,uid:o.uid,title:o.title,state:o.state,label:o.label,t:o.t}));
  localStorage.setItem(OPS_KEY,JSON.stringify(keep));
 }catch(e){}}
function opsPush(o){                       // hand a completed operation to the server
 if(!o.uid)return;
 api("/api/ops",{method:"POST",body:JSON.stringify(
   {uid:o.uid,state:o.state,ts:Math.round((o.t||Date.now())/1000),title:o.title,label:o.label||""})}).catch(()=>{});}
function opsAdopt(items){
 const now=Date.now();
 OPS.list=items.filter(o=>o&&o.t&&now-o.t<OPS_TTL).sort((a,b)=>a.t-b.t).slice(-OPS_KEEP);
 OPS.seq=0;
 OPS.list.forEach(o=>{o.id=++OPS.seq;o.p=o.state==="done"?1:null;o.cancel=null;o.cancelled=false;
   if(o.state==="run"){o.state="err";o.label="interrupted by a panel reload";}
   // don't create a duplicate for an already recorded import
   if(o.uid&&o.uid.indexOf("usb:")===0&&typeof USB_SEEN!=="undefined")USB_SEEN.add(o.uid.slice(4));});
 paintOps(true);}
async function opsLoad(){
 let items=null;
 try{const r=await api("/api/ops");
   if(r&&Array.isArray(r.ops))items=r.ops.map(x=>({uid:x.uid,title:x.title,state:x.state,label:x.label,t:(x.ts||0)*1000}));
 }catch(e){}
 if(!items){                              // server unavailable — show the local cache
   try{items=JSON.parse(localStorage.getItem(OPS_KEY)||"[]");}catch(e){items=[];}
   if(!Array.isArray(items))items=[];
 }
 opsAdopt(items);opsSave();}
const opAgo=t=>{if(!t)return "";const s=Math.max(0,(Date.now()-t)/1000);
 if(s<60)return "just now";
 if(s<3600)return Math.floor(s/60)+" min ago";
 if(s<86400)return Math.floor(s/3600)+" h ago";
 return Math.floor(s/86400)+" d ago";};
let OPS_TICK=null;
// While something is running, we repaint ourselves. Otherwise the bar freezes: progress
// events arrive rarely (batch operations) or the popup was opened after the start.
function opsTick(){if(OPS_TICK)return;
 OPS_TICK=setInterval(()=>{if(!OPS.list.some(o=>o.state==="run")){clearInterval(OPS_TICK);OPS_TICK=null;return;}
  paintOps();},300);}
/* "Saved ✓" to the left of the button. The toast disappears in the screen corner, and in settings it's
   easy to miss — the confirmation must be where the eye is looking. */
function flashSaved(btn,msg){
 if(!btn||!btn.parentNode)return;
 const p=btn.parentNode;
 let b=[...p.children].find(x=>x.classList&&x.classList.contains("saved-badge"));
 if(!b){b=el(`<span class="saved-badge"></span>`);p.insertBefore(b,btn);}
 b.textContent=nasTr(msg||"Saved ✓");
 b.classList.remove("show");void b.offsetWidth;   // restart the animation on a repeated click
 b.classList.add("show");
 clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove("show"),2200);}

function opAdd(title,opts){opts=opts||{};
 const o={id:++OPS.seq,title,state:"run",p:null,label:"",cancel:opts.cancel||null,cancelled:false,t:Date.now()};
 OPS.list.push(o);if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
 paintOps(true);opsTick();
 // opens automatically when an operation starts (SET.opsAuto setting); if the user
 // closed it while working — we don't intrude until the current batch ends
 if(SET.opsAuto!==false&&!document.querySelector(".mbpop[data-ops]")&&!OPS.autoClosed){OPS.autoOpened=true;opsPop();}
 return o;}
function opSet(o,p,label){o.p=p;if(label!=null)o.label=label;paintOps();}
function opEnd(o,ok,label){if(o.state!=="run")return;o.state=o.cancelled?"cancel":ok?"done":"err";
 if(label!=null&&label!=="")o.label=label;if(o.state==="done")o.p=1;o.cancel=null;
 o.t=Date.now();o.uid=o.uid||opsUid();
 paintOps(true);opsSave();opsPush(o);
 if(!OPS.list.some(x=>x.state==="run")){OPS.autoClosed=false;
  // an auto-opened popover hides itself shortly after the total completes
  if(OPS.autoOpened)setTimeout(()=>{const q=document.querySelector(".mbpop[data-ops]");
   if(q&&OPS.autoOpened&&!OPS.list.some(x=>x.state==="run")){q.remove();OPS.autoOpened=false;}},1800);}}
function opCancel(o){if(o.state!=="run")return;o.cancelled=true;
 try{if(o.cancel)o.cancel(o);}catch(e){}paintOps(true);}
function paintOps(force){
 const now=Date.now();if(!force&&now-OPS.paintT<200)return;OPS.paintT=now;
 const b=document.getElementById("opsBtn");if(!b)return;
 const run=OPS.list.filter(o=>o.state==="run").length;
 // the icon is always in place: it's used to view the history of downloads and copies,
 // not just the current progress. An empty list means a dimmed icon.
 b.classList.toggle("mb-idle",!OPS.list.length);
 b.innerHTML=svg(run?"sync":"list",16)+(run?`<span class="mb-badge">${run}</span>`:"");
 b.title=nasTr(run?`Operations: ${run} running`:"Operations");
 const p=document.querySelector(".mbpop[data-ops]");if(p)renderOpsList(p);}
function renderOpsList(p){
 // incrementally: if the composition/states haven't changed, we update only progress and labels
 const sig=OPS.list.map(o=>o.id+":"+o.state).join(",");
 if(p._sig===sig){
  OPS.list.forEach(o=>{if(o.state!=="run")return;   // don't touch completed ones: in the label <span class="op-when">
   const row=p.querySelector(`[data-op="${o.id}"]`);if(!row)return;
   const bf=row.querySelector(".op-bf");if(bf&&o.p!=null)bf.style.width=Math.round(Math.min(o.p,1)*100)+"%";
   const s2=row.querySelector(".op-s2");if(s2){const l=nasTr(o.label);if(s2.textContent!==l){s2.textContent=l;s2.title=o.label||"";}}
   const t2=row.querySelector(".op-t2"),tt=nasTr(o.title);if(t2&&t2.textContent!==tt){t2.textContent=tt;t2.title=o.title;}});
  return;}
 p._sig=sig;
 const items=OPS.list.slice().reverse();
 p.innerHTML=`<div class="mbp-h"><span>Operations</span>${OPS.list.some(o=>o.state==="run")?`<span class="mbp-cnt">${OPS.list.filter(o=>o.state==="run").length} active</span>`:""}<span class="grow"></span><button class="mbp-hb" id="opsClr" title="Clear finished">${svg("eraser",15)}</button></div>`
  +(items.length?items.map(o=>{
    const st=o.state==="run"?"":o.state==="done"?`<span class="op-st done" style="font-weight:800">✓</span>`:o.state==="cancel"?`<span class="op-st">⊘</span>`:`<span class="op-st err" style="font-weight:800">!</span>`;
    const bar=o.state==="run"?`<div class="op-bar"><div class="op-bf" style="width:${o.p==null?40:Math.round(Math.min(o.p,1)*100)}%"></div></div>`:"";
    const when=o.state==="run"?"":`<span class="op-when">${esc(opAgo(o.t))}</span>`;
    return `<div class="op-row${o.state==="run"&&o.p==null?" ind":""}" data-op="${o.id}"><div class="op-m"><div class="op-t2" title="${att(o.title)}">${esc(o.title)}</div><div class="op-s2" title="${att(o.label||"")}">${esc(o.label||"")}${when}</div>${bar}</div>${st}${o.state==="run"?`<button class="op-x" title="Cancel">${svg("x",14)}</button>`:""}</div>`;
  }).join(""):`<div class="mbp-empty">No operations</div>`);
 p.querySelectorAll(".op-x").forEach(x=>x.onclick=ev=>{ev.stopPropagation();
  const o=OPS.list.find(y=>y.id===+x.closest(".op-row").dataset.op);if(o)opCancel(o);});
 const clr=p.querySelector("#opsClr");if(clr)clr.onclick=()=>{OPS.list=OPS.list.filter(o=>o.state==="run");
  opsSave();api("/api/ops/clear",{method:"POST",body:"{}"}).catch(()=>{});paintOps(true);
  const q=document.querySelector(".mbpop[data-ops]");if(q){q._sig=null;renderOpsList(q);}};}
function opsPop(){const b=document.getElementById("opsBtn");if(!b)return;
 mbPop(b,p=>{p.setAttribute("data-ops","1");renderOpsList(p);},
  ()=>{OPS.autoOpened=false;if(OPS.list.some(x=>x.state==="run"))OPS.autoClosed=true;});}

/* context menu */
document.querySelector(".desk").addEventListener("contextmenu",e=>{e.preventDefault();
 showMenu(e.clientX,e.clientY,[
  {label:"Refresh shortcuts",ic:svg("refresh",17),act:()=>{pollApps();toast("Shortcuts refreshed");}},
  {label:"Refresh all",ic:svg("refresh",17),act:()=>{poll();pollApps();pollDisks();}},{label:"Open Cockpit",ic:svg("grid",17),act:()=>window.open(cockpitURL(),"_blank")},{sep:1},
  {label:"Log out of the panel",ic:svg("key",17),act:logout},{sep:1},
  {label:"Reboot",ic:svg("power",17),act:reboot,dng:1},{label:"Power off",ic:svg("power",17),act:poweroff,dng:1}]);});

/* poll */
let LAST=null;
const HIST={cpu:[],mem:[],temp:[],rx:[],tx:[]};
function pushHist(s){const cap=60;const add=(k,v)=>{HIST[k].push(v||0);if(HIST[k].length>cap)HIST[k].shift();};
 add("cpu",s.cpu);add("mem",s.mem&&s.mem.pct);add("temp",s.temp);add("rx",s.net&&s.net.rx);add("tx",s.net&&s.net.tx);}
function sparkSVG(data,color,max){const w=120,h=28,d=(data||[]).slice(-40);if(d.length<2)return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
 const mx=max||Math.max(...d,1);const pts=d.map((v,i)=>`${(i/(d.length-1)*w).toFixed(1)},${(h-2-Math.min((v||0)/mx,1)*(h-4)).toFixed(1)}`).join(" ");
 return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;}
/* USB-import runs in the background (udev), the panel may be closed. Mirror its
   jobs into the shared operations centre so the progress is visible everywhere,
   not only on the USB settings tab. Keyed by device — one op per partition. */
const USB_OPS={},USB_SEEN=new Set();
function usbLabel(j){
 const bits=[j.label||j.dev];
 if(j.bytes!=null)bits.push(fmtB(j.bytes)+(j.total?" of "+fmtB(j.total):""));
 if(j.status==="running"){if(j.speed)bits.push(j.speed);if(j.eta)bits.push("left "+j.eta);}
 return bits.join(" · ");}
function syncUsbOps(jobs){
 (jobs||[]).forEach(j=>{
  const key=j.dev+":"+j.started;
  let o=USB_OPS[j.dev];
  if(!o){
   if(j.status!=="running"){
    // an import could have started and finished while the panel was closed: we record it in history,
    // otherwise fast copies (a couple of seconds) aren't visible anywhere at all
    if(USB_SEEN.has(key))return;
    USB_SEEN.add(key);
    const done=j.status==="done";
    const rec={id:++OPS.seq,uid:"usb:"+key,title:"USB import",state:done?"done":"err",p:done?1:null,
      label:usbLabel(j)+(j.dest?" · "+j.dest:""),cancel:null,cancelled:false,
      t:(j.finished||j.started||0)*1000||Date.now()};
    OPS.list.push(rec);
    if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
    opsSave();opsPush(rec);paintOps(true);
    return;
   }
   USB_SEEN.add(key);
   o=USB_OPS[j.dev]=opAdd("USB import");o.uid="usb:"+key;
  }
  if(j.status==="running"){
   opSet(o,j.percent==null?null:Math.min(j.percent,100)/100,usbLabel(j));
  }else{
   opEnd(o,j.status==="done",usbLabel(j)+(j.dest?" · "+j.dest:""));
   delete USB_OPS[j.dev];
  }});}

async function poll(){const s=await api("/api/stats");LAST=s;pushHist(s);paintTray(s);paintSys(s);
 const bn=document.getElementById("brandName");if(bn)bn.textContent=(s.host||location.hostname.split(".")[0]||"pi5")+".local";
 const nr=!!(s&&s.nb_running);if(nr!==NB_RUNNING){NB_RUNNING=nr;renderDock();}
 syncUsbOps(s&&s.usb_import);
 if(OPEN.__sys&&OPEN.__sys._sub)OPEN.__sys._sub(s);}
async function pollApps(){const d=await api("/api/desktop");APPS=(d&&d.apps)||[];VOLS=(d&&d.volumes)||[];APPS_LOADED=true;renderApps();paintVols();
 if(OPEN.__files&&OPEN.__files._vols)OPEN.__files._vols();}
async function pollDisks(){const d=await api("/api/disks");paintDiskWidget(d.disks||[]);}

/* onboarding on first launch */
function maybeOnboard(){let done=false;try{done=!!SET.onboarded||localStorage.getItem("nas_onboarded")==="1";}catch(e){}
 if(done)return;
 const ob=el(`<div class="onboard"><div class="ob-card">
   <div class="ob-logo"><img src="/icon-flat.svg" alt="Raspberry Pi"></div>
   <h2>Welcome to NAS</h2>
   <div class="sub">This is the control panel for your storage. Go through the Wizard to set up disks, apps and access — or look around on your own.</div>
   <div class="ob-steps">
     <div class="ob-step"><span class="oi">${svg("wand",18)}</span><div><b>Setup Wizard</b><span>Disks, pool, services, access and security step by step</span></div></div>
     <div class="ob-step"><span class="oi">${svg("grid",18)}</span><div><b>Dock at the bottom</b><span>Monitor, Disks, Files, Terminal and running apps</span></div></div>
     <div class="ob-step"><span class="oi">${svg("cog",18)}</span><div><b>Right-click the desktop</b><span>Menu for refresh, personalization and power</span></div></div>
   </div>
   <div class="ob-btns"><button class="btn" id="obSkip">Look around</button><button class="btn pri" id="obGo">${svg("wand",14)} Launch the Wizard</button></div>
 </div></div>`);
 document.body.appendChild(ob);requestAnimationFrame(()=>ob.classList.add("show"));
 const fin=()=>{SET.onboarded=true;saveSettings();try{localStorage.setItem("nas_onboarded","1");}catch(e){}ob.classList.remove("show");setTimeout(()=>ob.remove(),320);};
 ob.querySelector("#obSkip").onclick=fin;
 ob.querySelector("#obGo").onclick=()=>{fin();location.href="/setup.html";};
 ob.addEventListener("click",e=>{if(e.target===ob)fin();});}
/* boot */
(async function(){
 try{const a=await(await fetch("/api/auth/state")).json();if(!a.authed)authGate();}catch(e){}
 try{const l=localStorage.getItem("nasdesk");if(l)SET=Object.assign(SET,JSON.parse(l));}catch(e){}
 applySettings();
 // the server is the source of truth; we cache in THIS origin's localStorage so that the next
 // load (including via a different address pi5.local↔IP) doesn't start from the default theme
 try{const sv=await api("/api/settings");if(sv&&sv.settings&&Object.keys(sv.settings).length){
   SET=Object.assign(SET,sv.settings);CUR_THEME=null;applySettings();
   try{localStorage.setItem("nasdesk",JSON.stringify(SET));}catch(e){}}}catch(e){}
 // window positions/sizes come from the server (they survive localStorage clearing and address changes pi5.local↔IP); local edits on top
 try{const wp=await api("/api/winpos");if(wp&&wp.winpos&&Object.keys(wp.winpos).length)WINPOS=Object.assign({},wp.winpos,WINPOS);}catch(e){}
 const tb=document.getElementById("themeBtn");if(tb)tb.onclick=cycleTheme;
 const pb=document.getElementById("powerBtn");
 if(pb){pb.innerHTML=svg("power",17);pb.onclick=()=>{const r=pb.getBoundingClientRect();
  showMenu(Math.round(r.right),Math.round(r.bottom+8),[
   {label:"Settings",ic:svg("cog",17),act:()=>winSettings()},
   {label:"Setup Wizard",ic:svg("wand",17),act:()=>location.href="/setup.html"},
   {label:"Open Cockpit",ic:svg("grid",17),act:()=>window.open(cockpitURL(),"_blank")},{sep:1},
   {label:"Log out of the panel",ic:svg("key",17),act:logout},{sep:1},
   {label:"Reboot",ic:svg("power",17),act:reboot,dng:1},
   {label:"Power off",ic:svg("power",17),act:poweroff,dng:1}]);};}
 const xb=document.getElementById("expoBtn");if(xb){xb.innerHTML=svg("grid",17);xb.onclick=toggleExpo;}
 const lb=document.getElementById("lpBtn");
 if(lb){lb.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">'+
   [5,12,19].map(y=>[5,12,19].map(x=>`<circle cx="${x}" cy="${y}" r="2.2"/>`).join("")).join("")+'</svg>';
  lb.onclick=lpToggle;}
 const lpEl=document.getElementById("launchpad");
 if(lpEl){lpEl.addEventListener("pointerdown",e=>{if(e.target===lpEl||e.target.id==="lpGrid")lpClose();});
  document.getElementById("lpQ").oninput=lpDraw;
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&lpEl.classList.contains("show"))lpClose();});}
 const hb=document.getElementById("healthBtn");if(hb){paintHealthBtn();hb.onclick=healthPop;}
 const qn=document.getElementById("qnoteBtn");if(qn){qn.innerHTML=svg("note",16);qn.onclick=qnotePop;}
 const blb=document.getElementById("bellBtn");if(blb){paintBell();blb.onclick=bellPop;}
 const opb=document.getElementById("opsBtn");if(opb)opb.onclick=()=>{OPS.autoOpened=false;opsPop();};
 document.addEventListener("keydown",e=>{if(e.key==="F9"){e.preventDefault();toggleExpo();}else if(e.key==="Escape"&&EXPO){exitExpo();}});
 const dsk=document.querySelector(".desk");if(dsk)dsk.addEventListener("click",e=>{if((e.target===dsk||e.target.id==="apps")&&Object.keys(OPEN).some(id=>OPEN[id].style.display!=="none"))toggleExpo();});
 if(!SET.wpVer&&SET.wpType==="url"&&SET.wpUrl)setWallUrl();  // first start: pull the default wallpaper
 startSlideshow();sampleWallLum();
 try{const ls=localStorage.getItem("nassnips");if(ls)SNIPS=JSON.parse(ls);}catch(e){}   // offline cache until the API answers
 const sn=await api("/api/snippets");if(sn&&sn.snippets&&sn.snippets.length)SNIPS=sn.snippets;
 if(SET.snipCol)SNIPCOL=SET.snipCol;   // parse-time init ran before server settings arrived
 let snInit=!!SET.snipSeeded;
 try{if(!snInit)snInit=localStorage.getItem("nassnipinit")==="1";}catch(e){}   // legacy pre-server flag
 if(!snInit){seedSnips();saveSnips();}
 if(!SET.snipSeeded){SET.snipSeeded=true;saveSettings();}   // seed flag lives on the server (desktop.json) now
 document.querySelectorAll("[title]").forEach(n=>{if(n.title)n.title=nasTr(n.title);});   // static titles from HTML
 renderRail();renderApps();renderDock();renderWinbar();renderPhoneNav();tickClock();
 if(NOTES_SOLO){document.body.classList.add("nt-solo");winNotes();}
 opsLoad().catch(()=>paintOps(true));      // the operations icon is needed in any case
 poll();pollApps();pollDisks();maybeOnboard();
 refreshFmHideBk();
 pollStacks();pollTop();pollNet();
 eventLoop();setTimeout(pollHealth,2500);   // events use long-poll (instant), not 15-s polling
 setInterval(poll,3000);setInterval(pollApps,8000);setInterval(pollDisks,15000);setInterval(tickClock,10000);setInterval(pollAvail,60000);
 setInterval(pollStacks,15000);setInterval(pollTop,10000);setInterval(pollNet,15000);setInterval(pollMySpeed,60000);setInterval(pollVnstat,60000);
 setInterval(pollHealth,120000);
 if("serviceWorker" in navigator){
   if(window.isSecureContext)navigator.serviceWorker.register("/sw.js").catch(()=>{});
   else navigator.serviceWorker.getRegistrations().then(rs=>{  // over http the SW isn't needed: remove the stuck one,
     if(rs.length){rs.forEach(r=>r.unregister());                // otherwise it serves the old shell after edits
       if(window.caches)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));
       location.reload();}
   }).catch(()=>{});
 }
 matchMedia("(prefers-color-scheme:light)").addEventListener("change",()=>{if(SET.theme==="auto")applySettings();});
})();
})();
