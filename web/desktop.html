// ресайз со всех сторон и углов: невидимые ручки по периметру (курсор меняется, иконок нет)
const RZ_DIRS={n:[0,-1],s:[0,1],e:[1,0],w:[-1,0],ne:[1,-1],nw:[-1,-1],se:[1,1],sw:[-1,1]};
function resizeEdges(w){
 Object.keys(RZ_DIRS).forEach(d=>{
  const[dx,dy]=RZ_DIRS[d];
  const h=el(`<div class="rz rz-${d}"></div>`);w.appendChild(h);let st=null;
  h.addEventListener("pointerdown",e=>{e.stopPropagation();e.preventDefault();w.classList.remove("max");
   st={x:e.clientX,y:e.clientY,l:w.offsetLeft,t:w.offsetTop,w:w.offsetWidth,h:w.offsetHeight};
   h.setPointerCapture(e.pointerId);focus(w);});
  h.addEventListener("pointermove",e=>{if(!st)return;
   const mx=e.clientX-st.x,my=e.clientY-st.y;
   if(dx===1)w.style.width=Math.max(360,Math.min(innerWidth-st.l-6,st.w+mx))+"px";
   if(dx===-1){const nl=Math.min(Math.max(6,st.l+mx),st.l+st.w-360);w.style.left=nl+"px";w.style.width=(st.w+st.l-nl)+"px";}
   if(dy===1)w.style.height=Math.max(220,Math.min(innerHeight-st.t-6,st.h+my))+"px";
   if(dy===-1){const nt=Math.min(Math.max(44,st.t+my),st.t+st.h-220);w.style.top=nt+"px";w.style.height=(st.h+st.t-nt)+"px";}});
  const fin=e=>{if(!st)return;st=null;try{h.releasePointerCapture(e.pointerId);}catch(x){}persistWin(w);};
  h.addEventListener("pointerup",fin);h.addEventListener("pointercancel",fin);});
}
function focus(w){for(const k in OPEN)OPEN[k].classList.toggle("wfocus",OPEN[k]===w);w.style.zIndex=++Z;w.style.display="flex";renderWinbar();}
function focusTop(){let top=null,tz=-1;for(const k in OPEN){const el=OPEN[k];if(el.style.display==="none")continue;const z=+el.style.zIndex||0;if(z>tz){tz=z;top=el;}}if(top)top.classList.add("wfocus");renderWinbar();}
function closeW(id){const w=OPEN[id];if(w){persistWin(w);try{w._term&&w._term.dispose&&w._term.dispose();}catch(e){}try{w._term&&w._term.ws&&w._term.ws.close();}catch(e){}try{clearInterval(w._pi);}catch(e){}w.remove();delete OPEN[id];focusTop();renderDock();renderWinbar();renderPhoneNav();}}

let EXPO=false,EXPO_ELS=[];
function toggleExpo(){EXPO?exitExpo():enterExpo();}
function enterExpo(){const ids=Object.keys(OPEN).filter(id=>OPEN[id].style.display!=="none");if(!ids.length){toast("Нет открытых окон");return;}
 if(EXPO)return;EXPO=true;document.body.classList.add("expo-on");const meta=winMeta();
 const back=el(`<div class="expo-back"></div>`);back.onclick=()=>exitExpo();document.body.appendChild(back);EXPO_ELS.push(back);
 const n=ids.length,cols=Math.ceil(Math.sqrt(n)),rows=Math.ceil(n/cols);
 const padX=44,top=MENUBAR_H+34,gapx=26,gapy=40,botM=34;
 const cw=(innerWidth-padX*2-gapx*(cols-1))/cols,chh=(innerHeight-top-botM-gapy*(rows-1))/rows;
 ids.forEach((id,i)=>{const w=OPEN[id],r=Math.floor(i/cols),c=i%cols;
  const cellX=padX+c*(cw+gapx),cellY=top+r*(chh+gapy);
  const bw=w.offsetWidth,bh=w.offsetHeight,s=Math.min(cw/bw,chh/bh,1);
  const dx=cellX-w.offsetLeft,dy=cellY-w.offsetTop;
  w._expoZ=w.style.zIndex;w.dataset.expo="1";w.classList.add("expo-win");w.style.zIndex=1500+i;
  w.style.transformOrigin="0 0";w.style.transform=`translate(${dx}px,${dy}px) scale(${s})`;
  const title=w._title||(meta[id]&&meta[id].name)||id;
  const hit=el(`<div class="expo-hit" style="left:${cellX}px;top:${cellY}px;width:${(bw*s).toFixed(0)}px;height:${(bh*s).toFixed(0)}px"><span class="expo-lab">${esc(title)}</span></div>`);
  hit.onclick=e=>{e.stopPropagation();const win=w;exitExpo();if(win.style.display==="none")win.style.display="flex";focus(win);};
  document.body.appendChild(hit);EXPO_ELS.push(hit);});}
function exitExpo(){if(!EXPO)return;EXPO=false;document.body.classList.remove("expo-on");
 Object.keys(OPEN).forEach(id=>{const w=OPEN[id];if(w.dataset.expo){w.classList.remove("expo-win");w.style.transform="";w.style.transformOrigin="";if(w._expoZ!=null)w.style.zIndex=w._expoZ;delete w.dataset.expo;delete w._expoZ;}});
 EXPO_ELS.forEach(e=>e.remove());EXPO_ELS=[];}

function volIcon(v){return v.rotational?"hdd":(v.tran==="mmc"?"sd":"ssd");}
async function openVolume(v,target){
 if(v.mounted){winFiles(v.mount);return;}
 toast("Монтирую "+(v.label||v.dev)+"…");
 const body={dev:v.dev};if(target)body.target=target;
 const r=await api("/api/disk/mount-dev",{method:"POST",body:JSON.stringify(body)});
 if(r&&r.ok){await pollApps();
  const nv=VOLS.find(x=>x.dev===v.dev);
  if(nv&&nv.mount){winFiles(nv.mount);toast("Смонтировано: "+nv.mount);}
  else toast("Смонтировано, обновляю…");}
 else toast(r&&r.log?("Не смонтировалось: "+r.log.trim().split("\n").pop()):"Не удалось смонтировать");
}

// быстрое меню бэкапа с иконки дока (запуск/отмена без открытия окна)
async function nbDockMenu(x,y){
 const bp=(path,obj)=>api(path,{method:"POST",body:JSON.stringify(obj||{})});
 const r=await api("/api/backup/config").catch(()=>null);
 const profs=(r&&r.profiles)||[];
 const it=[{label:"Открыть бэкап",ic:svg("sync",16),act:()=>winBackup()}];
 // один профиль — меню как было; несколько — каждый своей строкой, иначе непонятно,
 // какой именно бэкап запускается
 const one=profs.length<2;
 profs.forEach(pr=>{
  const nm=one?"":" · "+pr.name;
  if(pr.running)it.push({label:"Остановить бэкап"+nm,ic:svg("x",16),dng:1,
    act:()=>{bp("/api/backup/cancel",{p:pr.id});toast("Останавливаю…");}});
  else if(pr.queued)it.push({label:"Убрать из очереди"+nm,ic:svg("x",16),
    act:()=>{bp("/api/backup/cancel",{p:pr.id});toast("Убрано из очереди");}});
  else{
   it.push({label:"Запустить бэкап сейчас"+nm,ic:svg("sync",16),act:async()=>{
     const q=await bp("/api/backup/run-bg",{p:pr.id});
     toast(q&&q.queued?"Другой бэкап уже идёт — поставлено в очередь":(q&&q.ok?"Бэкап запущен":(q&&q.log)||"уже выполняется"));}});
   it.push({label:"Пробный прогон"+nm,ic:svg("eye",16),act:async()=>{
     const q=await bp("/api/backup/run-bg",{p:pr.id,dry:true});
     toast(q&&q.queued?"Поставлено в очередь":"Пробный прогон запущен");}});}
  if(!one)it.push({sep:1});});
 if(it.length&&it[it.length-1].sep)it.pop();
 showMenu(x,y,it);}
function dockItems(){
 const base=INTERNAL.map(a=>({id:a.id,ic:a.ic,color:a.color,name:a.name,fn:a.fn}));
 base.push({id:"__cockpit",ic:"grid",color:"linear-gradient(135deg,#4b7bec,#3a63c9)",name:"Cockpit",fn:()=>window.open(cockpitURL(),"_blank")});
 const byId={};base.forEach(b=>byId[b.id]=b);
 const order=(SET.dockOrder&&SET.dockOrder.length)?SET.dockOrder:base.map(b=>b.id);
 const out=[];order.forEach(id=>{if(byId[id]){out.push(byId[id]);delete byId[id];}});
 base.forEach(b=>{if(byId[b.id])out.push(b);});
 return out;}
function dockDragAfter(d,x,y){const vert=(SET.dockPos==="left"||SET.dockPos==="right");
 const els=[...d.querySelectorAll("button[data-did]:not(.dragging)")];
 let best=null,bestOff=-Infinity;
 els.forEach(el=>{const box=el.getBoundingClientRect();const off=vert?(y-box.top-box.height/2):(x-box.left-box.width/2);
  if(off<0&&off>bestOff){bestOff=off;best=el;}});
 return best;}
function renderDock(){

  b.onclick=a.fn;

function histChart(title,h,series,fmt,maxOverride){
 const W=560,H=104,pad=6,n=h.length;
 const vals=[];series.forEach(s=>h.forEach(p=>{if(p[s.key]!=null)vals.push(p[s.key]);}));
 const mx=maxOverride||Math.max(1,...vals)*1.15;
 const X=i=>pad+(n>1?i/(n-1):0)*(W-2*pad);
 const Y=v=>H-pad-(Math.min(Math.max(v||0,0),mx)/mx)*(H-2*pad);
 const grid=[0.5,1].map(f=>`<line x1="${pad}" y1="${(H-pad-f*(H-2*pad)).toFixed(1)}" x2="${W-pad}" y2="${(H-pad-f*(H-2*pad)).toFixed(1)}" stroke="var(--track,rgba(128,128,128,.15))" stroke-width="1"/>`).join("");
 const paths=series.map(s=>{let d="";h.forEach((p,i)=>{if(p[s.key]==null)return;d+=(d?"L":"M")+X(i).toFixed(1)+" "+Y(p[s.key]).toFixed(1);});
   if(!d)return"";const area=s.fill?`<path d="${d} L${X(n-1).toFixed(1)} ${H-pad} L${X(0).toFixed(1)} ${H-pad} Z" fill="${s.color}" opacity=".13"/>`:"";
   return area+`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.6" stroke-linejoin="round"/>`;}).join("");
 const cur=series.map(s=>{const last=[...h].reverse().find(p=>p[s.key]!=null);return `<b style="color:${s.color}">${last?fmt(last[s.key]):"—"}</b>`;}).join(" ");
 return `<div class="hist-card"><div class="hist-h"><span>${title}</span><span class="hist-cur">${cur}</span></div>
   <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px;display:block">${grid}${paths}</svg></div>`;
}

function scrubLine(snap){
 if(!snap||!snap.configured)return "";
 const fmt=e=>e&&e.date?`<span style="color:${e.result==="ok"?"var(--good)":"var(--danger)"}">${e.result==="ok"?"✓":"✗"}</span> ${e.date.slice(5,16)}`:"—";
 return ` · чётность: sync ${fmt(snap.last_sync)}, scrub ${fmt(snap.last_scrub)}`;
}
function poolStrip(disks,am,reload,snap,pool){
 // строка про автоподъёмы пула (сервис mergerfs с Restart=always)
 const recov=(pool&&pool.service)?` · <span style="color:${pool.restarts>0?"var(--warn)":"var(--mut)"}" title="Сколько раз systemd автоматически поднял пул mergerfs после падения FUSE (с момента загрузки). 0 — пул ни разу не падал. Если растёт — стоит разобраться в причине.">↻ автоподъёмов: ${pool.restarts}</span>`:"";
 const cnt=r=>disks.filter(x=>x.role===r).length;
 const poolMount=disks.find(x=>x.role==="pool"),dataArr=disks.filter(x=>x.role==="data"||x.role==="pool");
 const hasPool=!!poolMount||cnt("data")>0;
 const sm=disks.filter(x=>x.role!=="system"&&x.smart&&x.smart.healthy!=null),hbad=sm.some(x=>!x.smart.healthy);
 const hcls=hbad?"bad":(sm.length?"ok":"na"),hlbl=hbad?"Внимание":(sm.length?"Исправно":"—");
 const w=el(`<div class="dm-pool${hasPool?"":" np"}"></div>`);
 if(hasPool){
  let total=0,used=0,free=0;(poolMount?[poolMount]:dataArr).forEach(x=>{if(x.usage){total+=x.usage.total;used+=x.usage.used;free+=(x.usage.free!=null?x.usage.free:x.usage.total-x.usage.used);}});
  const pct=(used+free)?Math.max(used/(used+free)*100,.4):0;
  w.innerHTML=`<span class="dp-ic">${svg("layers",17)}</span>
   <div class="dp-txt"><div class="dp-t">Пул /mnt/storage <span class="hstat ${hcls}" style="margin-left:4px">${hlbl}</span></div>
    <div class="dp-s">${cnt("data")} данных · ${cnt("parity")} чётности${cnt("removable")?` · ${cnt("removable")} внешних`:""}${scrubLine(snap)}${recov}</div></div>
   <div class="dp-cap"><div class="capbar" style="width:150px"><span class="used" style="width:${pct}%"></span></div>
    <div class="dp-lbl">${fmtB(free)} своб · ${fmtB(total)}</div></div>`;
 }else{
  w.innerHTML=`<span class="dp-ic">${svg("layers",17)}</span>
   <div class="dp-txt"><div class="dp-t">Пул не собран</div>
    <div class="dp-s">${cnt("free")} не в пуле · ${cnt("removable")} внешних — объедините диски данных в /mnt/storage</div></div>
   <button class="btn sm pri" id="poolcta">${svg("wand",13)} Собрать</button>`;
 }
 const amb=el(`<button class="btn sm${am.enabled?" pri":""}" title="Автоподключение: вставленные USB-диски и флешки монтируются сами (в ${esc(am.base||"/media/nas")}) и появляются на рабочем столе. Сейчас ${am.enabled?"включено":"выключено"} — нажмите, чтобы настроить.">${svg("usb",13)} Автоподключение USB: ${am.enabled?"вкл":"выкл"}</button>`);
 amb.onclick=()=>automountDlg(am,reload);w.appendChild(amb);
 // SnapRAID sync — доступен, когда защита настроена (есть parity-диск)
 if(snap&&snap.configured){const sb=el(`<button class="btn sm" title="Пересчитать чётность SnapRAID под текущее содержимое дисков. Запусти после добавления диска в пул — иначе новый диск ещё не под защитой.">${svg("shield",13)} SnapRAID sync</button>`);
  sb.onclick=()=>snapraidDlg(reload);w.appendChild(sb);}
 const cta=w.querySelector("#poolcta");if(cta)cta.onclick=()=>location.href="/setup.html";
 return w;
}
// диалог ручной синхронизации SnapRAID с живым логом
function snapraidDlg(after){const s=document.getElementById("scrim");
 s.innerHTML=`<div class="dialog" style="max-width:580px"><h3>${svg("shield",16)} SnapRAID — синхронизация чётности</h3>
   <p style="font-size:13px;color:var(--dim)">Sync пересчитывает данные чётности на parity-диске под текущее содержимое дисков данных — именно они позволяют восстановить диск при сбое. Идёт по расписанию (ежедневно), но после добавления диска в пул запусти вручную. Защита от массового удаления: если удалено много файлов, sync прервётся.</p>
   <div class="mcon" id="srcon" style="display:none"></div>
   <div class="r"><button class="btn" id="srx">Закрыть</button><button class="btn pri" id="srgo">${svg("sync",14)} Синхронизировать сейчас</button></div></div>`;
 s.classList.add("show");

 // краткие факты

 box.appendChild(el(`<div class="dd-facts">${facts.map(([k,v])=>`<div><span>${k}</span><b>${esc(""+v)}</b></div>`).join("")}</div>`));

   sd.querySelector("#ddSpin").onchange=async e=>{const r=await api("/api/disk/spindown",{method:"POST",body:JSON.stringify({dev:x.path,minutes:+e.target.value})});toast(LIVE?((r&&r.ok)?r.log:("Ошибка: "+((r&&r.log)||""))):"Демо");};
   box.appendChild(sd);
 }
 // скорость: последний замер всегда виден; можно мерить и системную SD-карту
 {
   const sp=el(`<div class="dd-spd"></div>`);
   let cur=x.speedtest;
   const paintSpd=busy=>{
     sp.innerHTML=`<span class="dd-spd-ic">${svg("gauge",14)}</span>`
      +(busy?`<span class="dd-spd-t">Измеряю скорость — до минуты, диск будет занят…</span>`
        :cur?`<span class="dd-spd-t"><b>${Math.round(cur.read)} МБ/с</b> чтение${cur.write!=null?` · <b>${Math.round(cur.write)} МБ/с</b> запись`:""}</span><span class="dd-spd-d">замер: ${ruWhen(cur.t)}</span>`
        :`<span class="dd-spd-t" style="color:var(--mut)">Скорость этого диска ещё не измерялась</span>`)
      +`<span class="grow"></span>`;
     const b=el(`<button class="btn sm"${busy?" disabled":""}>${busy?"измеряю…":svg("gauge",13)+" "+(cur?"Измерить заново":"Тест скорости")}</button>`);
     b.title="Последовательное чтение с устройства + запись временного файла (сразу удаляется)"+(x.role==="system"?". Для системной карты запись идёт во временный каталог /var/tmp":"");
     b.onclick=async()=>{paintSpd(true);
       const r=await api("/api/disk/speedtest",{method:"POST",body:JSON.stringify({dev:x.path})});
       if(LIVE&&r&&r.ok){cur={read:r.read_mbps,write:r.write_mbps,t:r.t};}
       else toast(LIVE?("Ошибка: "+((r&&r.log)||"")):"Демо");
       paintSpd(false);};
     sp.appendChild(b);};
   paintSpd(false);
   box.appendChild(sp);
 }
 // действия
 const acts=el(`<div class="dd-acts"></div>`);
 if(x.role!=="system"){
   if(!hasParts){
     if(x.mounted){const b=el(`<button class="btn sm">${svg("eject",15)} Отмонтировать</button>`);b.title="Отключить файловую систему, диск остаётся с питанием";b.onclick=()=>diskCall("/api/disk/mount",{target:x.mount,unmount:true},reload,"отмонтировано");acts.appendChild(b);}
     else if(x.fstype){const b=el(`<button class="btn sm">${svg("play",13)} Смонтировать</button>`);b.onclick=()=>diskCall(x.in_fstab?"/api/disk/mount":"/api/disk/mount-dev",x.in_fstab?{target:x.mount}:{dev:x.path},reload,"смонтировано");acts.appendChild(b);}
     if(x.fstype){const b=el(`<button class="btn sm">${svg("edit",13)} Переименовать</button>`);b.onclick=()=>renameDlg(x.path,x.label||"",reload);acts.appendChild(b);}
   }

     ej.onclick=()=>confirmDlg("Безопасно извлечь диск?","Диск будет отмонтирован и обесточен — после этого можно физически отключить.",async()=>{
       const r=await api("/api/disk/eject",{method:"POST",body:JSON.stringify({dev:x.path})});
       toast(LIVE?((r&&r.ok)?r.log:("Ошибка: "+((r&&r.log)||""))):"Демо");if(r&&r.ok)reload();},false);
     acts.appendChild(ej);
   }
   // свободный диск → одним действием отформатировать в ext4 и подключить к пулу /mnt/storage
   if(x.role==="free"){const pb=el(`<button class="btn sm pri">${svg("layers",13)} Добавить в пул</button>`);pb.title="Отформатировать (ext4) и подключить диск к пулу /mnt/storage";pb.onclick=()=>formatDlg(x,reload,"pool");acts.appendChild(pb);}
   acts.appendChild(el(`<span class="grow"></span>`));
   const fb=el(`<button class="btn sm dng">${svg("trash",13)} Форматировать</button>`);fb.onclick=()=>formatDlg(x,reload);acts.appendChild(fb);
 }else acts.appendChild(el(`<span class="dd-note">${svg("shield",13)} Системный диск — размонтирование и форматирование недоступны</span>`));
 box.appendChild(acts);
 // разделы
 if(hasParts){box.appendChild(el(`<div class="dd-grp">Разделы</div>`));const pw=el(`<div class="dparts"></div>`);const ro=x.role==="system";x.partitions.forEach(pt=>pw.appendChild(partRow(pt,reload,ro)));box.appendChild(pw);}
 // SMART — по умолчанию свёрнут; данные грузим только при развороте
 const sg=el(`<button class="dd-grp dd-coll">${svg("heart",12)} SMART и наработка <span class="dd-chev">▸</span><span class="dd-coll-hint">${sm&&sm.healthy===false?"сбой!":"развернуть"}</span></button>`);
 box.appendChild(sg);
 const sbox=el(`<div class="dd-smart" style="display:none"><div style="color:var(--mut);font-size:12px">загрузка SMART…</div></div>`);
 box.appendChild(sbox);
 let smLoaded=false;
 sg.onclick=()=>{const open=sbox.style.display==="none";
  sbox.style.display=open?"":"none";sg.querySelector(".dd-chev").textContent=open?"▾":"▸";
  if(open&&!smLoaded){smLoaded=true;loadSmart();}};
 const loadSmart=()=>api("/api/disk/smart?dev="+encodeURIComponent(x.path)).then(d=>{
   if(!d||!d.ok){sbox.innerHTML=`<div style="color:var(--mut);font-size:12px">${esc((d&&d.log)||"SMART недоступен")}</div>`;return;}
   const poh=d.power_on_hours;
   sbox.innerHTML=`<div class="dd-smk">
     <div><span>Здоровье</span><b style="color:${d.healthy?"var(--good)":d.healthy===false?"var(--danger)":"var(--mut)"}">${d.healthy?"OK":d.healthy===false?"СБОЙ":"?"}</b></div>
     ${d.temp!=null?`<div><span>Температура</span><b style="color:${diskTcol(d.temp)}">${d.temp}°C</b></div>`:""}
     ${poh!=null?`<div><span>Наработка</span><b>${poh} ч <span style="color:var(--mut);font-weight:500">≈ ${(poh/24).toFixed(0)} дн${poh>=8760?" · "+(poh/8760).toFixed(1)+" г":""}</span></b></div>`:""}
     ${d.power_cycles!=null?`<div><span>Включений</span><b>${d.power_cycles}</b></div>`:""}</div>`;
   if(d.attrs&&d.attrs.length){const rows=d.attrs.slice(0,14).map(a=>`<tr><td>${esc(a.name||a.id||"")}</td><td>${a.value!=null?a.value:""}</td><td>${esc(""+(a.raw!=null?a.raw:""))}</td></tr>`).join("");
     sbox.appendChild(el(`<table class="dd-attrs"><tr><th>Атрибут</th><th>Знач.</th><th>Raw</th></tr>${rows}</table>`));}
   const t=el(`<div class="dd-acts" style="border:none;padding:0;margin-top:10px"><button class="btn sm">Тест: короткий</button><button class="btn sm">Тест: полный</button></div>`);
   t.children[0].onclick=()=>diskCall("/api/disk/smart-test",{dev:x.path,kind:"short"},null,"тест запущен");
   t.children[1].onclick=()=>diskCall("/api/disk/smart-test",{dev:x.path,kind:"long"},null,"тест запущен");
   sbox.appendChild(t);
 });
 return box;
}
function partRow(pt,reload,readOnly){
 const r=el(`<div class="dpart"></div>`);
 const lbl=pt.label?` «${(""+pt.label).replace(/</g,"&lt;")}»`:"";
 const sysMount=pt.mount&&["/","/boot","/boot/firmware","/var","/usr","/home"].includes(pt.mount);
 r.appendChild(el(`<div class="pi"><span class="pn">${pt.name}</span> · ${pt.size||""} · ${pt.fstype||"—"}${lbl}${pt.mount?` · <span style="color:var(--good)">${pt.mount}</span>`:""}</div>`));
 const a=el(`<div style="display:flex;gap:5px;flex:none"></div>`);
 // системные разделы (корень/boot) — только для чтения, без опасных действий
 if(pt.fstype&&!readOnly&&!sysMount){
   if(pt.mounted){const b=el(`<button class="btn sm ghost">${svg("eject",14)} Отмонт.</button>`);b.title="Отмонтировать раздел";b.onclick=()=>diskCall("/api/disk/mount",{target:pt.mount,unmount:true},reload,"отмонтировано");a.appendChild(b);}
   else{const b=el(`<button class="btn sm ghost">${svg("play",13)} Смонт.</button>`);b.title="Смонтировать раздел";b.onclick=()=>diskCall("/api/disk/mount-dev",{dev:pt.path},reload,"смонтировано");a.appendChild(b);}
   const rn=el(`<button class="iconbtn" title="Переименовать метку">${svg("edit",14)}</button>`);rn.onclick=()=>renameDlg(pt.path,pt.label||"",reload);a.appendChild(rn);
 }else if(sysMount)a.appendChild(el(`<span class="rbadge system" title="Системный раздел — защищён">системный</span>`));
 r.appendChild(a);return r;
}
async function diskCall(ep,params,after,okmsg){
 const r=await api(ep,{method:"POST",body:JSON.stringify(params||{})});
 toast(LIVE?(r&&r.ok?(okmsg||r.log||"готово"):("Ошибка: "+((r&&r.log)||"нет").trim().slice(0,70))):"Демо: недоступно");
 if(LIVE&&r&&r.ok&&after)after();return r;
}

const FS_BY_ROLE={data:["ext4","xfs","btrfs"],parity:["ext4","xfs"],removable:["exfat","ntfs","vfat","ext4"]};
let FS_AVAIL=null;
function formatDlg(x,after,mode){const s=document.getElementById("scrim");
 const pool=mode==="pool";   // «Добавить в пул»: роль зафиксирована как «данные»
 const avail=r=>{const a=FS_BY_ROLE[r].filter(f=>!FS_AVAIL||FS_AVAIL.includes(f));return a.length?a:FS_BY_ROLE[r];};
 let role="data",fs=avail("data")[0];
 const fsOpts=r=>avail(r).map(f=>`<option value="${f}">${f}</option>`).join("");
 s.innerHTML=`<div class="dialog"><h3>${pool?"Добавить в пул: "+x.path:"Форматировать "+x.path+"?"}</h3><p>${(x.model||"")} · ${x.size}. ${pool?"Диск будет отформатирован (ext4) и подключён к пулу <b>/mnt/storage</b>. ":""}<b style="color:var(--danger)">Все данные будут удалены безвозвратно.</b></p>
  ${pool?"":`<div class="field"><label>Роль</label><div class="seg" id="fr"><button class="on" data-r="data">Данные</button><button data-r="parity">Чётность</button><button data-r="removable">Съёмный</button></div></div>`}
  <div class="field"><label>Файловая система</label><select id="ffs">${fsOpts("data")}</select></div>
  <div class="field"><label>Метка (необязательно)</label><input id="flabel" placeholder="авто: disk1 / parity1 / USB" autocomplete="off"></div>
  <div class="field"><label>Подтверждение — введите путь устройства</label><input class="mono" id="fp" placeholder="${x.path}" autocomplete="off"></div>
  <div class="r"><button class="btn" id="fc">Отмена</button><button class="btn dng" id="fo" disabled>${pool?"Добавить в пул":"Форматировать"}</button></div>
  <div class="mcon" id="fcon"></div></div>`;
 s.classList.add("show");const inp=s.querySelector("#fp"),ok=s.querySelector("#fo"),fsel=s.querySelector("#ffs");inp.focus();
 const fr=s.querySelector("#fr");if(fr)fr.querySelectorAll("button").forEach(b=>b.onclick=()=>{role=b.dataset.r;fr.querySelectorAll("button").forEach(z=>z.classList.toggle("on",z===b));fsel.innerHTML=fsOpts(role);fs=avail(role)[0];});
 fsel.onchange=()=>fs=fsel.value;

function yamlLint(text){const out=[];(text||"").split("\n").forEach((ln,i)=>{

 });return out;}

  else if(probs&&probs.length)h+=`<div class="ed-errbox"><span class="ed-warn">Проблемы отступов</span>\n`+probs.slice(0,8).map(p=>"строка "+(p.line+1)+": "+p.msg).join("\n")+`</div>`;

let CM_READY=false;
function ensureCM(cb){
 if(window.CodeMirror&&CM_READY){cb();return;}
 // ВАЖНО: codemirror.css грузим ПЕРВЫМ в <head> (insertBefore), иначе его дефолтная
 // тема (.cm-s-default .cm-atom{color:#219}) перебивает наши инлайн-стили при равной
 // специфичности — токены/фон редактора не менялись бы (см. баг с нечитаемой темой).
 if(!document.getElementById("cmcss")){const l=document.createElement("link");l.id="cmcss";l.rel="stylesheet";l.href="/codemirror.css";document.head.insertBefore(l,document.head.firstChild);}
 const load=src=>new Promise(res=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=res;document.head.appendChild(s);});
 (window.CodeMirror?Promise.resolve():load("/codemirror.js")).then(()=>Promise.all(
   ["cm-yaml.js","cm-shell.js","cm-javascript.js","cm-python.js","cm-xml.js","cm-css.js","cm-properties.js","cm-dockerfile.js"].map(load)))
 .then(()=>{CM_READY=true;cb();});

  if(o)opSet(o,i/items.length,`${i+1} / ${items.length} · ${baseName(items[i])}`);

    if(r===true||(r&&r.ok))ok++;

    показываются одним узнаваемым чипом вместо цепочки /media/nas/storage. */
 function crumbAnchors(){
   const a=(VOLS||[]).filter(v=>v.mounted&&v.mount).map(v=>({path:v.mount,name:v.label||v.dev,ic:volIcon(v)}));
   a.push({path:"/mnt/storage",name:"Хранилище",ic:"hdd"});
   a.push({path:"/home/oleg",name:"Домашняя",ic:"folder"});   // тот же путь, что в FM_CHIPS
   return a.sort((x,y)=>y.path.length-x.path.length);   // самый длинный совпавший — точнее
 }
 function renderCrumb(){const c=body.querySelector("#fCrumb");c.innerHTML="";
   const anch=crumbAnchors().find(a=>cwd===a.path||cwd.startsWith(a.path+"/"));
   let rest;
   if(anch){
     const r=el(`<a class="crumb-anchor" title="${att(anch.path)}">${svg(anch.ic,12)}<span>${esc(anch.name)}</span></a>`);
     r.onclick=()=>load(anch.path);c.appendChild(r);
     rest=cwd.slice(anch.path.length);
   }else{
     const root=el(`<a class="crumb-anchor" title="/">${svg("disks",12)}<span>Корень</span></a>`);
     root.onclick=()=>load("/");c.appendChild(root);
     rest=cwd;
   }
   let acc=anch?anch.path:"";
   rest.split("/").filter(Boolean).forEach(p=>{acc+="/"+p;const path=acc;
     c.appendChild(el(`<span class="sepc">/</span>`));
     const a=el(`<a title="${att(path)}">${esc(p)}</a>`);a.onclick=()=>load(path);c.appendChild(a);});
   c.scrollLeft=c.scrollWidth;   // длинный путь: показываем хвост, а не начало
   // ✎ — редактировать путь; клик по пустому месту крошек тоже открывает ввод
   const edb=el(`<button class="fm-crumb-edit" title="Редактировать/скопировать путь">${svg("edit",13)}</button>`);edb.onclick=e=>{e.stopPropagation();editPath();};c.appendChild(edb);
   c.onclick=ev=>{if(ev.target===c)editPath();};}
 function editPath(){const c=body.querySelector("#fCrumb");
   const inp=el(`<input class="fm-pathin mono" spellcheck="false">`);inp.value=cwd;
   c.innerHTML="";c.appendChild(inp);inp.focus();inp.select();
   const done=()=>{inp.onblur=null;const v=inp.value.trim();if(v&&v!==cwd)load(v);else renderCrumb();};
   inp.onkeydown=ev=>{if(ev.key==="Enter"){ev.preventDefault();done();}else if(ev.key==="Escape"){ev.preventDefault();inp.onblur=null;renderCrumb();}};
   inp.onblur=done;}
 function saveFav(){api("/api/fm/favorites",{method:"POST",body:JSON.stringify({favorites:favs})});}
 function renderFav(){const c=body.querySelector("#fFav");c.innerHTML="";
   favs.forEach((f,i)=>{const it=el(`<div class="fm-fav-i${f.path===cwd?" on":""}"><span class="fi">${fmIcon(f.name,"dir",17)}</span><span class="fn" title="${att(f.path)}">${esc(f.name)}</span><button class="fx" title="Убрать">${svg("trash",12)}</button></div>`);
     it.onclick=ev=>{if(ev.target.closest(".fx"))return;load(f.path);};
     it.querySelector(".fx").onclick=ev=>{ev.stopPropagation();favs.splice(i,1);saveFav();renderFav();};
     it.addEventListener("dragover",ev=>{if(!dragPaths||dragPaths.includes(f.path))return;ev.preventDefault();ev.stopPropagation();ev.dataTransfer.dropEffect="move";it.classList.add("dragover");});

 function renderVols(){const wrap=body.querySelector("#fVolsWrap"),c=body.querySelector("#fVols");if(!c)return;

 function renderList(){const srcArr=searchRes||entries;let arr=srcArr.slice();
   arr=arr.filter(e=>!fmNever(e.name));   // lost+found, ._AppleDouble, Spotlight и т.п. — никогда
   if(!showHidden&&!searchRes)arr=arr.filter(e=>!e.name.startsWith(".")&&e.name!==FM_HIDE_BK);
   if(filt&&!searchRes)arr=arr.filter(e=>e.name.toLowerCase().includes(filt));
   const foldersFirst=SET.fmFoldersFirst!==false;
   arr.sort((a,b)=>{if(foldersFirst&&a.type!==b.type)return a.type==="dir"?-1:1;
     let r=sortKey==="name"?(a.name.toLowerCase()<b.name.toLowerCase()?-1:1):((a[sortKey]||0)-(b[sortKey]||0));return r*sortDir;});
   const grid=viewMode==="grid"&&!searchRes;   // результаты поиска — всегда списком, чтобы видеть путь
   const ICOPX={s:{list:20,grid:44},m:{list:24,grid:60},l:{list:32,grid:84}};
   const isz=(ICOPX[SET.fmIconSize]||ICOPX.m)[grid?"grid":"list"],thumbsOn=SET.fmThumbs!==false;
   listBox.classList.toggle("fm-grid",grid);
   const cols=body.querySelector("#fCols");if(cols)cols.style.display=grid?"none":"flex";
   curArr=arr;if(cursor>=arr.length)cursor=arr.length-1;
   listBox.innerHTML="";
   if(!arr.length){const msg=searchRes?"Ничего не найдено":(filt?"В этой папке нет совпадений. Enter — искать во вложенных.":"Пусто");
     listBox.innerHTML=`<div style="color:var(--mut);font-size:12px;padding:10px">${msg}</div>`;renderStatus();return;}
   const toggleSel=(e,i,shift)=>{if(shift&&lastIdx>=0){const a=Math.min(lastIdx,i),b=Math.max(lastIdx,i);for(let k=a;k<=b;k++)sel.add(arr[k].path);}else{if(sel.has(e.path))sel.delete(e.path);else sel.add(e.path);}lastIdx=i;renderList();selUpdate();};
   arr.forEach((e,i)=>{
     const isSel=sel.has(e.path),baseIco=fmIcon(e.name,e.type,isz);
     const isHid=e.name.startsWith(".")||e.name===FM_HIDE_BK;   // приглушаем, когда показаны

     else{let nmH=nameHTML(e.name,"fn",e.type==="dir"||!!e.match)+(e.match?` <small style="color:var(--mut);font-weight:400">— ${esc(e.match.slice(0,90))}${e.line?" :"+e.line:""}</small>`:"");
       let relDir="";
       if(searchRes){const par=e.path.replace(/\/[^/]+$/,"");relDir=(par.slice(cwd==="/"?0:cwd.length)||"/");
         nmH+=`<span class="fpath" title="${att(par)}">${svg("folder",11)} ${esc(relDir)}</span>`;}
       node=el(`<div class="fm-row ${e.type}${searchRes?" srch":""}${isSel?" sel":""}${i===cursor?" fm-cur":""}${isHid?" fm-hid":""}"><input type="checkbox" class="fm-ck"${isSel?" checked":""}><span class="fi">${ficon}</span><span class="fn" title="${att(searchRes?e.path:e.name)}">${nmH}</span><span class="fsz">${e.type==="dir"?"":fmtB(e.size)}</span><span class="fdate">${fmDate(e.mtime)}</span></div>`);
       const pl=node.querySelector(".fpath");if(pl)pl.onclick=ev=>{ev.stopPropagation();load(e.path.replace(/\/[^/]+$/,"")||"/");};}
     node.querySelector(".fm-ck").onclick=ev=>{ev.stopPropagation();toggleSel(e,i,ev.shiftKey);};
     // клик по ВСЕЙ строке/плитке (кроме чекбокса), а не только по имени/иконке — иначе клик

   renderStatus();}
 const dirSig=es=>(es||[]).map(e=>e.name+"\u0000"+e.size+"\u0000"+e.mtime).join("\u0001");
 let lastSig="";
 async function load(d){const r=await api("/api/fs/list?path="+encodeURIComponent(d));
   if(!r||!r.ok){toast((r&&r.log)||"нет доступа");return;}
   cwd=r.path;tabs[tabI]=r.path;entries=r.entries||[];searchRes=null;sel.clear();filt="";lastIdx=-1;
   lastSig=dirSig(entries);

 /* Auto-refresh: the folder can change under us (uploads, USB import, rsync, another
    tab). Re-render only when the listing actually differs, and keep the selection and
    scroll position — a blind load() would throw both away while the user works. */
 async function refreshQuiet(){
   if(searchRes)return;                                     // результаты поиска не трогаем
   if(document.hidden)return;                               // вкладка в фоне — не дёргаем сервер
   const w=OPEN.__files;if(!w||w.style.display==="none")return;
   const s=document.getElementById("scrim");if(s&&s.classList.contains("show"))return;  // открыт диалог
   if(dragPaths)return;                                     // идёт перетаскивание
   const dir=cwd;
   const r=await api("/api/fs/list?path="+encodeURIComponent(dir));
   if(!r||!r.ok||cwd!==dir)return;                          // успели уйти в другую папку
   const sig=dirSig(r.entries);
   if(sig===lastSig)return;
   lastSig=sig;entries=r.entries||[];
   const top=listBox.scrollTop;
   [...sel].forEach(p=>{if(!entries.some(e=>e.path===p))sel.delete(p);});  // удалённое снимаем с выделения
   renderList();selUpdate();listBox.scrollTop=top;}
 const fmTimer=setInterval(()=>{if(!document.body.contains(body)){clearInterval(fmTimer);return;}
   refreshQuiet().catch(()=>{});},5000);
 function renderTabs(){const tb=body.querySelector("#fTabs");if(!tb)return;tb.innerHTML="";

     tb.appendChild(t);});
   const add=el(`<button class="fm-tab-add" title="Новая вкладка">${svg("plus",13)}</button>`);add.onclick=()=>{tabs.push(cwd);tabI=tabs.length-1;renderTabs();};tb.appendChild(add);}
 function quickLook(startE){let i=curArr.indexOf(startE);if(i<0)i=cursor>=0?cursor:0;
   const ov=el(`<div class="ql"></div>`);
   const step=d=>{for(let n=0;n<curArr.length;n++){i=(i+d+curArr.length)%curArr.length;if(curArr[i]&&curArr[i].type==="file")break;}draw();};
   const close=()=>{document.removeEventListener("keydown",onkey,true);ov.remove();};
   const onkey=ev=>{if(ev.key==="Escape"||ev.key===" "){ev.preventDefault();ev.stopPropagation();close();}
     else if(ev.key==="ArrowRight"){ev.preventDefault();ev.stopPropagation();step(1);}
     else if(ev.key==="ArrowLeft"){ev.preventDefault();ev.stopPropagation();step(-1);}
     else if(ev.key==="Enter"){ev.preventDefault();ev.stopPropagation();const e=curArr[i];close();if(e)openEntry(e);}};
   async function draw(){const e=curArr[i];if(!e){close();return;}const raw="/api/fs/raw?path="+encodeURIComponent(e.path);let inner;
     if(isImgName(e.name))inner=`<img src="${imgSrc(e)}">`;
     else if(isVidName(e.name))inner=`<video src="${raw}" controls autoplay></video>`;
     else if(isAudName(e.name))inner=`<audio src="${raw}" controls autoplay style="width:70%"></audio>`;
     else{const r=await api("/api/fs/read?path="+encodeURIComponent(e.path));
       if(r&&r.ok&&!r.binary)inner=`<pre>${esc((r.content||"").slice(0,5000))}</pre>`;
       else inner=`<div class="ql-meta">${fmIcon(e.name,e.type,46)}<br>${esc(e.name)}<br>${fmtB(e.size)} · ${fmDate(e.mtime)}</div>`;}
     ov.innerHTML=`<div class="ql-bar"><span class="ql-t">${esc(e.name)}</span><span class="ql-i">${e.type==="dir"?"":fmtB(e.size)}</span><button id="qlOpen">Открыть</button><button id="qlX">✕ Esc</button></div><div class="ql-body">${inner}</div>`;
     ov.querySelector("#qlX").onclick=close;ov.querySelector("#qlOpen").onclick=()=>{const e2=curArr[i];close();if(e2)openEntry(e2);};}
   win.appendChild(ov);document.addEventListener("keydown",onkey,true);draw();}
 function scrollCur(){const n=listBox.children[cursor];if(n&&n.scrollIntoView)n.scrollIntoView({block:"nearest"});}
 function moveCur(delta,range){if(!curArr.length)return;cursor=cursor<0?0:Math.max(0,Math.min(curArr.length-1,cursor+delta));
   if(!range){sel.clear();sel.add(curArr[cursor].path);}else sel.add(curArr[cursor].path);
   lastIdx=cursor;renderList();selUpdate();scrollCur();}
 listBox.addEventListener("keydown",ev=>{const a=curArr,k=ev.key,ctrl=ev.ctrlKey||ev.metaKey;
   if(k==="ArrowDown"){ev.preventDefault();moveCur(1,ev.shiftKey);}
   else if(k==="ArrowUp"){ev.preventDefault();moveCur(-1,ev.shiftKey);}
   else if(k==="Enter"){ev.preventDefault();if(cursor>=0&&a[cursor])openEntry(a[cursor]);}
   else if(k===" "){ev.preventDefault();const e=cursor>=0?a[cursor]:null;if(e&&e.type==="file")quickLook(e);}
   else if(k==="Backspace"){ev.preventDefault();load(cwd==="/"?"/":(cwd.replace(/\/[^/]+$/,"")||"/"));}
   else if(k==="Delete"){ev.preventDefault();const ps=sel.size?[...sel]:(cursor>=0?[a[cursor].path]:[]);if(ps.length)(ev.shiftKey?doDeleteForever:doDelete)(ps);}
   else if(k==="F2"){ev.preventDefault();const e=sel.size===1?a.find(x=>sel.has(x.path)):(cursor>=0?a[cursor]:null);if(e)doRename(e);}
   else if(k==="Escape"){sel.clear();renderList();selUpdate();}
   else if(ctrl&&k.toLowerCase()==="a"){ev.preventDefault();a.forEach(e=>sel.add(e.path));renderList();selUpdate();}
   else if(ctrl&&k.toLowerCase()==="c"){if(sel.size){clip={mode:"copy",items:[...sel]};toast("Скопировано: "+sel.size);selUpdate();}}
   else if(ctrl&&k.toLowerCase()==="x"){if(sel.size){clip={mode:"cut",items:[...sel]};toast("Вырезано: "+sel.size);selUpdate();}}
   else if(ctrl&&k.toLowerCase()==="v"){if(clip&&clip.items.length)doPaste();}});

 // очередь загрузок: до 2 параллельных, сотни файлов, отмена через центр операций
 /* Загрузка. items — File или {file, rel}, где rel — путь подпапок внутри dir
    (загрузка папки целиком). dir по умолчанию — текущий каталог. */
 async function doUpload(items,dir){
   items=[...items].map(x=>x&&x.file?x:{file:x,rel:""}).filter(x=>x.file);
   if(!items.length)return;
   dir=dir||cwd;
   const total=items.reduce((a,x)=>a+(x.file.size||0),0);
   const dirs=new Set(items.map(x=>x.rel).filter(Boolean));
   // имя файла держим в подписи, а не в заголовке: длинное имя обрезалось многоточием
   const title=dirs.size?"Загрузка папки":(items.length>1?`Загрузка ${items.length} файлов`:"Загрузка файла");
   let cur=items[0].file.name;
   let sent=0,done=0,fail=0,idx=0;const active=new Map(); // xhr → загружено байт
   const o=opAdd(title,{cancel:()=>{active.forEach((v,x)=>{try{x.abort();}catch(e){}});}});
   const upd=()=>{let n=0;active.forEach(v=>n+=v);
     opSet(o,total?Math.min((sent+n)/total,1):(done+fail)/items.length,
       `${done+fail} / ${items.length}${fail?` · ошибок: ${fail}`:""} · ${fmtB(sent+n)} из ${fmtB(total)} · ${cur}`);};
   let lastErr="";
   const one=it=>new Promise(res=>{const xhr=new XMLHttpRequest();active.set(xhr,0);
     cur=(it.rel?it.rel+"/":"")+it.file.name;upd();
     xhr.open("POST","/api/fs/upload-raw?path="+encodeURIComponent(dir)
       +"&name="+encodeURIComponent(it.file.name)
       +(it.rel?"&rel="+encodeURIComponent(it.rel):""));
     if(xhr.upload)xhr.upload.onprogress=e=>{if(e.lengthComputable){active.set(xhr,e.loaded);upd();}};
     const fin=ok=>{active.delete(xhr);sent+=it.file.size||0;ok?done++:fail++;upd();res(ok);};
     xhr.onload=()=>{let ok=xhr.status===200;
       try{const j=JSON.parse(xhr.responseText);ok=ok&&j.ok!==false;if(!ok&&j.log)lastErr=String(j.log).slice(0,90);}
       catch(e){if(!ok)lastErr="HTTP "+xhr.status;}
       if(!ok&&!lastErr)lastErr="HTTP "+xhr.status;
       fin(ok);};
     xhr.onerror=()=>{lastErr="нет связи с сервером";fin(false);};
     xhr.onabort=()=>fin(false);
     xhr.send(it.file);});
   const worker=async()=>{while(idx<items.length&&!o.cancelled)await one(items[idx++]);};
   const par=Math.max(1,Math.min(6,+SET.fmUpPar||2));
   await Promise.all(Array.from({length:par},()=>worker()));
   const okAll=!o.cancelled&&!fail;
   const what=namesSummary(items.map(x=>(x.rel?x.rel.split("/")[0]+"/":"")+x.file.name));
   opEnd(o,okAll,o.cancelled?`отменено · загружено ${done} из ${items.length}${what?` · ${what}`:""}`
     :`${done} / ${items.length}${what?` · ${what}`:""}${fail?` · ошибок: ${fail}`:""}${fail&&lastErr?` · ${lastErr}`:""}`);
   if(LIVE){notifyDone(o.cancelled?"Загрузка отменена":okAll?"Загрузка завершена":"Загрузка с ошибками",`${done} из ${items.length} · ${dir}`);
     logAct(items.length>1?`Загружено ${done} из ${items.length} файлов`+(o.cancelled?" (отменено)":""):`Загружен файл ${items[0].file.name}`,dir,okAll?"ok":"warn");}
   else toast("Демо");
   load(cwd);}

 /* Перетащенная папка приходит как DataTransferItem: раскрываем рекурсивно.
    webkitGetAsEntry надо вызвать СИНХРОННО — после первого await dataTransfer пуст. */
 const dtEntries=dt=>{try{return [...(dt.items||[])].map(i=>i.webkitGetAsEntry&&i.webkitGetAsEntry()).filter(Boolean);}catch(e){return [];}};
 const entFile=en=>new Promise(r=>en.file(f=>r(f),()=>r(null)));
 const entRead=rd=>new Promise(r=>{const out=[];const step=()=>rd.readEntries(es=>{if(!es.length)return r(out);out.push(...es);step();},()=>r(out));step();});
 async function walkEntry(en,rel,out,depth){
   if(depth>32||out.length>20000)return;
   if(en.isFile){const f=await entFile(en);if(f)out.push({file:f,rel});}
   else if(en.isDirectory){const sub=rel?rel+"/"+en.name:en.name;
     for(const k of await entRead(en.createReader()))await walkEntry(k,sub,out,depth+1);}}
 async function dropItems(dt){
   const ents=dtEntries(dt);
   if(ents.length){const out=[];for(const en of ents)await walkEntry(en,"",out,0);
     if(out.length)return out;}
   return [...(dt.files||[])].map(f=>({file:f,rel:""}));}

   </div></div>

  const g=s=>tc.querySelector(s);

   const byS={};((st&&st.jobs)||[]).forEach(j=>byS[j.src]=j);
   const byD={};((ds&&ds.jobs)||[]).forEach(j=>byD[j.src]=j);
   if(!(c.jobs||[]).length){jn.innerHTML='<div style="color:var(--mut);font-size:12px;padding:4px 0">Источники не выбраны — добавьте на вкладке «Источники».</div>';}
   else jn.innerHTML="";
   let miss=0,emptyN=0;
   (c.jobs||[]).forEach(j=>{const r=byS[j.src],d=byD[j.src];let dot,badge="";
    if(d&&!d.exists){dot="var(--danger)";badge=`<span class="nb-warn dng" title="Папки нет в приёмнике — удалена вручную? Запусти бэкап, чтобы восстановить.">нет папки</span>`;miss++;}
    else if(d&&d.empty){dot="var(--warn)";badge=`<span class="nb-warn wrn" title="Папка в приёмнике есть, но пуста.">пусто</span>`;emptyN++;}
    else dot=r?(r.ok?"var(--good)":"var(--danger)"):"var(--mut)";
    jn.appendChild(el(`<div class="nb-job"><span class="ovh-dot" style="background:${dot};flex:none"></span><span class="nb-src mono" title="${att(j.src)}">${esc(j.src)}</span><span class="nb-arr">→</span><span class="nb-dst mono" title="${att(j.dest)}">${esc(j.dest)}</span>${badge}${r&&r.size?`<span class="nb-sz mono">${fmtB(r.size)}</span>`:""}</div>`));});
   // предупреждение о приёмнике + строка «Приёмник» в сводке
   const rd=g("#oRecvDot"),rv=g("#oRecvV"),dw=g("#oDwarn");
   const notMnt=ds&&ds.base_mounted===false;
   if(rd&&rv){if(notMnt){rd.style.background="var(--danger)";rv.textContent="не смонтирован";}
    else if(miss){rd.style.background="var(--danger)";rv.textContent=miss+" без папки";}

    else{rd.style.background="var(--mut)";rv.textContent="—";}}
   if(dw){let m="",cls="nb-dwarn";

    else if(miss){m=`⚠ Папок нет в приёмнике: ${miss}. Похоже, удалены вручную. Запусти бэкап — они восстановятся.`;}

   const sn=g("#oStatus");if(sn){if(st&&st.running)sn.innerHTML=`<span style="color:var(--accent)">идёт сейчас…</span>`;
    else if(st&&st.ts){const ok=(st.jobs||[]).filter(x=>x.ok).length,tot=(st.jobs||[]).length;sn.innerHTML=`${fmDate(st.ts)} · <b style="color:${ok===tot?"var(--good)":"var(--warn)"}">${ok}/${tot}</b> задач успешно`;}

   win._nbpi=setInterval(async()=>{if(!document.body.contains(con)){clearInterval(win._nbpi);win._nbpi=null;return;}

    nbStarted=r.started;
    if(r.base>nbCursor&&nbCursor>0)con.innerHTML="";

    nbCursor=r.seq;
    const op=g("#oProg");
    if(op){if(r.running){const ln=r.line||"";
      const pm=/(\d+)%/.exec(ln),pct=pm?+pm[1]:null;
      const rm=/([\d.]+[KMGT]?B\/s)/.exec(ln),rate=rm?rm[1]:"";
      const tk=/to-chk=(\d+)\/(\d+)/.exec(ln),left=tk?+tk[1]:null;
      op.style.display="block";

        +(pct!=null?`<div class="nb-pbar"><i style="width:${pct}%"></i></div>`:"")
        +`<div class="nb-prog-l mono">${esc(rate)}${left!=null?` · осталось ${left} файлов`:""}</div>`;
    }else op.style.display="none";}
    if(!r.running){clearInterval(win._nbpi);win._nbpi=null;setBusy(false);
     notifyDone(r.dry?"Пробный прогон завершён":(r.result==="ok"?"Бэкап завершён":r.result==="unreachable"?"Главный NAS недоступен":"Бэкап с ошибками"),"");
     if(r.dry){const sn=g("#oStatus");if(sn)sn.innerHTML=`<b>пробный прогон завершён</b>`;}
     else paintStatus();}   // реальный прогон → перекрасить точки/итог/размеры без перезагрузки
   },1500);}
  // журнал (терминал) скрыт по умолчанию — открывается кнопкой; лог копится в фоне
  {const lb2=g("#oLog");if(lb2)lb2.onclick=()=>{const open=con.style.display==="none";con.style.display=open?"block":"none";const t=g("#oLogT");if(t)t.textContent=open?"Скрыть журнал":"Показать журнал";if(open)con.scrollTop=con.scrollHeight;};}
  const run=async dry=>{if(!(c.jobs||[]).length){toast("Сначала выберите источники (вкладка «Источники»)");return;}

  g("#oRun").onclick=()=>run(false);g("#oDry").onclick=()=>run(true);

  // если бэкап уже идёт (в т.ч. после перезагрузки) — подключаемся к его логу (журнал остаётся скрыт)
  nbG("/api/backup/log?since=0").then(r=>{if(r&&r.running){con.innerHTML="";nbCursor=0;nbStarted=null;setBusy(true);attachLog();}});
  g("#oTest").onclick=async()=>{toast("Проверяю связь…");const t=await nbP("/api/backup/test");toast(t&&t.ok?"✓ связь работает":("✗ "+((t&&t.log)||"нет связи")));};
 }

 function tabHistory(tc){tc.innerHTML=`<h3 class="set-title">История прогонов</h3><p class="set-sub">Последние запуски бэкапа: когда, сколько шёл, что передано.</p><div id="hList"><div class="set-load">загрузка…</div></div>`;

  const sc=tc.querySelector("#stSmScan"),ss=tc.querySelector("#stSmShort"),sl=tc.querySelector("#stSmLong");

    sy.value=md.snap_sync_time||"03:00";sd.value=md.snap_scrub_dow||"Sun";sr.value=md.snap_scrub_time||"05:00";
    const snapOk=!!(m&&m.snapraid_configured);[sy,sd,sr].forEach(x=>{x.disabled=!snapOk;x.closest(".srow").classList.toggle("srow-off",!snapOk);});

      if(snHead&&!snHead._noted){snHead._noted=1;snHead.after(el(`<div class="mon-note" style="margin:-2px 0 8px">${svg("info",13)} SnapRAID ещё не настроен — расписание включится после настройки защиты данных в Мастере.</div>`));}}});
  const saveSm=async()=>{const r=await api("/api/maintenance",{method:"POST",body:JSON.stringify({maintenance:{
     smart_scan_min:+sc.value||10,smart_short_days:+ss.value||0,smart_long_days:+sl.value||0,
     snap_sync_time:sy.value.trim(),snap_scrub_dow:sd.value,snap_scrub_time:sr.value.trim()}})});
    const md=(r&&r.maintenance)||{};sc.value=md.smart_scan_min;ss.value=md.smart_short_days;sl.value=md.smart_long_days;
    sy.value=md.snap_sync_time;sd.value=md.snap_scrub_dow;sr.value=md.snap_scrub_time;

  const amr=tc.querySelector("#stAmr"),sumOn=tc.querySelector("#stSumOn"),

  const thSeg=tc.querySelector("#stTh"),sumFreq=tc.querySelector("#stSumFreq");
  api("/api/maintenance").then(m=>{const md=(m&&m.maintenance)||{};
    amr.checked=md.automount_recover!==false;
    sumOn.checked=!!md.summary_enabled;sumRow.style.display=sumOn.checked?"":"none";
    segSet(sumFreq,md.summary_freq||"daily");sumDow.value=md.summary_dow||"Mon";sumTime.value=md.summary_time||"09:00";
    sumDow.style.display=(md.summary_freq==="weekly")?"":"none";

    thHot.value=md.thermal_hot!=null?md.thermal_hot:80;thCrit.value=md.thermal_crit!=null?md.thermal_crit:85;});
  const saveRel=async()=>{const r=await api("/api/maintenance",{method:"POST",body:JSON.stringify({maintenance:{
     automount_recover:amr.checked,summary_enabled:sumOn.checked,summary_freq:segVal(sumFreq),
     summary_dow:sumDow.value,summary_time:sumTime.value.trim()||"09:00",
     thermal_mode:segVal(thSeg),thermal_hot:+thHot.value||80,thermal_crit:+thCrit.value||85}})});
    const md=(r&&r.maintenance)||{};thHot.value=md.thermal_hot;thCrit.value=md.thermal_crit;
    toast(md.error?("Ошибка: "+md.error):"Сохранено");};
  amr.onchange=saveRel;[sumDow,sumTime,thHot,thCrit].forEach(x=>x.onchange=saveRel);
  sumOn.onchange=()=>{sumRow.style.display=sumOn.checked?"":"none";saveRel();};
  thSeg.querySelectorAll("button").forEach(b=>b.onclick=()=>{segSet(thSeg,b.dataset.v);thRow.style.display=(b.dataset.v!=="off")?"":"none";saveRel();});
  sumFreq.querySelectorAll("button").forEach(b=>b.onclick=()=>{segSet(sumFreq,b.dataset.v);sumDow.style.display=(b.dataset.v==="weekly")?"":"none";saveRel();});
  const oa=tc.querySelector("#stOpsAuto");oa.checked=SET.opsAuto!==false;
  oa.onchange=()=>{SET.opsAuto=oa.checked;saveSettings();};
}

/* MySpeed: последний замер скорости интернета. Сервис ставится отдельным стеком,

   «нет данных» мозолила бы глаза тем, кто его не ставил. */
let MS_URL="";
async function pollMySpeed(){
 const box=document.getElementById("wg-myspeed");if(!box)return;
 const wdg=box.closest(".wdg");
 const hide=()=>{if(wdg)wdg.style.display="none";};
 let r=null;
 try{r=await api("/api/myspeed");}catch(e){}
 if(!r||!r.ok||r.download==null){hide();return;}
 if(wdg)wdg.style.display="";
 /* r.url — это адрес, по которому ходит СЕРВЕР (обычно 127.0.0.1): в браузере он
    ведёт на машину пользователя. Берём ссылку из web-desktop.url-лейбла контейнера,
    а если ярлыка нет — подставляем текущий хост вместо loopback. */
 const app=(APPS||[]).find(a=>/myspeed/i.test(a.name||"")||/:5216(\/|$)/.test(a.url||""));
 MS_URL=(app&&app.url)||String(r.url||"").replace(/\/\/(127\.0\.0\.1|localhost)\b/,"//"+location.hostname);
 const mbit=v=>(v==null?"—":(+v>=100?Math.round(+v):(+v).toFixed(1))+" Мбит/с");
 const ago=t=>{const s=(Date.now()-Date.parse(t))/1000;
   if(!isFinite(s))return "";
   if(s<90)return "только что";
   if(s<5400)return Math.round(s/60)+" мин назад";
   if(s<172800)return Math.round(s/3600)+" ч назад";
   return Math.round(s/86400)+" дн назад";};
 const a=r.avg||{};
 // цвета берём из уже подогнанных по контрасту токенов поверхности виджета
 const pingCol=r.ping==null?"var(--dim)":(r.ping<30?"var(--good)":r.ping<80?"var(--warn)":"var(--danger)");
 box.innerHTML=`<div class="ms-row"><span class="ms-l ms-dn">${svg("download",13)} Скачивание</span><b class="ms-dn">${esc(mbit(r.download))}</b></div>
   <div class="ms-row"><span class="ms-l ms-up">${svg("upload",13)} Отдача</span><b class="ms-up">${esc(mbit(r.upload))}</b></div>
   <div class="ms-row"><span class="ms-l">${svg("activity",13)} Пинг</span><b style="color:${pingCol}">${r.ping==null?"—":esc(r.ping+" мс")}</b></div>
   ${a.download!=null?`<div class="ms-avg">в среднем ${esc(mbit(a.download))} / ${esc(mbit(a.upload))}${a.ping!=null?` · пинг ${esc(a.ping+" мс")}`:""}</div>`:""}
   <div class="ms-avg">${r.error?`<span style="color:var(--danger)">замер с ошибкой</span> · `:""}${esc(ago(r.created))}${r.count?` · ${r.count} замеров`:""}</div>`;
 const mm=document.getElementById("more-myspeed");
 if(mm)mm.onclick=()=>{if(MS_URL)window.open(MS_URL,"_blank");};
}

async function pollNet(){const box=document.getElementById("wg-netlink");if(!box)return;

 box.innerHTML=`<div class="krow"><span style="display:inline-flex;align-items:center;gap:6px;min-width:0"><span style="flex:none;display:flex">${svg(wifi?"wifi":"net",13)}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></span><b style="color:${spdCol};flex:none" title="${n.link_mbit?Math.round(n.link_mbit/8)+" МБ/с":""}">${spd}</b></div>`
  +(wifi&&n.signal!=null?`<div class="krow" style="margin-top:2px"><span style="color:var(--mut);font-size:11px">Сигнал</span><b style="font-size:11px">${n.signal_pct}% · ${n.signal} dBm</b></div>`:"");
 const btn=document.getElementById("wg-nstest"),res=document.getElementById("wg-nsres");
 if(btn&&!btn._wired){btn._wired=1;btn.onclick=async()=>{btn.disabled=true;const o=btn.textContent;btn.textContent="Тест… (~15 c)";if(res)res.textContent="меряю…";

async function pollStacks(){const box=document.getElementById("wg-docker");if(!box)return;

function drawNet(){const cv=document.getElementById("wg-net");if(!cv)return;const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
 ctx.clearRect(0,0,W,H);if(NETH.length<2)return;
 const cs=getComputedStyle(cv);   // с самого canvas — good/danger, адаптированные под фон виджета
 const cRx=cs.getPropertyValue("--good").trim()||"#1FA971",cTx=cs.getPropertyValue("--danger").trim()||"#DE4E48";
 const mx=Math.max(...NETH,...NETT,1);
 const line=(data,col,fill)=>{if(data.length<2)return;
  ctx.beginPath();data.forEach((v,i)=>{const x=i/(data.length-1)*W,y=H-3-Math.min((v||0)/mx,1)*(H-6);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
  if(fill){ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=col+"26";ctx.fill();}};
 line(NETH,cRx,true);   // download — зелёный, с заливкой
 line(NETT,cTx,false);  // upload — красный, только линия
}

  h+=poolRow(LAST.disk_pool,arr.filter(d=>d.role==="data"||d.role==="pool").length,arr.filter(d=>d.role==="parity").length);
 arr.slice(0,6).forEach(d=>{const u=d.usage,pct=u?u.pct:null,tmp=d.smart&&d.smart.temp!=null?d.smart.temp:null,sys=d.role==="system";
  const nm=sys?("Система · "+driveType(d).label):(d.label||d.name);
  // мелким шрифтом — модель/производитель, чтобы понимать, что за физический диск
  const sub=(d.model&&d.model!==nm)?d.model:(!d.label&&d.name!==nm?d.name:"");
  const free=u?fmtB(u.free!=null?u.free:u.total-u.used)+" своб.":(d.mounted?(d.size||""):"не смонт.");
  h+=dRow(d.role,nm,pct,free,tmp,sys,sub);});
 box.innerHTML=h||`<div style="color:var(--mut);font-size:12px">Диски не найдены</div>`;
}

const netS=n=>{const u=["B","K","M","G"];let i=0;n=+n||0;while(n>=1024&&i<3){n/=1024;i++;}return (n<10&&i?n.toFixed(1):Math.round(n))+u[i];};
const TRAY_DEFS={
 cpu:{name:"Загрузка CPU",ic:"cpu",val:s=>(s.cpu!=null?s.cpu:0)+"%"},
 temp:{name:"Температура",ic:"therm",val:s=>s.temp?s.temp+"°":"—",warn:s=>s.temp&&s.temp>=70},
 ram:{name:"Память",ic:"ram",val:s=>(s.mem?s.mem.pct:0)+"%"},
 net:{name:"Сеть ↓↑",ic:"net",val:s=>`${netS(s.net&&s.net.rx)}↓ ${netS(s.net&&s.net.tx)}↑`,
  html:s=>`<span style="color:var(--good)">↓${netS(s.net&&s.net.rx)}</span> <span style="color:var(--danger)">↑${netS(s.net&&s.net.tx)}</span>`},
 disk:{name:"Заполнение пула",ic:"disks",val:s=>s.disk_pool&&s.disk_pool.pct!=null?Math.round(s.disk_pool.pct)+"%":"—"},

 uptime:{name:"Аптайм",ic:"clock",val:s=>s.uptime?fmtUp(s.uptime):"—"},
};
const TRAY_ORDER=["cpu","temp","ram","net","disk","ip","uptime"];
function trayCfg(){let c=(SET.tray&&SET.tray.length)?SET.tray.slice():TRAY_ORDER.map(id=>({id,on:["cpu","temp","ram"].indexOf(id)>=0}));
 c=c.filter(x=>TRAY_DEFS[x.id]);TRAY_ORDER.forEach(id=>{if(!c.find(x=>x.id===id))c.push({id,on:false});});return c;}
function paintTray(s){const t=document.getElementById("tray");if(!t)return;s=s||{};
 t.innerHTML=trayCfg().filter(x=>x.on).map(x=>{const d=TRAY_DEFS[x.id],w=d.warn&&d.warn(s)?"warn":"";return `<button class="pill ${w}"><span class="ic">${svg(d.ic,15)}</span><b>${d.html?d.html(s):esc(String(d.val(s)))}</b></button>`;}).join("");

const MONTHS=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
function ruWhen(ts){ // человеческая дата из unix-секунд: «сегодня 14:32», «7 мая 09:10»
 const d=new Date(ts*1000),now=new Date();
 const hm=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
 if(d.toDateString()===now.toDateString())return "сегодня "+hm;
 if(d.toDateString()===new Date(now.getTime()-864e5).toDateString())return "вчера "+hm;
 return d.getDate()+" "+MONTHS[d.getMonth()]+(d.getFullYear()!==now.getFullYear()?" "+d.getFullYear():"")+" "+hm;}

/* ---- центр уведомлений ---- */
const EVQ={seq:0,seen:0,unseen:0,cache:[],toasted:0,remind:0,init:false};
const NKIND={disk:"Диски",space:"Место",power:"Питание",svc:"Службы",access:"Доступ",net:"Сеть",protect:"Защита",files:"Файлы",action:"Действия",system:"Система"};
const NKICON={disk:"disks",space:"hdd",power:"cpu",svc:"cog",access:"key",net:"wifi",protect:"shield",files:"folder",action:"wand",system:"info"};
const nico=e=>`<span class="nico ${e.lvl}">${svg(NKICON[e.kind]||"info",14)}</span>`;
async function pollEvents(){
 if(pollEvents._busy)return;pollEvents._busy=true;   // без перекрытия опросов (медленный ответ → дубли)
 try{await _pollEvents();}finally{pollEvents._busy=false;}}
async function _pollEvents(){
 const r=await api("/api/events?after="+EVQ.seq);if(!r||!Array.isArray(r.events))return;
 const first=!EVQ.init;EVQ.init=true;
 r.events.forEach(e=>EVQ.cache.push(e));
 if(EVQ.cache.length>800)EVQ.cache.splice(0,EVQ.cache.length-800);
 EVQ.seq=r.seq||EVQ.seq;EVQ.seen=r.seen||0;EVQ.unseen=r.unseen||0;
 if(first)EVQ.toasted=EVQ.seq;      // старое при загрузке страницы не тостим
 else{const fresh=r.events.filter(e=>e.id>EVQ.toasted&&e.desk);
  fresh.slice(-4).forEach(e=>ntoast(e));
  if(r.events.length)EVQ.toasted=Math.max(EVQ.toasted,...r.events.map(e=>e.id));}
 // непрочитанное критичное (свежее суток, с включённой плашкой) — напоминать раз в N минут (SET.critRemind)
 const remMin=SET.critRemind!=null?+SET.critRemind:10;
 const crit=EVQ.cache.filter(e=>e.lvl==="crit"&&e.desk&&e.id>EVQ.seen&&(Date.now()/1e3-(e.t2||e.t))<86400);
 if(remMin>0&&crit.length&&Date.now()-EVQ.remind>remMin*60000){EVQ.remind=Date.now();ntoast(crit[crit.length-1],true);}
 paintBell();}
function paintBell(){const b=document.getElementById("bellBtn");if(!b)return;
 const hasCrit=EVQ.cache.some(e=>e.lvl==="crit"&&e.id>EVQ.seen);
 b.innerHTML=svg("bell",16)+(EVQ.unseen?`<span class="mb-badge${hasCrit?" crit":""}">${EVQ.unseen>99?"99+":EVQ.unseen}</span>`:"");
 b.title=nasTr(EVQ.unseen?`Уведомления: ${EVQ.unseen} новых`:"Уведомления");}
function markSeen(){if(EVQ.seen>=EVQ.seq)return;EVQ.seen=EVQ.seq;EVQ.unseen=0;paintBell();
 api("/api/events/seen",{method:"POST",body:JSON.stringify({id:EVQ.seq})});}
function ntoast(e,remind){const c=document.getElementById("ntoasts");if(!c)return;
 while(c.children.length>=4)c.firstChild.remove();
 const n=el(`<div class="ntoast ${e.lvl}">${nico(e)}<div class="nt-m"><div class="nt-t">${esc(e.title)}${e.n>1?` <span class="nmul">×${e.n}</span>`:""}${remind?` <span class="nmul">· напоминание</span>`:""}</div>${e.msg?`<div class="nt-s">${esc(e.msg)}</div>`:""}</div><button class="nt-x">${svg("x",12)}</button></div>`);
 c.appendChild(n);requestAnimationFrame(()=>n.classList.add("show"));
 const close=()=>{n.classList.remove("show");setTimeout(()=>n.remove(),260);};
 n.querySelector(".nt-x").onclick=ev=>{ev.stopPropagation();close();};
 n.onclick=()=>{close();winNotif();};
 setTimeout(close,e.lvl==="crit"?15000:7000);
 try{if("Notification"in window&&Notification.permission==="granted"&&document.hidden)new Notification(nasTr(e.title),{body:nasTr(e.msg||""),icon:"/icon.svg"});}catch(x){}}
function evRow(e,isNew){return `<div class="mbp-row${isNew?" new":""}" data-eid="${e.id}">${nico(e)}<div class="mbp-m"><div class="mbp-t">${esc(e.title)}${e.n>1?` <span class="nmul">×${e.n}</span>`:""}</div>${e.msg?`<div class="mbp-s">${esc(e.msg)}</div>`:""}</div><span class="mbp-w">${ruWhen(e.t2||e.t)}</span></div>`;}
function bellPop(){const b=document.getElementById("bellBtn");
 const seenAt=EVQ.seen;   // водораздел ДО markSeen — новые подсвечиваем
 mbPop(b,p=>{const items=EVQ.cache.slice(-12).reverse();
  p.innerHTML=`<div class="mbp-h"><span>Уведомления</span>${EVQ.unseen?`<span class="mbp-cnt">${EVQ.unseen} новых</span>`:""}<span class="grow"></span><button class="mbp-hb" id="mbAll" title="Показать все">${svg("list",15)}</button><button class="mbp-hb" id="mbCfg" title="Настройки уведомлений">${svg("cog",15)}</button></div>`
   +(items.length?items.map(e=>evRow(e,e.id>seenAt)).join(""):`<div class="mbp-empty">Пока пусто — здесь появятся события и действия системы</div>`);
  p.querySelectorAll(".mbp-row").forEach(rw=>rw.onclick=()=>{closeMenu();winNotif();});
  p.querySelector("#mbAll").onclick=()=>{closeMenu();winNotif();};
  p.querySelector("#mbCfg").onclick=()=>{closeMenu();winSettings("notify");};});
 markSeen();}

 let lvl="",kind="",q="",items=[];

 body.querySelectorAll("#ntLvl button").forEach(bt=>bt.onclick=()=>{body.querySelectorAll("#ntLvl button").forEach(x=>x.classList.toggle("on",x===bt));lvl=bt.dataset.l;paint();});

/* ---- центр операций (очереди, прогресс, отмена) ---- */
const OPS={list:[],seq:0,paintT:0,autoClosed:false,autoOpened:false};

/* Operation history now lives on the server (~/nas-config/ops-history.json), so it is
   the same in every browser and survives a reinstall through the settings backup.
   localStorage stays as an offline cache: if the API is unreachable we still show
   something. Running operations are never persisted — an upload dies with the page,
   while backup and USB import keep going and are re-created from the server. */
const OPS_KEY="nasops",OPS_KEEP=60,OPS_TTL=30*86400e3;
const opsUid=()=>Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8);
function opsSave(){
 try{
  const keep=OPS.list.filter(o=>o.state!=="run").slice(-OPS_KEEP)
    .map(o=>({id:o.id,uid:o.uid,title:o.title,state:o.state,label:o.label,t:o.t}));
  localStorage.setItem(OPS_KEY,JSON.stringify(keep));
 }catch(e){}}
function opsPush(o){                       // завершённую операцию отдаём серверу
 if(!o.uid)return;
 api("/api/ops",{method:"POST",body:JSON.stringify(
   {uid:o.uid,state:o.state,ts:Math.round((o.t||Date.now())/1000),title:o.title,label:o.label||""})}).catch(()=>{});}
function opsAdopt(items){
 const now=Date.now();
 OPS.list=items.filter(o=>o&&o.t&&now-o.t<OPS_TTL).sort((a,b)=>a.t-b.t).slice(-OPS_KEEP);
 OPS.seq=0;
 OPS.list.forEach(o=>{o.id=++OPS.seq;o.p=o.state==="done"?1:null;o.cancel=null;o.cancelled=false;
   if(o.state==="run"){o.state="err";o.label="прервано перезагрузкой панели";}
   // не заводить дубль по уже записанному импорту
   if(o.uid&&o.uid.indexOf("usb:")===0&&typeof USB_SEEN!=="undefined")USB_SEEN.add(o.uid.slice(4));});
 paintOps(true);}
async function opsLoad(){
 let items=null;
 try{const r=await api("/api/ops");
   if(r&&Array.isArray(r.ops))items=r.ops.map(x=>({uid:x.uid,title:x.title,state:x.state,label:x.label,t:(x.ts||0)*1000}));
 }catch(e){}
 if(!items){                              // сервер недоступен — показываем локальный кэш
   try{items=JSON.parse(localStorage.getItem(OPS_KEY)||"[]");}catch(e){items=[];}
   if(!Array.isArray(items))items=[];
 }
 opsAdopt(items);opsSave();}
const opAgo=t=>{if(!t)return "";const s=Math.max(0,(Date.now()-t)/1000);
 if(s<60)return "только что";
 if(s<3600)return Math.floor(s/60)+" мин назад";
 if(s<86400)return Math.floor(s/3600)+" ч назад";
 return Math.floor(s/86400)+" дн назад";};
let OPS_TICK=null;
// Пока что-то выполняется — перерисовываем сами. Иначе полоса замирает: события
// прогресса приходят редко (пакетные операции) или попап открыли уже после старта.
function opsTick(){if(OPS_TICK)return;
 OPS_TICK=setInterval(()=>{if(!OPS.list.some(o=>o.state==="run")){clearInterval(OPS_TICK);OPS_TICK=null;return;}
  paintOps();},300);}
/* «Сохранено ✓» слева от кнопки. Тост исчезает в углу экрана, и в настройках его
   легко пропустить — подтверждение должно быть там, куда смотрит глаз. */
function flashSaved(btn,msg){
 if(!btn||!btn.parentNode)return;
 const p=btn.parentNode;
 let b=[...p.children].find(x=>x.classList&&x.classList.contains("saved-badge"));
 if(!b){b=el(`<span class="saved-badge"></span>`);p.insertBefore(b,btn);}
 b.textContent=nasTr(msg||"Сохранено ✓");
 b.classList.remove("show");void b.offsetWidth;   // перезапустить анимацию при повторном клике
 b.classList.add("show");
 clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove("show"),2200);}

function opAdd(title,opts){opts=opts||{};
 const o={id:++OPS.seq,title,state:"run",p:null,label:"",cancel:opts.cancel||null,cancelled:false,t:Date.now()};
 OPS.list.push(o);if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
 paintOps(true);opsTick();
 // сам открывается при старте операции (настройка SET.opsAuto); если пользователь
 // закрыл во время работы — не навязываемся до конца текущей пачки
 if(SET.opsAuto!==false&&!document.querySelector(".mbpop[data-ops]")&&!OPS.autoClosed){OPS.autoOpened=true;opsPop();}
 return o;}
function opSet(o,p,label){o.p=p;if(label!=null)o.label=label;paintOps();}
function opEnd(o,ok,label){if(o.state!=="run")return;o.state=o.cancelled?"cancel":ok?"done":"err";
 if(label!=null&&label!=="")o.label=label;if(o.state==="done")o.p=1;o.cancel=null;
 o.t=Date.now();o.uid=o.uid||opsUid();
 paintOps(true);opsSave();opsPush(o);
 if(!OPS.list.some(x=>x.state==="run")){OPS.autoClosed=false;
  // авто-открытый поповер сам прячется чуть после завершения всего
  if(OPS.autoOpened)setTimeout(()=>{const q=document.querySelector(".mbpop[data-ops]");
   if(q&&OPS.autoOpened&&!OPS.list.some(x=>x.state==="run")){q.remove();OPS.autoOpened=false;}},1800);}}
function opCancel(o){if(o.state!=="run")return;o.cancelled=true;
 try{if(o.cancel)o.cancel(o);}catch(e){}paintOps(true);}
function paintOps(force){
 const now=Date.now();if(!force&&now-OPS.paintT<200)return;OPS.paintT=now;
 const b=document.getElementById("opsBtn");if(!b)return;
 const run=OPS.list.filter(o=>o.state==="run").length;
 // иконка всегда на месте: по ней смотрят историю загрузок и копирований,
 // а не только текущий прогресс. Пустой список — приглушённая иконка.
 b.classList.toggle("mb-idle",!OPS.list.length);
 b.innerHTML=svg(run?"sync":"list",16)+(run?`<span class="mb-badge">${run}</span>`:"");
 b.title=nasTr(run?`Операции: ${run} выполняется`:"Операции");
 const p=document.querySelector(".mbpop[data-ops]");if(p)renderOpsList(p);}
function renderOpsList(p){
 // инкрементально: если состав/состояния не менялись — обновляем только прогресс и подписи
 const sig=OPS.list.map(o=>o.id+":"+o.state).join(",");
 if(p._sig===sig){
  OPS.list.forEach(o=>{if(o.state!=="run")return;   // завершённые не трогаем: в подписи <span class="op-when">
   const row=p.querySelector(`[data-op="${o.id}"]`);if(!row)return;
   const bf=row.querySelector(".op-bf");if(bf&&o.p!=null)bf.style.width=Math.round(Math.min(o.p,1)*100)+"%";
   const s2=row.querySelector(".op-s2");if(s2){const l=nasTr(o.label);if(s2.textContent!==l){s2.textContent=l;s2.title=o.label||"";}}
   const t2=row.querySelector(".op-t2"),tt=nasTr(o.title);if(t2&&t2.textContent!==tt){t2.textContent=tt;t2.title=o.title;}});
  return;}
 p._sig=sig;
 const items=OPS.list.slice().reverse();
 p.innerHTML=`<div class="mbp-h"><span>Операции</span>${OPS.list.some(o=>o.state==="run")?`<span class="mbp-cnt">${OPS.list.filter(o=>o.state==="run").length} активных</span>`:""}<span class="grow"></span><button class="mbp-hb" id="opsClr" title="Убрать завершённые">${svg("eraser",15)}</button></div>`
  +(items.length?items.map(o=>{
    const st=o.state==="run"?"":o.state==="done"?`<span class="op-st done" style="font-weight:800">✓</span>`:o.state==="cancel"?`<span class="op-st">⊘</span>`:`<span class="op-st err" style="font-weight:800">!</span>`;
    const bar=o.state==="run"?`<div class="op-bar"><div class="op-bf" style="width:${o.p==null?40:Math.round(Math.min(o.p,1)*100)}%"></div></div>`:"";
    const when=o.state==="run"?"":`<span class="op-when">${esc(opAgo(o.t))}</span>`;
    return `<div class="op-row${o.state==="run"&&o.p==null?" ind":""}" data-op="${o.id}"><div class="op-m"><div class="op-t2" title="${att(o.title)}">${esc(o.title)}</div><div class="op-s2" title="${att(o.label||"")}">${esc(o.label||"")}${when}</div>${bar}</div>${st}${o.state==="run"?`<button class="op-x" title="Отменить">${svg("x",14)}</button>`:""}</div>`;
  }).join(""):`<div class="mbp-empty">Нет операций</div>`);
 p.querySelectorAll(".op-x").forEach(x=>x.onclick=ev=>{ev.stopPropagation();
  const o=OPS.list.find(y=>y.id===+x.closest(".op-row").dataset.op);if(o)opCancel(o);});
 const clr=p.querySelector("#opsClr");if(clr)clr.onclick=()=>{OPS.list=OPS.list.filter(o=>o.state==="run");
  opsSave();api("/api/ops/clear",{method:"POST",body:"{}"}).catch(()=>{});paintOps(true);
  const q=document.querySelector(".mbpop[data-ops]");if(q){q._sig=null;renderOpsList(q);}};}
function opsPop(){const b=document.getElementById("opsBtn");if(!b)return;
 mbPop(b,p=>{p.setAttribute("data-ops","1");renderOpsList(p);},
  ()=>{OPS.autoOpened=false;if(OPS.list.some(x=>x.state==="run"))OPS.autoClosed=true;});}

/* poll */
let LAST=null;
const HIST={cpu:[],mem:[],temp:[],rx:[],tx:[]};
function pushHist(s){const cap=60;const add=(k,v)=>{HIST[k].push(v||0);if(HIST[k].length>cap)HIST[k].shift();};
 add("cpu",s.cpu);add("mem",s.mem&&s.mem.pct);add("temp",s.temp);add("rx",s.net&&s.net.rx);add("tx",s.net&&s.net.tx);}
function sparkSVG(data,color,max){const w=120,h=28,d=(data||[]).slice(-40);if(d.length<2)return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
 const mx=max||Math.max(...d,1);const pts=d.map((v,i)=>`${(i/(d.length-1)*w).toFixed(1)},${(h-2-Math.min((v||0)/mx,1)*(h-4)).toFixed(1)}`).join(" ");
 return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;}
/* USB-import runs in the background (udev), the panel may be closed. Mirror its
   jobs into the shared operations centre so the progress is visible everywhere,
   not only on the USB settings tab. Keyed by device — one op per partition. */
const USB_OPS={},USB_SEEN=new Set();
function usbLabel(j){
 const bits=[j.label||j.dev];
 if(j.bytes!=null)bits.push(fmtB(j.bytes)+(j.total?" из "+fmtB(j.total):""));
 if(j.status==="running"){if(j.speed)bits.push(j.speed);if(j.eta)bits.push("осталось "+j.eta);}
 return bits.join(" · ");}
function syncUsbOps(jobs){
 (jobs||[]).forEach(j=>{
  const key=j.dev+":"+j.started;
  let o=USB_OPS[j.dev];
  if(!o){
   if(j.status!=="running"){
    // импорт мог начаться и кончиться, пока панель была закрыта: заносим в историю,
    // иначе быстрые копирования (пара секунд) не видно вообще нигде
    if(USB_SEEN.has(key))return;
    USB_SEEN.add(key);
    const done=j.status==="done";
    const rec={id:++OPS.seq,uid:"usb:"+key,title:"Импорт с USB",state:done?"done":"err",p:done?1:null,
      label:usbLabel(j)+(j.dest?" · "+j.dest:""),cancel:null,cancelled:false,
      t:(j.finished||j.started||0)*1000||Date.now()};
    OPS.list.push(rec);
    if(OPS.list.length>40)OPS.list=OPS.list.slice(-40);
    opsSave();opsPush(rec);paintOps(true);
    return;
   }
   USB_SEEN.add(key);
   o=USB_OPS[j.dev]=opAdd("Импорт с USB");o.uid="usb:"+key;
  }
  if(j.status==="running"){
   opSet(o,j.percent==null?null:Math.min(j.percent,100)/100,usbLabel(j));
  }else{
   opEnd(o,j.status==="done",usbLabel(j)+(j.dest?" · "+j.dest:""));
   delete USB_OPS[j.dev];
  }});}

async function poll(){const s=await api("/api/stats");LAST=s;pushHist(s);paintTray(s);paintSys(s);
 const bn=document.getElementById("brandName");if(bn)bn.textContent=(s.host||location.hostname.split(".")[0]||"pi5")+".local";
 const nr=!!(s&&s.nb_running);if(nr!==NB_RUNNING){NB_RUNNING=nr;renderDock();}
 syncUsbOps(s&&s.usb_import);
 if(OPEN.__sys&&OPEN.__sys._sub)OPEN.__sys._sub(s);}
async function pollApps(){const d=await api("/api/desktop");APPS=(d&&d.apps)||[];VOLS=(d&&d.volumes)||[];APPS_LOADED=true;renderApps();paintVols();
 if(OPEN.__files&&OPEN.__files._vols)OPEN.__files._vols();}
